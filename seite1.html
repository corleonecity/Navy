<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB7AmLb6NwR8sKyDXtIhmghGszpX_VsICY",
    authDomain: "cc-shop-36c3b.firebaseapp.com",

    storageBucket: "cc-shop-36c3b.firebasestorage.app"
};

const db = getDatabase(app);

window.M = (icon, css = "", style = "") => `<span class="material-symbols-outlined ${css}" style="${style}">${icon}</span>`;

// ========== DATENBANKEN ==========
const zones = [{ name: "Naturteich", reqPrestige: 0 }, { name: "Bach", reqPrestige: 1 }];

const items = [
    { n: "Laub", v: -1, xp: -1, c: 12, z: 0, e: "eco", isTrash: true, minW: 5, maxW: 50 },
    { n: "Algen", v: -3, xp: -2, c: 6, z: 0, e: "grass", isTrash: true, minW: 10, maxW: 500 },

    { n: "Stichling", v: 8, xp: 4, c: 15, z: 0, e: "set_meal", isTrash: false, minW: 5, maxW: 15 },
    { n: "Rotauge", v: 20, xp: 10, c: 10, z: 0, e: "set_meal", isTrash: false, minW: 100, maxW: 2000 },
    { n: "Schleie", v: 60, xp: 30, c: 4, z: 0, e: "set_meal", isTrash: false, minW: 300, maxW: 4000 },
    { n: "Karpfen", v: 200, xp: 80, c: 1, z: 0, e: "set_meal", isTrash: false, minW: 1000, maxW: 15000 },
    { n: "Zander", v: 300, xp: 100, c: 0.5, z: 0, e: "sailing", isTrash: false, minW: 800, maxW: 8000 },
    { n: "Bachforelle", v: 200, xp: 85, c: 5, z: 1, e: "set_meal", isTrash: false, minW: 150, maxW: 1500 },
    { n: "Regenbogenforelle", v: 350, xp: 130, c: 3, z: 1, e: "set_meal", isTrash: false, minW: 200, maxW: 2000 },
    { n: "Waller", v: 1500, xp: 450, c: 0.4, z: 1, e: "sailing", isTrash: false, minW: 500, maxW: 8000 }
];

const rodsDB = {
    rod1: { name: "Steckrute", e: "phishing", cost: 0, maxKg: 2, speed: 0, luck: 0, res: 10 },
    rod2: { name: "Teleskoprute", e: "phishing", cost: 250, maxKg: 5, speed: 5, luck: 2, res: 15 },
    rod3: { name: "Matchrute", e: "phishing", cost: 800, maxKg: 8, speed: 10, luck: 5, res: 20 },
    rod4: { name: "Feeder-Rute", e: "phishing", cost: 2500, maxKg: 12, speed: 15, luck: 8, res: 30 },
    rod5: { name: "Karpfenrute", e: "phishing", cost: 6000, maxKg: 20, speed: 20, luck: 12, res: 40 },
    rod6: { name: "Meister-Rute", e: "star", cost: 15000, maxKg: 50, speed: 25, luck: 18, res: 50 }
};

const baitsDB = {
    b1: { name: "Brot", e: "bakery_dining", cost: 20, amt: 20, speed: 0, luck: 2, res: 0, trashRed: 0 },
    b2: { name: "Mais", e: "grass", cost: 60, amt: 20, speed: 0, luck: 4, res: 0, trashRed: 0 },
    b3: { name: "Wurm", e: "bug_report", cost: 120, amt: 20, speed: 3, luck: 0, res: 0, trashRed: 0 },
    b4: { name: "Made", e: "pest_control", cost: 250, amt: 20, speed: 5, luck: 2, res: 0, trashRed: 0 },
    b5: { name: "Teig", e: "breakfast_dining", cost: 500, amt: 20, speed: 0, luck: 0, res: 0, trashRed: 15 }
};

const questDB = {
    daily: [{ id: "d1", desc: "Fange 5 Fische", t: "c", req: 5, rew: 50 }],
    weekly: [{ id: "w1", desc: "Fange 100 Fische", t: "c", req: 100, rew: 1000 }],
    monthly: [{ id: "m1", desc: "Fange 500 Fische", t: "c", req: 500, rew: 5000 }]
};

const achievementsDB = [
    { id: "first_catch", name: "Erster Fang", desc: "Fange deinen ersten Fisch", icon: "phishing", check: (gs) => (gs.stats.totalCaught || 0) >= 1, rew: 50 },
    { id: "catch_100", name: "100 Fische", desc: "Fange 100 Fische", icon: "set_meal", check: (gs) => (gs.stats.totalCaught || 0) >= 100, rew: 500 },
    { id: "level_10", name: "Level 10", desc: "Erreiche Level 10", icon: "star", check: (gs) => (gs.level || 1) >= 10, rew: 300 }
];

// ========== GLOBALE VARIABLEN ==========
let currentUser = null;
let gameState = null;
let globalState = null;
let autoAnglerTimer = null;
let currentMinigame = null;
let mgClicksNeeded = 0;
let mgClicksLeft = 0;
let mgInterval = null;

// ========== HELFER ==========
window.showToast = (msg, color = "#3b82f6", icon = "info") => {
    let tc = document.getElementById("toast-container");
    if (!tc) return;
    let t = document.createElement("div");
    t.className = "toast";
    t.style.borderLeftColor = color;
    t.innerHTML = `${window.M(icon)} <span>${msg}</span>`;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3000);
};

function log(msg) {
    let logEl = document.getElementById("log");
    if (!logEl) return;
    let e = document.createElement("div");
    e.className = "log-entry";
    e.innerHTML = msg;
    logEl.prepend(e);
    while (logEl.children.length > 30) logEl.removeChild(logEl.lastChild);
}

function formatWeight(g) { return g >= 1000 ? (g / 1000).toFixed(2) + " kg" : Math.floor(g) + " g"; }

function getTimeOfDay() { return "day"; }
function updateTimeOfDay() { document.getElementById("timeDisplay").innerHTML = window.M("light_mode") + " Tag"; }

function getCurrentEventInfo() {
    let now = Date.now();
    if (globalState?.event && now < globalState.event.exp) return { event: globalState.event, timeLeft: globalState.event.exp - now };
    return { event: null, timeLeft: 0 };
}

function saveData() { if (currentUser && gameState) set(ref(db, "users/" + currentUser), gameState); }

// ========== FANG-LOGIK ==========
function roll(zoneIdx) {
    let pool = items.filter(i => i.z === zoneIdx);
    let total = pool.reduce((s, i) => s + i.c, 0);
    let r = Math.random() * total;
    let baseItem = pool[0];
    for (let i of pool) { if (r < i.c) { baseItem = i; break; } r -= i.c; }
    let isShiny = Math.random() < 0.01;
    let itemW = baseItem.minW + Math.random() * (baseItem.maxW - baseItem.minW);
    let finalVal = baseItem.isTrash ? baseItem.v : Math.max(1, Math.floor(baseItem.v * (0.5 + (itemW - baseItem.minW) / (baseItem.maxW - baseItem.minW))));
    return {
        n: (isShiny && !baseItem.isTrash ? "Mutierter " : "") + baseItem.n,
        baseName: baseItem.n,
        v: isShiny ? finalVal * 5 : finalVal,
        xp: isShiny ? Math.abs(baseItem.xp) * 5 : baseItem.xp,
        isTrash: baseItem.isTrash && !isShiny,
        isShiny: isShiny && !baseItem.isTrash,
        e: baseItem.e,
        weightG: itemW,
        id: Math.random().toString(36).substr(2, 9)
    };
}

function addToInventory(item) {
    if (!gameState.inventory) gameState.inventory = [];
    gameState.inventory.push(item);
    if (!item.isTrash) {
        gameState.stats.totalCaught++;
        addQuestProgress("c", 1);
        if (!gameState.dex) gameState.dex = {};
        let base = item.baseName;
        if (!gameState.dex[base]) gameState.dex[base] = { normal: false, shiny: false, count: 0, maxW: 0 };
        if (item.isShiny) gameState.dex[base].shiny = true;
        else gameState.dex[base].normal = true;
        gameState.dex[base].count++;
        if (item.weightG > (gameState.dex[base].maxW || 0)) gameState.dex[base].maxW = item.weightG;
    }
    gameState.xp += Math.abs(item.xp);
    while (gameState.xp >= gameState.level * 50) {
        gameState.xp -= gameState.level * 50;
        gameState.level++;
        log(`${window.M("star", "c-shiny")} LEVEL UP! Jetzt Level ${gameState.level}`);
        window.showToast(`Level ${gameState.level} erreicht!`, "#facc15", "star");
    }
    updateUI();
    saveData();
    checkAchievements();
}

function addQuestProgress(type, amt) {
    if (!gameState.qs) gameState.qs = { p: { dc: 0, de: 0, wc: 0, we: 0, mc: 0, me: 0 }, c: {}, d: "", w: "", m: "" };
    let dailyKey = new Date().toISOString().slice(0, 10);
    if (gameState.qs.d !== dailyKey) {
        gameState.qs.d = dailyKey;
        gameState.qs.p.dc = 0;
        gameState.qs.p.de = 0;
        gameState.qs.c = {};

    if (type === "c") { gameState.qs.p.dc += amt; gameState.qs.p.wc += amt; gameState.qs.p.mc += amt; }
    if (type === "e") { gameState.qs.p.de += amt; gameState.qs.p.we += amt; gameState.qs.p.me += amt; }
}

// ========== ANGELN MIT MINIGAME ==========
window.handleFish = async function() {
    let btn = document.getElementById("btnFish");
    if (btn.disabled) return;
    btn.disabled = true;
    document.getElementById("fishing-scene").classList.add("fishing-active");
    
    // Köder verbrauchen
    if (gameState.eqBait !== "none" && gameState.baits?.[gameState.eqBait] > 0) {
        gameState.baits[gameState.eqBait]--;
        if (gameState.baits[gameState.eqBait] <= 0) gameState.eqBait = "none";
        updateUI();
        saveData();
    }
    
    let rod = rodsDB[gameState.eqRod] || rodsDB.rod1;
    let timeBonus = rod.speed || 0;
    let waitTime = Math.max(2, 60 * (1 - timeBonus / 100));
    
    btn.innerHTML = `${window.M("phishing")} Angeln... (${Math.floor(waitTime)}s)`;
    let remaining = waitTime;
    let interval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(interval);
            startMinigame(rod);
        } else {
            btn.innerHTML = `${window.M("phishing")} Angeln... (${remaining}s)`;
        }
    }, 1000);
    
    async function startMinigame(rod) {
        let item = roll(gameState.zone);
        let isBoss = !item.isTrash && (item.v >= 200 || item.n.includes("Waller"));
        
        if (isBoss) {
            await startBossMinigame(item, rod);
        } else {
            // Einfacher Fang
            addToInventory(item);
            let msg = `${item.e} Gefangen: ${item.n} ${item.weightG ? "[" + formatWeight(item.weightG) + "]" : ""} (${item.v}$)`;
            if (item.isShiny) msg = `${window.M("science", "c-shiny")} MUTATION! ${msg}`;
            log(msg);
            window.showToast(`${item.n} gefangen! +${item.v}$`, "#10b981", "set_meal");
        }
        
        document.getElementById("fishing-scene").classList.remove("fishing-active");
        btn.disabled = false;
        btn.innerHTML = `${window.M("phishing")} Angeln`;
        updateUI();
        saveData();
        syncGlobalLeaderboard();
    }
};

async function startBossMinigame(item, rod) {
    return new Promise((resolve) => {
        currentMinigame = item;
        mgClicksNeeded = Math.floor(20 + (item.v / 50));
        mgClicksLeft = mgClicksNeeded;
        
        document.getElementById("mg-fish-name").innerHTML = `${item.e} ${item.n}`;
        document.getElementById("mg-fish-emoji").innerHTML = item.e;
        document.getElementById("mg-player-bar").style.width = "0%";
        document.getElementById("mg-player-val").innerText = "0";
        document.getElementById("mg-fish-bar").style.width = "100%";
        document.getElementById("mg-fish-val").innerText = "100";
        document.getElementById("mg-clicks-left").innerHTML = `Noch ${mgClicksLeft} Klicks!`;
        
        document.getElementById("minigame-overlay").classList.add("active");
        
        let playerPower = 0;
        let fishPower = 100;
        
        const clickHandler = () => {
            mgClicksLeft--;
            playerPower = Math.min(100, playerPower + (100 / mgClicksNeeded));
            fishPower = Math.max(0, fishPower - 2);
            document.getElementById("mg-player-bar").style.width = playerPower + "%";
            document.getElementById("mg-player-val").innerText = Math.floor(playerPower);
            document.getElementById("mg-fish-bar").style.width = fishPower + "%";
            document.getElementById("mg-fish-val").innerText = Math.floor(fishPower);
            document.getElementById("mg-clicks-left").innerHTML = `Noch ${mgClicksLeft} Klicks!`;
            
            if (mgClicksLeft <= 0 || playerPower >= 100) {
                cleanup();
                if (playerPower >= 100 || mgClicksLeft <= 0) {
                    log(`${window.M("swords", "c-rod")} BOSS BESIEGT! ${item.n} (${item.v}$)`);
                    addToInventory(item);
                    window.showToast(`${item.n} gefangen! +${item.v}$`, "#facc15", "emoji_events");
                } else {
                    log(`${window.M("air")} Entkommen: ${item.n} hat sich losgerissen!`);
                    window.showToast(`${item.n} entkommen!`, "#ef4444", "error");
                }
                resolve();
            }
        };
        
        const btn = document.getElementById("btnSpamClick");
        btn.addEventListener("click", clickHandler);
        
        const cleanup = () => {
            btn.removeEventListener("click", clickHandler);
            document.getElementById("minigame-overlay").classList.remove("active");
            if (mgInterval) clearInterval(mgInterval);
            currentMinigame = null;
        };
        
        mgInterval = setInterval(() => {
            if (currentMinigame) {
                fishPower = Math.max(0, fishPower - 0.5);
                document.getElementById("mg-fish-bar").style.width = fishPower + "%";
                document.getElementById("mg-fish-val").innerText = Math.floor(fishPower);
                if (fishPower <= 0) {
                    cleanup();
                    log(`${window.M("swords", "c-rod")} BOSS BESIEGT! ${item.n} (${item.v}$)`);
                    addToInventory(item);
                    window.showToast(`${item.n} gefangen! +${item.v}$`, "#facc15", "emoji_events");
                    resolve();
                }
            }
        }, 100);
    });
}

let currentWheelRotation = 0;
const wheelPrizes = [
    { label: "100$", rew: (gs) => { gs.money += 100; gs.stats.totalEarned += 100; log("+100$ vom Glücksrad!"); } },
    { label: "500$", rew: (gs) => { gs.money += 500; gs.stats.totalEarned += 500; log("+500$ vom Glücksrad!"); } },
    { label: "1000$", rew: (gs) => { gs.money += 1000; gs.stats.totalEarned += 1000; log("+1000$ vom Glücksrad!"); } },
    { label: "50 XP", rew: (gs) => { gs.xp += 50; log("+50 XP vom Glücksrad!"); } },
    { label: "Köder", rew: (gs) => { if (!gs.baits) gs.baits = {}; gs.baits.b1 = (gs.baits.b1 || 0) + 20; log("+20x Brot vom Glücksrad!"); } },
    { label: "Niete", rew: (gs) => { log("Leider nichts gewonnen!"); } }
];

function drawWheel(ctx, cx, cy, r, rotation) {
    let slices = wheelPrizes.length;
    let angleStep = (Math.PI * 2) / slices;
    for (let i = 0; i < slices; i++) {
        let start = i * angleStep + rotation;
        let end = start + angleStep;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.fillStyle = ["#10b981", "#3b82f6", "#facc15", "#a855f7", "#f97316", "#64748b"][i % 6];
        ctx.fill();
        ctx.strokeStyle = "#1e293b";
        ctx.stroke();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + angleStep / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText(wheelPrizes[i].label, r - 30, 5);
        ctx.restore();
    }
}

    canvas.width = 250;

    canvas.style.width = "100%";

    drawWheel(ctx, 125, 125, 120, 0);
    
    let html = `<div style="text-align:center;">
        <div style="position:relative;width:250px;margin:0 auto;">
            <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);color:#facc15;">${window.M("arrow_drop_down")}</div>

    openModal("Glücksrad", html);

window.spinWheel = function() {
    let now = Date.now();
    let DAY = 86400000;
    if (gameState.lastWheelSpin && (now - gameState.lastWheelSpin) < DAY) return;
    gameState.lastWheelSpin = now;
    
    let idx = Math.floor(Math.random() * wheelPrizes.length);
    let prize = wheelPrizes[idx];
    prize.rew(gameState);
    
    while (gameState.xp >= gameState.level * 50) {
        gameState.xp -= gameState.level * 50;
        gameState.level++;
        log(`${window.M("star", "c-shiny")} LEVEL UP!`);
    }
    
    updateUI();
    saveData();
    window.closeModal();
    window.showToast(`Gewonnen: ${prize.label}!`, "#facc15", "casino");
    window.handleWheelMenu();
};

// ========== BANK ==========
window.handleBankMenu = function() {
    if (!gameState.bankUnlocked) {
        let canUnlock = gameState.money >= 25000 && gameState.prestige >= 1;
        openModal("Bank", `<div style="text-align:center"><p>Bank freischalten: 25.000$ + Prestige 1</p><button class="success-btn" ${!canUnlock ? "disabled" : ""} onclick="unlockBank()">Freischalten</button></div>`);
    } else {
        let bank = gameState.bank || { deposited: 0 };
        let html = `<div class="inv-card">
            <div class="inv-stat"><span>Bargeld:</span><span>${Math.floor(gameState.money).toLocaleString()}$</span></div>
            <div class="inv-stat"><span>Bank-Einlage:</span><span>${Math.floor(bank.deposited).toLocaleString()}$</span></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px;">
            <input id="bankAmt" type="number" placeholder="Betrag" style="flex:1;padding:10px;border-radius:8px;background:#0d1117;border:1px solid #30363d;color:white;">
            <button class="success-btn" onclick="bankDeposit()">Einzahlen</button>
            <button class="update-btn" onclick="bankWithdraw()">Auszahlen</button>
        </div>`;
        openModal("Bank", html);
    }
};

window.unlockBank = function() {
    gameState.money -= 25000;
    gameState.bankUnlocked = true;
    if (!gameState.bank) gameState.bank = { deposited: 0 };
    updateUI();
    saveData();
    window.handleBankMenu();
};

window.bankDeposit = function() {
    let amt = parseInt(document.getElementById("bankAmt")?.value);
    if (isNaN(amt) || amt <= 0 || amt > gameState.money) return;
    gameState.money -= amt;
    if (!gameState.bank) gameState.bank = { deposited: 0 };
    gameState.bank.deposited += amt;
    updateUI();
    saveData();
    window.handleBankMenu();
};

window.bankWithdraw = function() {
    let amt = parseInt(document.getElementById("bankAmt")?.value);
    if (isNaN(amt) || amt <= 0 || amt > (gameState.bank?.deposited || 0)) return;
    gameState.money += amt;
    gameState.bank.deposited -= amt;
    updateUI();
    saveData();
    window.handleBankMenu();
};

setInterval(() => {
    if (gameState?.bankUnlocked && gameState.bank?.deposited > 0) {
        let interest = Math.floor(gameState.bank.deposited * 0.05);
        if (interest > 0) {
            gameState.bank.deposited += interest;
            if (!gameState.bank.interestEarned) gameState.bank.interestEarned = 0;
            gameState.bank.interestEarned += interest;
            log(`${window.M("account_balance")} Bank: ${interest}$ Zinsen erhalten!`);
            updateUI();
            saveData();
        }
    }
}, 7200000); // Alle 2 Stunden

window.upgradeSkill = function(skill) {
    let spent = gameState.skills.shiny + gameState.skills.aqua;
    let avail = (gameState.level - 1) - spent;
    if (avail > 0 && gameState.skills[skill] < 999) {
        gameState.skills[skill]++;
        updateUI();
        saveData();
        window.handleSkillsMenu();
        window.showToast(`${skill === "shiny" ? "Shiny-Jäger" : "Aquarium-Meister"} verbessert!`, "#10b981");
    }
};

// ========== FIREBASE SYNC ==========
function syncGlobalLeaderboard() {
    if (currentUser && gameState) {
        set(ref(db, "global/leaderboard/" + currentUser), {
            name: currentUser,
            prestige: gameState.prestige || 0,
            level: gameState.level || 1,
            money: gameState.money || 0,
            stats: { totalCaught: gameState.stats.totalCaught || 0 }
        });
    }
}

async function loadData() {
    if (!currentUser) return;
    
    // User data listener
    onValue(ref(db, "users/" + currentUser), async (snap) => {
        let acc = await get(ref(db, "accounts/" + currentUser));
        if (!acc.exists()) return;
        
        if (snap.exists()) {
            gameState = snap.val();
        } else {
            gameState = {
                name: currentUser,
                money: 100,
                xp: 0,
                level: 1,
                zone: 0,
                inventory: [],
                dex: {},
                aquarium: { unlocked: false, fishes: [] },
                lastDaily: 0,
                dailyStreak: 0,
                prestige: 0,
                stats: { totalCaught: 0, totalEarned: 0 },
                ownedRods: ["rod1"],
                eqRod: "rod1",
                baits: {},
                eqBait: "none",
                bannedUntil: 0,
                rodStats: {},
                usedCodes: {},
                guild: "",
                skills: { shiny: 0, aqua: 0 },
                achievements: {},
                bank: { deposited: 0 },
                lastWheelSpin: 0,
                boatUpgraded: false,
                autoFishUnlocked: false,
                bankUnlocked: false,
                qs: { p: { dc: 0, de: 0, wc: 0, we: 0, mc: 0, me: 0 }, c: {}, d: "", w: "", m: "" }
            };
            saveData();
        }
        
        if (gameState.autoFishUnlocked && !autoAnglerTimer) {
            document.getElementById("autoBoatContainer").style.display = "block";
            autoAnglerTimer = setInterval(() => executeAutoFishCatch(), 60000);
        }
        
        updateUI();
        checkAchievements();
    });
    
    // Global state listener
    onValue(ref(db, "global"), (snap) => {
        globalState = snap.exists() ? snap.val() : null;
    });
    
    // Leaderboard listener
    onValue(ref(db, "global/leaderboard"), (snap) => {
        if (snap.exists()) {
            let data = snap.val();
            let users = [];
            for (let k in data) users.push(data[k]);
            users.sort((a, b) => (b.stats?.totalCaught || 0) - (a.stats?.totalCaught || 0));
            lastLeaderboardUsers = users;
        }
    });
}

// ========== LOGIN ==========
document.getElementById("btnLogin").addEventListener("click", async () => {
    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value.trim();
    let err = document.getElementById("login-error");
    err.style.display = "none";
    
    if (u.length < 3 || p.length < 3) {
        err.innerText = "Min. 3 Zeichen!";
        err.style.display = "block";
        return;
    }
    
    try {
        let snap = await get(ref(db, "accounts/" + u));
        if (snap.exists()) {
            if (snap.val() === p) {
                currentUser = u;
                localStorage.setItem("vFisher_user", u);
                document.getElementById("authBox").style.display = "none";
                document.getElementById("game").style.display = "block";
                loadData();
            } else {
                err.innerText = "Falsches Passwort!";
                err.style.display = "block";
            }
        } else {
            await set(ref(db, "accounts/" + u), p);
            currentUser = u;
            localStorage.setItem("vFisher_user", u);
            document.getElementById("authBox").style.display = "none";
            document.getElementById("game").style.display = "block";
            loadData();
        }
    } catch (error) {
        err.innerText = "Verbindungsfehler!";
        err.style.display = "block";
    }
});

document.getElementById("btnLogout").addEventListener("click", () => {
