<!DOCTYPE html>
<html lang="de">
<head>

    <style>
        /* --- GRUNDDESIGN & HINTERGRUND --- */
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e6f0ff; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; background-color: #010409;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') center/cover no-repeat;
            opacity: 0.50; /* Deckkraft auf 50% für bessere Lesbarkeit */
            z-index: -1;

        /* --- HAUPT-CONTAINER --- */
        .container {
            width: 440px; background: #161b22; padding: 20px; border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center; position: relative; animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ANGEL-ANIMATION & WETTER --- */
        #fishing-scene {
            height: 80px; position: relative; margin-bottom: 15px; border-bottom: 3px solid #3b82f6;
            overflow: hidden; border-radius: 12px 12px 0 0; background: rgba(0, 0, 0, 0.4);
        }

        .rod-anim {
            font-size: 35px; position: absolute; bottom: -5px; left: 45%;
            transform-origin: bottom right; transition: 0.3s; display: none; z-index: 2;
        }

        @keyframes cast { 0% { transform: rotate(0deg); } 30% { transform: rotate(-40deg); } 100% { transform: rotate(10deg); } }
        .animate-rod { display: block; animation: cast 0.6s ease-in-out; }

        .water-effect {
            position: absolute; bottom: 0; width: 200%; height: 18px;
            background: rgba(59, 130, 246, 0.5); animation: waves 3s linear infinite; z-index: 1;

        @keyframes waves { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Wetter Effekte */
        .sun-fx { position: absolute; top: 10px; right: 20px; width: 25px; height: 25px; background: #facc15; border-radius: 50%; box-shadow: 0 0 20px 10px rgba(250, 204, 21, 0.6); animation: pulseSun 2s infinite alternate; }
        @keyframes pulseSun { from { transform: scale(1); opacity: 0.8;} to { transform: scale(1.2); opacity: 1;} }
        
        .rain-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(170deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 2%, rgba(255,255,255,0.3) 2.5%, rgba(255,255,255,0) 3%); background-size: 100% 200%; animation: rainFall 0.4s linear infinite; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); animation: fadeIn 0.2s; }

        .quest-row { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }

    </style>
</head>

    {n:"Blobfisch",v:60,c:10,z:2,e:"🐡"}, {n:"Hai",v:80,c:8,z:2,e:"🦈"}, {n:"Laternenfisch",v:100,c:6,z:2,e:"💡"}, 
    {n:"Riesenkalmar",v:150,c:4,z:2,e:"🦑"}, {n:"Anglerfisch",v:200,c:3,z:2,e:"🎣"}, {n:"Riemenfisch",v:250,c:2,z:2,e:"🐉"},

    {n:"Megalodon",v:1500,c:0.5,z:3,e:"🦖"}, {n:"Nessie",v:2500,c:0.2,z:3,e:"🦕"}, {n:"Poseidons Dreizack",v:5000,c:0.05,z:3,e:"🔱"}
];

function getRarity(c) {
    if(c >= 15) return { l: "Gewöhnlich", cl: "rarity-common" };
    if(c >= 8) return { l: "Selten", cl: "rarity-rare" };

}

];

const specialEvents = [

    { name: "🌧️ Monsun", type: "rain", boost: 2, target: "Speed", desc: "Angeln geht doppelt so schnell!" },

const EVENT_DURATION = 1000 * 60 * 60 * 2; // 2 Stunden
function getCurrentEventInfo() {
    let now = Date.now();
    let cycleIndex = Math.floor(now / EVENT_DURATION) % specialEvents.length;
    let nextCycleTime = (Math.floor(now / EVENT_DURATION) + 1) * EVENT_DURATION;
    return { event: specialEvents[cycleIndex], timeLeft: nextCycleTime - now };
}

const questDB = {
    daily: [ {id:'d1',desc:'Fange 15 Fische',t:'c',req:15,rew:50}, {id:'d2',desc:'Fange 30 Fische',t:'c',req:30,rew:100}, {id:'d3',desc:'Fange 50 Fische',t:'c',req:50,rew:200}, {id:'d4',desc:'Verdiene 250$',t:'e',req:250,rew:100}, {id:'d5',desc:'Verdiene 1000$',t:'e',req:1000,rew:300} ],

};

function getResetKeys() {
    let d = new Date(); let daily = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; let monthly = `${d.getFullYear()}-${d.getMonth()}`;
    let d0 = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); let dayNum = d0.getUTCDay() || 7; d0.setUTCDate(d0.getUTCDate() + 4 - dayNum); let yStart = new Date(Date.UTC(d0.getUTCFullYear(),0,1));
    let weekNo = Math.ceil((((d0 - yStart) / 86400000) + 1)/7); let weekly = `${d0.getUTCFullYear()}-W${weekNo}`;
    return { daily, weekly, monthly };
}
function checkQuestResets() {
    let k = getResetKeys(); if(!gameState.qs || typeof gameState.qs.d !== 'string') gameState.qs = { d: k.daily, w: k.weekly, m: k.monthly, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    let qs = gameState.qs; let save = false;
    if(qs.d !== k.daily) { qs.d = k.daily; qs.p.dc=0; qs.p.de=0; for(let c in qs.c) if(c.startsWith('d')) delete qs.c[c]; save=true; }
    if(qs.w !== k.weekly) { qs.w = k.weekly; qs.p.wc=0; qs.p.we=0; for(let c in qs.c) if(c.startsWith('w')) delete qs.c[c]; save=true; }
    if(qs.m !== k.monthly) { qs.m = k.monthly; qs.p.mc=0; qs.p.me=0; for(let c in qs.c) if(c.startsWith('m')) delete qs.c[c]; save=true; }
    if(save) saveData();
}
function addQuestProgress(t, amt) { let p = gameState.qs.p; if(t === 'c') { p.dc+=amt; p.wc+=amt; p.mc+=amt; } if(t === 'e') { p.de+=amt; p.we+=amt; p.me+=amt; } }

function roll(zIdx, rodLvl) {
    let { event } = getCurrentEventInfo(); 
    // Fische nur aus DER ZONE (zIdx) oder universelle Müll/Schuh/Alge (-1)
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    
    if (gameState.bait > 0) pool = pool.filter(i => i.v >= 0); // Premium Köder blockt Müll
    
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodLvl * 0.1);
        if (i.n === event.target) w *= event.boost; // Event Boost
        return { ...i, weight: w };
    });
    
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total;
    let baseItem = pool[0];
    for (let i of modPool) { if (r < i.weight) { baseItem = i; break; } r -= i.weight; }
    
    // Shiny/Mutation Logik
    let shinyChance = 0.01;
    if (event.type === "sun") shinyChance *= event.boost;
    let isShiny = Math.random() < shinyChance;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, e: baseItem.e, isShiny: false };
    
    if (isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n;
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    return finalItem;
}

function updateDex(item) {
    if(!gameState.dex[item.baseName]) gameState.dex[item.baseName] = { normal: false, shiny: false };
    if(item.isShiny) gameState.dex[item.baseName].shiny = true; else gameState.dex[item.baseName].normal = true;
}

async function loadData() {
    if (!currentUser) return;
    try {
        const snap = await get(ref(db, "users/" + currentUser));
        if (snap.exists()) { gameState = snap.val(); } 
        else { gameState = { name: currentUser, money: 0, xp: 0, level: 1, rod: 0, zone: 0, combo: 0, inventory: {}, dex: {}, bait: 0, net: { level: 0, lastClaim: Date.now() }, lastDaily: 0, dailyStreak: 0, prestige: 0, stats: { totalCaught: 0, totalEarned: 0 } }; }
        if(!gameState.inventory) gameState.inventory={}; if(!gameState.dex) gameState.dex={}; if(!gameState.net) gameState.net={level:0, lastClaim:Date.now()}; if(!gameState.stats) gameState.stats={totalCaught:0,totalEarned:0};
        gameState.combo = 0; checkQuestResets(); updateUI();
        document.getElementById("authBox").style.display = "none"; document.getElementById("game").style.display = "block"; log(`✅ Willkommen zurück!`);

}

window.handleFish = function() {
    const btn = document.getElementById('btnFish'); btn.disabled = true;
    const rod = document.getElementById('rod'); rod.classList.remove('animate-rod'); void rod.offsetWidth; rod.classList.add('animate-rod');
    
    let { event } = getCurrentEventInfo();
    let speed = event.type === "rain" ? 400 : 800; // Rain = Fast Fishing

    setTimeout(() => {
        let i = roll(gameState.zone, gameState.rod);
        
        if (i.baseName === "Müll" || i.baseName === "Schuh" || i.baseName === "Alge") {
            if(gameState.combo > 5) log(`❌ Combo gebrochen durch ${i.baseName}!`);
            gameState.combo = 0;
        } else { gameState.combo++; }
        
        let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
        let finalValue = Math.floor(i.v * comboMult);
        let finalXp = Math.floor(5 * (i.isShiny ? 5 : 1) * comboMult);

        gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; updateDex(i);
        gameState.xp += finalXp; gameState.stats.totalCaught++; addQuestProgress('c', 1);
        if(gameState.bait > 0) gameState.bait--;
        
        let msg = i.isShiny ? `<span style="color:#fcd34d; font-weight:bold;">🧬 MUTATION: ${i.e} ${i.baseName} (${finalValue}$)</span>` : `${i.e} Gefangen: ${i.baseName} (${finalValue}$)`;
        if (gameState.xp >= gameState.level * 50) { gameState.xp -= gameState.level * 50; gameState.level++; msg += `<br>⭐ LEVEL UP! Level ${gameState.level}!`; }
        
        updateUI(); log(msg); saveData(); btn.disabled = false;
    }, speed);
}

window.handleSellMenu = function() {
    let base = 0; let has = false; let html = `<h3>Dein Rucksack</h3>`;
    for (let k in gameState.inventory) {
        if (gameState.inventory[k] > 0) { 
            has = true; let isMutant = k.startsWith("🧬 "); let baseN = isMutant ? k.replace("🧬 ", "") : k;
            let baseItem = items.find(x=>x.n===baseN);
            let val = (isMutant ? baseItem.v * 5 : baseItem.v) * gameState.inventory[k];
            base += val; html += `<div class="item-row"><span>${gameState.inventory[k]}x ${baseItem.e} ${k}</span><span style="color:${val>=0?'#10b981':'#ef4444'}">${val.toLocaleString()}$</span></div>`; 
        }
    }
    if (!has) return openModal("💰 Verkauf", "<p>Dein Rucksack ist leer!</p>");
    let bonus = gameState.prestige * 1; let finalTotal = Math.floor(base * (1 + (bonus / 100)));
    html += `<hr><div class="item-row" style="color:#94a3b8;"><span>Basiswert:</span><span>${base.toLocaleString()}$</span></div>`;
    if (bonus > 0 && base > 0) html += `<div class="item-row" style="color:#f59e0b;"><span>🏆 Prestige (+${bonus}%):</span><span>+${(finalTotal - base).toLocaleString()}$</span></div>`;
    html += `<div class="item-row" style="font-weight:bold; font-size:18px; color:${finalTotal>=0?'#10b981':'#ef4444'};"><span>Gesamt:</span><span>${finalTotal.toLocaleString()}$</span></div>`;
    openModal("💰 Verkauf", html, `<button class="success-btn" onclick="executeSell(${finalTotal})">Alles Verkaufen</button>`);
}

window.handleQuestMenu = function() {
    checkQuestResets(); let qs = gameState.qs; let html = ``;
    function build(title, list, pC, pE) {
        let sec = `<h4 style="color:#60a5fa; border-bottom:1px solid #30363d; margin-bottom:10px; margin-top: 15px;">${title}</h4>`;
        list.forEach(q => {
            let prog = q.t === 'c' ? qs.p[pC] : qs.p[pE]; let done = prog >= q.req; let claimed = qs.c[q.id]; let dProg = Math.min(prog, q.req);
            sec += `<div class="quest-row"><div><b>${q.desc}</b><br><span style="font-size:12px;color:#94a3b8;">${dProg.toLocaleString()} / ${q.req.toLocaleString()}</span></div><div>`;
            if (claimed) sec += `✅`; else if (done) sec += `<button class="success-btn" style="padding: 6px 10px; font-size: 12px;" onclick="claimQuest('${q.id}', ${q.rew})">${q.rew}$</button>`; else sec += `<span style="font-size: 12px; color: #94a3b8;">🔒 ${q.rew}$</span>`;
            sec += `</div></div>`;
        }); return sec;
    }
    html += build("🌞 Daily Quests", questDB.daily, 'dc', 'de') + build("📅 Weekly", questDB.weekly, 'wc', 'we') + build("🏆 Monthly", questDB.monthly, 'mc', 'me'); openModal("📜 Missionen", html);
}
window.claimQuest = function(id, rew) { gameState.qs.c[id]=true; gameState.money+=rew; gameState.stats.totalEarned+=rew; updateUI(); saveData(); handleQuestMenu(); }

window.handleDailyMenu = function() {
    let now = Date.now(); let DAY = 86400000; let can = false; let nStr = gameState.dailyStreak;
    if (gameState.lastDaily === 0 || now - gameState.lastDaily >= DAY * 2) { can=true; nStr=1; } else if (now - gameState.lastDaily >= DAY) { can=true; nStr=Math.min(nStr+1, 7); }
    let html = `<div class="daily-bar-container"><p style="font-size:13px; margin:0 0 10px 0;">Logge dich täglich ein!</p>`; let cur = 0;
    for (let i = 1; i <= 7; i++) {
        let rew = i * 100 + (gameState.prestige * 50); let cl = ""; let ic = "⏳";
        if (i < nStr || (!can && i <= nStr)) { cl="missed"; ic="✅"; } else if (i === nStr && can) { cl="active"; ic="🎁"; cur=rew; }
        html += `<div class="daily-day ${cl}"><span>Tag ${i}</span><span>${ic} ${rew}$</span></div>`;
    }
    html += `</div>`; if(!can) html += `<p style="color:#fcd34d; text-align: center;">⏳ Komm in ${Math.ceil((DAY-(now-gameState.lastDaily))/3600000)}h wieder.</p>`;
    openModal("🎁 Daily Belohnung", html, can ? `<button class="success-btn" onclick="claimDaily(${cur},${nStr})">Abholen (${cur}$)</button>` : "");
}
window.claimDaily = function(rew, str) { gameState.money+=rew; gameState.stats.totalEarned+=rew; gameState.lastDaily=Date.now(); gameState.dailyStreak=str; updateUI(); saveData(); closeModal(); }
