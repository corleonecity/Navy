<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Fisher PRO v3.3</title>
    <style>
        /* --- GRUNDDESIGN & EMOJIS --- */
        body {
            margin: 0; 
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Segoe UI', Tahoma, sans-serif;
            color: #e6f0ff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; 
            transition: background 1s ease-in-out;
            background: radial-gradient(circle at center, #0f172a 0%, #010409 100%);
        }

        /* --- AQUARIUM HINTERGRUND --- */
        #aquarium-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; /* Fix: Jetzt vor dem Body-Hintergrund sichtbar! */
            pointer-events: none; overflow: hidden;
        }
        .aqua-fish-entity {
            position: absolute; font-size: 55px; filter: drop-shadow(0 0 10px rgba(59,130,246,0.5));
            transition: all 4s linear; white-space: nowrap;
        }

        /* Zonen Hintergründe */
        body.zone-bg-0 { background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%); }
        body.zone-bg-1 { background: radial-gradient(circle at top, #0284c7 0%, #082f49 100%); }
        body.zone-bg-2 { background: radial-gradient(circle at bottom, #1e1b4b 0%, #020617 100%); }
        body.zone-bg-3 { background: radial-gradient(circle at center, #4c1d95 0%, #000000 100%); }

        .bg-bubbles { position: fixed; bottom: -50px; background: rgba(255,255,255,0.05); border-radius: 50%; animation: floatUp linear infinite; z-index: 0; }
        @keyframes floatUp { to { transform: translateY(-120vh) scale(1.5); opacity: 0; } }

        /* --- ADMIN BUTTON --- */
        #btnAdminTop {
            position: fixed; top: 15px; right: 20px; background: rgba(15, 23, 42, 0.8); border: 1px solid #3b82f6; 
            font-size: 28px; cursor: pointer; display: none; z-index: 1000; padding: 10px; border-radius: 50%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); transition: 0.2s; backdrop-filter: blur(5px);
        }
        #btnAdminTop:hover { transform: scale(1.1) rotate(45deg); background: #3b82f6; }

        /* --- HAUPT-CONTAINER --- */
        .container {
            width: 95%; max-width: 500px; 
            background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; position: relative; animation: fadeIn 0.4s ease-out;
            max-height: 98vh; display: flex; flex-direction: column; z-index: 10;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ANGEL-ANIMATION --- */
        #fishing-scene {
            height: 120px; position: relative; margin-bottom: 10px; border-bottom: 3px solid #3b82f6;
            overflow: hidden; border-radius: 12px 12px 0 0; flex-shrink: 0; background: transparent;
        }
        .boat-container { position: absolute; bottom: 12px; left: 15%; animation: bobbingBoat 3s ease-in-out infinite; z-index: 3; }
        @keyframes bobbingBoat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-3px) rotate(2deg); } }
        .fisher-emoji { font-size: 36px; display: inline-block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        
        .bobber { position: absolute; bottom: 15px; left: 60%; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 1px solid #7f1d1d; transition: 0.2s; z-index: 3; box-shadow: 0 0 5px rgba(239,68,68,0.8); }
        .fishing-active .bobber { animation: bobbing 0.8s ease-in-out; }
        @keyframes bobbing { 0% { bottom: 15px; } 20% { bottom: 12px; } 40% { bottom: -2px; opacity: 0.4; } 80% { bottom: -2px; opacity: 0.4; } 100% { bottom: 15px; } }

        #fishing-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .water-layer-1 { position: absolute; bottom: 0; width: 200%; height: 20px; background: linear-gradient(90deg, rgba(59,130,246,0.2) 0%, rgba(59,130,246,0.5) 25%, rgba(59,130,246,0.2) 50%, rgba(59,130,246,0.5) 75%, rgba(59,130,246,0.2) 100%); animation: waves 4s linear infinite; z-index: 4; }
        .water-layer-2 { position: absolute; bottom: 5px; width: 200%; height: 20px; background: linear-gradient(90deg, rgba(29,78,216,0.2) 0%, rgba(29,78,216,0.5) 25%, rgba(29,78,216,0.2) 50%, rgba(29,78,216,0.5) 75%, rgba(29,78,216,0.2) 100%); animation: waves 5s linear infinite reverse; z-index: 2; }
        @keyframes waves { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Wetter & Events FX */
        .sun-fx { position: absolute; top: 10px; right: 20px; width: 35px; height: 35px; background: #facc15; border-radius: 50%; box-shadow: 0 0 30px 15px rgba(250, 204, 21, 0.6); animation: pulseSun 2s infinite alternate; }
        @keyframes pulseSun { from { transform: scale(1); opacity: 0.8;} to { transform: scale(1.2); opacity: 1;} }
        .rain-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(170deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 2%, rgba(255,255,255,0.3) 2.5%, rgba(255,255,255,0) 3%); background-size: 100% 200%; animation: rainFall 0.3s linear infinite; z-index: 5;}
        @keyframes rainFall { from { background-position: 0 0; } to { background-position: 0 100%; } }
        .shark-fx { position: absolute; bottom: 2px; font-size: 26px; animation: swimShark 6s linear infinite; z-index: 3; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));}
        @keyframes swimShark { 0% { right: -50px; transform: scaleX(-1); } 100% { right: 120%; transform: scaleX(-1); } }

        /* --- UI & BUTTONS --- */
        #top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 14px; font-weight: bold; flex-shrink: 0;}
        #stats-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 15px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;}
        .equip-bar { display: flex; justify-content: space-between; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 8px 10px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; flex-shrink: 0;}

        #game-controls { flex-grow: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column;}
        #game-controls::-webkit-scrollbar { width: 0px; } 

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 6px; flex-shrink: 0;}
        .btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; flex-shrink: 0;}

        button { padding: 10px; border: none; border-radius: 8px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; transition: 0.15s; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        button:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { background: #334155; cursor: not-allowed; opacity: 0.7; transform: none;}

        .danger-btn { background: #ef4444; flex-direction: row; }
        .prestige-btn { background: #8b5cf6; flex-direction: row; font-size: 14px; flex-shrink: 0;} 
        .success-btn { background: #10b981; flex-direction: row; }
        .update-btn { background: #0ea5e9; flex-direction: row; }
        .admin-btn { background: #f43f5e; flex-direction: row; }

        input, select { padding: 12px; width: 100%; margin: 5px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }

        /* Log */
        #log { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px; font-size: 14px; text-align: left; border-left: 4px solid #3b82f6; margin-top: 10px; flex-shrink: 0;}
        #log::-webkit-scrollbar { width: 6px; } #log::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .log-entry { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 1.4; word-break: break-word; }
        .log-entry:last-child { border-bottom: none; }

        /* --- MODAL / POPUP SYSTEM --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(5px); animation: fadeIn 0.2s; padding: 10px; box-sizing: border-box;}
        .modal-content { background: #161b22; width: 100%; max-width: 500px; max-height: 90vh; border-radius: 14px; border: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .modal-header { background: #0d1117; padding: 15px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; flex-shrink: 0;}
        .modal-body { padding: 20px; overflow-y: auto; font-size: 15px; text-align: left; }
        .modal-body::-webkit-scrollbar { width: 6px; } .modal-body::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .modal-footer { padding: 15px 20px; background: #0d1117; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #30363d; flex-shrink: 0;}
        .close-btn { background: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0; transition: 0.2s; } .close-btn:hover { color: #f87171; transform: scale(1.2); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .quest-row { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
        
        /* SCHICKE MENÜS AUS v2.5 */
        .daily-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px;}
        .daily-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 5px; text-align: center; transition: 0.2s; }
        .daily-card.day7 { grid-column: span 3; background: rgba(245, 158, 11, 0.05); border-color: #fcd34d; padding: 15px;}
        .daily-card.active { background: rgba(59,130,246,0.2); border-color: #3b82f6; transform: scale(1.05); box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .daily-card.missed { opacity: 0.4; }

        .leader-row { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; border: 1px solid #30363d; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .leader-row:hover { border-color: #60a5fa; background: rgba(96,165,250,0.1); transform: translateX(5px); }

        .profile-card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .profile-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 10px;}
        .profile-avatar { font-size: 35px; background: #1e293b; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #60a5fa; flex-shrink: 0;}
        .profile-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 16px; font-weight: bold; color: #60a5fa; }
        .stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

        .update-log-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #30363d; }
        .update-title { color: #60a5fa; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .update-list { font-size: 14px; color: #94a3b8; padding-left: 20px; margin: 0; line-height: 1.6; }

        .fish-dex-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
        .dex-card { background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid #30363d; text-align: center; cursor: pointer; transition: 0.2s; }
        .dex-card:hover:not(.locked) { transform: translateY(-2px); border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .dex-card.locked { opacity: 0.3; filter: grayscale(100%); cursor: not-allowed; }
        
        /* --- KAMPF MINI-GAME UI & Boss-Shake --- */
        #minigame-container { 
            background: #0f172a; padding: 25px; border-radius: 12px; border: 2px solid #ef4444; 
            text-align: center; width: 100%; box-sizing: border-box; box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.2);
            transition: all 0.2s;
        }
        .power-bar-bg { width: 100%; background: #1e293b; height: 30px; border-radius: 6px; overflow: hidden; margin: 5px 0 15px 0; border: 2px solid #334155;}
        .power-bar-fill { height: 100%; transition: width 0.1s linear; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-weight: bold; font-size: 12px;}

        @keyframes bossShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .boss-active { animation: bossShake 0.5s infinite; border-color: #facc15 !important; box-shadow: inset 0 0 80px rgba(250, 204, 21, 0.4) !important;}

        @media (max-width: 480px) { .btn-grid { grid-template-columns: 1fr 1fr; } .btn-grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>

function getCurrentEventInfo() {
    let now = Date.now();
    if (globalState && globalState.event && now < globalState.event.exp) {
        return { event: globalState.event, timeLeft: globalState.event.exp - now };
    }
    let cycle = 30 * 60 * 1000;
    let epoch = Math.floor(now / cycle);
    let evtDef = specialEvents[epoch % specialEvents.length];
    return { event: evtDef, timeLeft: ((epoch + 1) * cycle) - now };
}

function roll(zIdx) {
    let { event } = getCurrentEventInfo();
    let rodDef = rodsDB[gameState.eqRod]; let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    if (baitDef && baitDef.type === "clean") pool = pool.filter(i => i.v >= 0); 
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if (baitDef && baitDef.type === "boost") w *= 1.05; 
        if (i.n === event.target) w *= event.boost;
        return { ...i, weight: w };
    });
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total; let baseItem = pool[0];
    for (let i of modPool) { if (r < i.weight) { baseItem = i; break; } r -= i.weight; }
    
    let shinyChance = 0.01;
    if (event.type === "sun") shinyChance *= event.boost;
    if (baitDef && baitDef.type === "shiny") shinyChance *= 3; 
    if (baitDef && baitDef.type === "shinyStrong") shinyChance *= 5; 

    let isShiny = Math.random() < shinyChance;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, e: baseItem.e, isShiny: false };
    
    if (isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n;
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    
    // Pseudo-Gewicht für das Minispiel berechnen
    finalItem.weight = Math.floor(Math.random() * (finalItem.v/2)) + (finalItem.v/3);
    if(finalItem.weight < 1 && finalItem.v > 0) finalItem.weight = 1;
    
    return finalItem;
}

function updateDex(item) {

    gameState.dex[item.baseName].count++;
}

function getResetKeys() {
    let d = new Date(); let daily = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; let monthly = `${d.getFullYear()}-${d.getMonth()}`;
    let d0 = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); let dayNum = d0.getUTCDay() || 7; d0.setUTCDate(d0.getUTCDate() + 4 - dayNum); let yStart = new Date(Date.UTC(d0.getUTCFullYear(),0,1));
    let weekNo = Math.ceil((((d0 - yStart) / 86400000) + 1)/7); let weekly = `${d0.getUTCFullYear()}-W${weekNo}`;
    return { daily, weekly, monthly };
}

function checkQuestResets() {
    let k = getResetKeys(); 
    if(!gameState.qs || typeof gameState.qs !== 'object') {
        gameState.qs = { d: k.daily, w: k.weekly, m: k.monthly, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    }
    if(typeof gameState.qs.d !== 'string') gameState.qs.d = k.daily;
    if(typeof gameState.qs.w !== 'string') gameState.qs.w = k.weekly;
    if(typeof gameState.qs.m !== 'string') gameState.qs.m = k.monthly;
    if(!gameState.qs.p || typeof gameState.qs.p !== 'object') gameState.qs.p = { dc:0, de:0, wc:0, we:0, mc:0, me:0 };
    if(!gameState.qs.c || typeof gameState.qs.c !== 'object') gameState.qs.c = {};

    let qs = gameState.qs; let save = false;
    if(qs.d !== k.daily) { qs.d = k.daily; qs.p.dc=0; qs.p.de=0; for(let c in qs.c) if(c.startsWith('d')) delete qs.c[c]; save=true; }
    if(qs.w !== k.weekly) { qs.w = k.weekly; qs.p.wc=0; qs.p.we=0; for(let c in qs.c) if(c.startsWith('w')) delete qs.c[c]; save=true; }
    if(qs.m !== k.monthly) { qs.m = k.monthly; qs.p.mc=0; qs.p.me=0; for(let c in qs.c) if(c.startsWith('m')) delete qs.c[c]; save=true; }
    if(save) saveData();
}

async function loadData() {
    if (!currentUser) return;
    
    onValue(ref(db, "global"), (snap) => {
        if (snap.exists()) globalState = snap.val();
        else globalState = null;
    });

    onValue(ref(db, "users/" + currentUser), (snap) => {
        if (snap.exists()) { gameState = snap.val(); } 
        else { 
            if (!gameState) {
                gameState = { name: currentUser, money: 0, xp: 0, level: 1, zone: 0, combo: 0, inventory: {}, dex: {}, aquarium: { unlocked: false, fishes: [] }, lastDaily: 0, dailyStreak: 0, prestige: 0, stats: { totalCaught: 0, totalEarned: 0 } }; 
                saveData(); 
            }
        }
        
        if(gameState) {
            if(!gameState.inventory) gameState.inventory={}; if(!gameState.dex) gameState.dex={}; 
            if(!gameState.aquarium) gameState.aquarium = { unlocked: false, fishes: [] };
            if(!gameState.ownedRods) { gameState.ownedRods = ["r1"]; gameState.eqRod = "r1"; } 
            if(!gameState.baits) { gameState.baits = {}; gameState.eqBait = "none"; }
            if(!gameState.stats) { gameState.stats = { totalCaught: 0, totalEarned: 0 }; }
            
            checkQuestResets(); updateUI(); renderAquarium();
            
            if(document.getElementById("authBox").style.display !== "none") {
                document.getElementById("authBox").style.display = "none"; 
                document.getElementById("game").style.display = "flex"; 
                document.getElementById("log").innerHTML = ""; 
                log(`Willkommen zurück, ${currentUser}!`); 
                if(currentUser === "colin") document.getElementById("btnAdminTop").style.display = "block";
            }
        }
    });
    
    setInterval(() => {
        if(gameState && gameState.aquarium && gameState.aquarium.fishes.length > 0) {
            let income = 0;
            gameState.aquarium.fishes.forEach(f => { income += Math.floor(f.v * 0.1); }); 
            if(income > 0) {
                gameState.money = Number(gameState.money) + income;
                log(`🐟 Aquarium: Fische haben ${income}$ erwirtschaftet.`);
                saveData(); updateUI();
            }
        }
    }, 60000);
}

let minigameActive = false;
let mgPlayerPower = 0;
let mgFishPower = 50;
let mgFishItem = null;
let mgTimer = null;
let mgClicksNeeded = 5;
let mgClickTimeout = 1000;
let mgLastClick = 0;
let mgStartTime = 0;

function triggerMinigame(item) {
    minigameActive = true;
    mgFishItem = item;
    mgPlayerPower = 0;
    mgFishPower = Math.floor(Math.random() * 51) + 50; // 50-100%
    mgStartTime = Date.now();
    mgLastClick = Date.now();
    
    document.getElementById('minigame-container').classList.add('boss-active');

    if(item.isShiny) { mgClicksNeeded = 25; mgClickTimeout = 600; }
    else if(item.v >= 500) { mgClicksNeeded = 40; mgClickTimeout = 400; }
    else if(item.v >= 200) { mgClicksNeeded = 30; mgClickTimeout = 500; }
    else { mgClicksNeeded = 15; mgClickTimeout = 800; }

    document.getElementById('minigame-overlay').style.display = 'flex';
    document.getElementById('mg-fish-name').innerText = item.n.toUpperCase() + (item.weight ? ` (${Math.floor(item.weight)}kg)` : '');
    document.getElementById('mg-fish-emoji').innerText = item.e;
    
    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

    updateMinigameUI();

    mgTimer = setInterval(() => {
        if(!minigameActive) return clearInterval(mgTimer);
        
        let now = Date.now();
        if(now - mgLastClick > mgClickTimeout) {
            finishMinigame(false, "timeout");
            return;
        }
        if(now - mgStartTime > 20000) {
            finishMinigame(false, "toolong");
            return;
        }

        mgFishPower -= 0.1; // Sinkt 1% pro Sekunde
        if(mgFishPower < 0) mgFishPower = 0;
        
        updateMinigameUI();
    }, 100);
}

document.getElementById('btnSpamClick').addEventListener('click', () => {
    if(!minigameActive) return;
    
    mgLastClick = Date.now();
    mgClicksNeeded--;
    mgPlayerPower += Math.floor(Math.random() * 11) + 5; 
    mgPlayerPower -= 2; 
    
    if(mgPlayerPower > 100) mgPlayerPower = 100;
    
    if(navigator.vibrate) navigator.vibrate(30);
    
    if(mgClicksNeeded <= 0) {
        finishMinigame(true);
    }
    updateMinigameUI();
});

function updateMinigameUI() {
    document.getElementById('mg-player-val').innerText = Math.floor(mgPlayerPower);
    document.getElementById('mg-player-bar').style.width = Math.min(100, Math.max(0, mgPlayerPower)) + "%";
    
    document.getElementById('mg-fish-val').innerText = Math.floor(mgFishPower);
    document.getElementById('mg-fish-bar').style.width = Math.min(100, Math.max(0, mgFishPower)) + "%";
    
    document.getElementById('mg-clicks-left').innerText = `Noch ${mgClicksNeeded} Klicks bis Fang!`;
}

function finishMinigame(won, reason = "") {
    minigameActive = false;
    clearInterval(mgTimer);
    document.getElementById('minigame-overlay').style.display = 'none';
    document.getElementById('minigame-container').classList.remove('boss-active');
    
    if(won) {
        if(navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 200]);
        gameState.combo++;
        let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
        
        let bonusMult = 1;
        let timeTaken = Date.now() - mgStartTime;
        if(mgPlayerPower >= 100) bonusMult = 2; // Perfekt
        else if(timeTaken < 5000) bonusMult = 1.5; // Schnell
        else if(mgPlayerPower > 80) bonusMult = 1.25;
        else if(mgPlayerPower > 50) bonusMult = 1.1;
        
        let finalValue = Math.floor(mgFishItem.v * comboMult * bonusMult);
        let finalXp = Math.floor(5 * (mgFishItem.isShiny ? 5 : 1) * comboMult);
        if(mgPlayerPower >= 100) finalXp = Math.floor(finalXp * 1.5); 

        gameState.inventory[mgFishItem.n] = (gameState.inventory[mgFishItem.n] || 0) + 1; updateDex(mgFishItem);
        gameState.xp += finalXp; gameState.stats.totalCaught++;
        
        let msg = `⚔️ BOSS BESIEGT! ${mgFishItem.e} ${mgFishItem.baseName} (${finalValue}$) geschnappt!`;
        if (gameState.xp >= gameState.level * 50) { gameState.xp -= gameState.level * 50; gameState.level++; msg += ` ⭐ LEVEL UP!`; }
        updateUI(); log(msg); saveData();
    } else {
        if(navigator.vibrate) navigator.vibrate(500); 
        
        let r = Math.random();
        if(r < 0.25 || gameState.eqRod === 'r1') { 
            log(`❌ Boss reißt aus! Combo auf 0.`);
        } else if(r < 0.5) { 
            let loss = Math.floor(gameState.money * 0.1);
            gameState.money -= loss;
            log(`❌ Boss verletzt dich! Du verlierst ${loss}$. Combo auf 0.`);
        } else if(r < 0.75) { 
            log(`❌ Boss zerstört deine Rute (${rodsDB[gameState.eqRod].name})!`);
            gameState.ownedRods = gameState.ownedRods.filter(rd => rd !== gameState.eqRod);
            gameState.eqRod = 'r1';
        } else { 
            if(gameState.eqBait !== 'none') {
                log(`❌ Boss frisst deinen Köder (${baitsDB[gameState.eqBait].name})!`);
                gameState.baits[gameState.eqBait] = 0;
                gameState.eqBait = 'none';
            } else {
                log(`❌ Boss reißt aus! Combo auf 0.`);
            }
        }
        gameState.combo = 0;
        updateUI(); saveData();
    }
    
    document.getElementById('btnFish').disabled = false;
    document.getElementById('fishing-scene').classList.remove('fishing-active');
}

// --- NORMALES ANGELN ---
window.handleFish = function() {
    const btn = document.getElementById('btnFish'); btn.disabled = true;
    const scene = document.getElementById('fishing-scene'); scene.classList.add('fishing-active');

    setTimeout(() => {
        let i = roll(gameState.zone);
        gameState.lastCatchTime = Date.now() + 3000; 
        
        if(gameState.eqBait !== "none") {
            gameState.baits[gameState.eqBait]--;
            if(gameState.baits[gameState.eqBait] <= 0) { log(`❌ Dein Köder ist aufgebraucht!`); gameState.eqBait = "none"; }
        }

        // MINUS-XP UND GELD BEI MÜLL (GELD WIRD DIREKT ABGEZOGEN)
        if (i.v < 0) {
            gameState.combo = 0;
            let penalty = Math.abs(i.v);
            gameState.money -= penalty; // Direkter Geldverlust
            gameState.xp -= penalty; // Direkter XP Verlust
            if(gameState.xp < 0) gameState.xp = 0; // Nicht unter 0 XP fallen
            
            let msg = `❌ ${i.e} ${i.baseName} gefangen! Du verlierst ${penalty}$ und ${penalty} XP!`;
            updateUI(); log(msg); saveData();
            scene.classList.remove('fishing-active'); btn.disabled = false;
            return; // Müll wird nicht mehr in den Rucksack gepackt!
        }

        gameState.combo++;

        // TRIGGER MINIGAME NUR BEI BOSSEN
        if(i.isShiny || i.v >= 150) {
            triggerMinigame(i);
            return;
        }
        
        let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
        let finalValue = Math.floor(i.v * comboMult);
        let finalXp = Math.floor(5 * (i.isShiny ? 5 : 1) * comboMult);

        gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; updateDex(i);
        gameState.xp += finalXp; gameState.stats.totalCaught++; addQuestProgress('c', 1);
        
        let msg = i.isShiny ? `<span style="color:#fcd34d; font-weight:bold;">🧬 MUTATION: ${i.e} ${i.baseName} (${finalValue}$)</span>` : `${i.e} Gefangen: ${i.baseName} (${finalValue}$)`;
        if (gameState.xp >= gameState.level * 50) { gameState.xp -= gameState.level * 50; gameState.level++; msg += `<br>⭐ LEVEL UP! Level ${gameState.level}!`; }
        
        updateUI(); log(msg); saveData();
        scene.classList.remove('fishing-active'); btn.disabled = false;
    }, 800);
}

window.handleSellMenu = function() {
    let base = 0; let has = false; let html = `<h3>Dein Rucksack</h3>`;
    for (let k in gameState.inventory) {
        if (gameState.inventory[k] > 0) { 
            has = true; let isMutant = k.startsWith("🧬 "); let baseN = isMutant ? k.replace("🧬 ", "") : k;
            let baseItem = items.find(x=>x.n===baseN); let val = (isMutant ? baseItem.v * 5 : baseItem.v) * gameState.inventory[k]; base += val; 
            
            // FIX FÜR DEN AQUARIUM BUTTON: Encodierte URL-Strings gegen Emoji-Bugs!
            let encodedName = encodeURIComponent(k);
            html += `<div class="item-row" style="flex-wrap: wrap;">
                <div style="width:100%; margin-bottom:5px;"><b>${gameState.inventory[k]}x ${baseItem.e} ${k}</b> (<span style="color:${val>=0?'#10b981':'#ef4444'}">${val.toLocaleString()}$</span>)</div>
                ${val > 0 && gameState.aquarium.unlocked ? `<button class="update-btn" style="width:100%; padding:8px; font-size:12px;" onclick="sendToAquarium('${encodedName}')">🐟 Ins Aquarium setzen</button>` : ''}
            </div>`; 
        }
    }
    if (!has) return openModal("💰 Rucksack", "<p>Dein Rucksack ist leer!</p>");
    
    let bonus = gameState.prestige * 1; let finalTotal = base;
    if (base > 0) finalTotal = Math.floor(base * (1 + (bonus / 100)));
    
    html += `<hr><div class="item-row" style="color:#94a3b8;"><span>Basiswert:</span><span>${base.toLocaleString()}$</span></div>`;
    if (bonus > 0 && base > 0) html += `<div class="item-row" style="color:#f59e0b;"><span>🏆 Prestige (+${bonus}%):</span><span>+${(finalTotal - base).toLocaleString()}$</span></div>`;
    html += `<div class="item-row" style="font-weight:bold; font-size:22px; color:${finalTotal>=0?'#10b981':'#ef4444'};"><span>Gesamt:</span><span>${finalTotal.toLocaleString()}$</span></div>`;
    openModal("💰 Rucksack", html, `<button class="success-btn" style="font-size:16px; padding: 12px 20px;" onclick="executeSell(${finalTotal})">Alles Verkaufen</button>`);
}

window.executeSell = function(val) { 
    let hasItems = false; for(let k in gameState.inventory) { if(gameState.inventory[k] > 0) hasItems = true; }
    if(!hasItems) return; 
    gameState.money = Math.floor(Number(gameState.money) + Number(val)); 
    if(val>0){ gameState.stats.totalEarned += Number(val); addQuestProgress('e', Number(val)); } 
    gameState.inventory = {}; updateUI(); log(`💰 Alles verkauft für ${Number(val).toLocaleString()}$`); saveData(); 
    handleSellMenu(); 
}

    if(Number(gameState.money) >= 50000) { gameState.money = Number(gameState.money) - 50000; }

}

window.sendToAquarium = function(encodedFishName) {
    let fishName = decodeURIComponent(encodedFishName);
    if(gameState.aquarium.fishes.length >= 5) { return alert("Das Standard-Becken ist voll! (Max 5 Fische)"); }
    gameState.inventory[fishName]--;
    let isMutant = fishName.startsWith("🧬 "); let baseN = isMutant ? fishName.replace("🧬 ", "") : fishName;
    let baseItem = items.find(x=>x.n===baseN);
    let val = isMutant ? baseItem.v * 5 : baseItem.v;
    
    gameState.aquarium.fishes.push({ n: fishName, e: baseItem.e, v: val });
    saveData(); renderAquarium(); handleSellMenu(); log(`🐟 ${fishName} wurde ins Aquarium gesetzt.`);
}

window.removeFromAquarium = function(idx) {
    let fish = gameState.aquarium.fishes.splice(idx, 1)[0];
    gameState.inventory[fish.n] = (gameState.inventory[fish.n] || 0) + 1;
    saveData(); renderAquarium(); handleAquaMenu(); log(`🐟 ${fish.n} wurde zurück in den Rucksack geholt.`);
}

                        <div class="stat-box"><div class="stat-lbl">Gefangen</div><div class="stat-val">${u.stats.totalCaught.toLocaleString()}</div></div>
                        <div class="stat-box"><div class="stat-lbl">Verdient</div><div class="stat-val">${u.stats.totalEarned.toLocaleString()}$</div></div>
                        <div class="stat-box"><div class="stat-lbl">Streak</div><div class="stat-val" style="color:#fcd34d;">${u.dailyStreak || 0} 🔥</div></div>
                    </div>
                </div>
                <button class="update-btn" style="width: 100%;" onclick="handleLeaderboard()">⬅ Zurück zum Leaderboard</button>
            `; openModal(`📊 Profil von ${u.name}`, html);
        }
    } catch(e) {}
}

window.handlePrestigeMenu = function() { 
    let reqLevel = 20 + (gameState.prestige * 5);
    let reqMoney = 5000 * Math.pow(2, gameState.prestige);
    let canPrestige = gameState.level >= reqLevel && gameState.money >= reqMoney;
    
    let html = `<div style="text-align: center;"><p style="color: #ef4444; font-weight: bold; font-size:16px;">Reset von Level, Geld, und Inventar!</p><p>Gibt +1% Bonus pro Prestige und schaltet Zonen frei.<br><i>(Deine gekauften Ruten, Fische im Aquarium und der Dex bleiben erhalten)</i></p><hr style="border-color: #30363d;"><p>Voraussetzung: <b>Level ${reqLevel}</b> und <b>${reqMoney.toLocaleString()}$</b></p></div>`;
    openModal("🔁 Prestige", html, canPrestige?`<button class="danger-btn" style="font-size: 16px; padding: 12px;" onclick="doPrestige()">⚠️ Prestige durchführen!</button>`:`<button disabled style="padding: 12px; font-size:16px;">Nicht bereit</button>`); 
}

window.doPrestige = function() { 
    gameState.prestige++; gameState.money=0; gameState.level=1; gameState.combo=0; gameState.inventory={}; saveData(); location.reload(); 
}

window.handleLeaderboard = async function() {
    openModal("🏆 Leaderboard", "<p style='text-align: center;'>Lade Spieler...</p>"); 
    try { 
        const snap = await get(ref(db,"users")); 
        if(snap.exists()) { 
            let usrs=[]; snap.forEach(c=>usrs.push(c.val())); 
            usrs.sort((a,b)=>b.prestige-a.prestige||b.level-a.level||b.money-a.money); 
            let html=``; 
            usrs.forEach((u,i)=> {
                let medal = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : `<b>${i+1}.</b>`;
                html+=`<div class="leader-row" onclick="showPlayerProfile('${u.name}')" style="${u.name===currentUser?'border:1px solid #10b981;':''}"><span>${medal} ${u.name}</span> <span style="text-align: right; font-size: 13px; color: #94a3b8;">Prestige ${u.prestige} | Lvl ${u.level}<br><span style="color:#10b981;">${Number(u.money).toLocaleString()}$</span></span></div>`;
            }); openModal("🏆 Globales Leaderboard", html); 
        } 
    } catch(e){ openModal("🏆 Leaderboard", "<p>Fehler beim Laden.</p>"); }
}

window.handleDailyMenu = function() {
    let now = Date.now(); let DAY = 86400000; let can = false; let nStr = gameState.dailyStreak;
    if (gameState.lastDaily === 0 || now - gameState.lastDaily >= DAY * 2) { can=true; nStr=1; } else if (now - gameState.lastDaily >= DAY) { can=true; nStr=Math.min(nStr+1, 7); }
    let html = `<div class="daily-grid">`; let cur = 0;
    for (let i = 1; i <= 7; i++) {
        let rew = i * 100 + (gameState.prestige * 50); let cl = "daily-card"; let ic = "⏳";
        if (i < nStr || (!can && i <= nStr)) { cl+=" missed"; ic="✅"; } else if (i === nStr && can) { cl+=" active"; ic="🎁"; cur=rew; }
        if (i === 7) cl += " day7";
        html += `<div class="${cl}"><span style="display:block; font-size:13px; color:#94a3b8; margin-bottom:5px;">Tag ${i}</span><span style="font-size:20px;">${ic}</span><br><b style="color:#10b981; font-size:16px;">${rew}$</b></div>`;
    }
    html += `</div>`; if(!can) html += `<p style="color:#fcd34d; text-align: center;">⏳ Komm in ${Math.ceil((DAY-(now-gameState.lastDaily))/3600000)}h wieder.</p>`;
    openModal("🎁 Daily Belohnung", html, can ? `<button class="success-btn" onclick="claimDaily(${cur},${nStr})">Abholen (${cur}$)</button>` : "");
}

window.claimDaily = function(rew, str) { 
    if (gameState.lastDaily > 0 && Date.now() - gameState.lastDaily < 86400000 && gameState.dailyStreak === str) return;
    gameState.money = Number(gameState.money) + rew; gameState.stats.totalEarned += rew; gameState.lastDaily=Date.now(); gameState.dailyStreak=str; updateUI(); saveData(); handleDailyMenu(); 
}

window.adminGive = async function() {
    let type = document.getElementById('adminGiveType').value;
    let tUser = document.getElementById('adminTargetUser').value.trim();
    let amtRaw = document.getElementById('adminAmount').value.trim();
    if(!tUser || !amtRaw) return alert("Bitte Username und Amount eingeben!");
    
    let amt = Number(amtRaw);
    if(isNaN(amt)) return alert("Menge muss eine Zahl sein!");

    const s = await get(ref(db, "users/" + tUser));
    if(s.exists()) {
        let uData = s.val();
        if(type === 'money') uData.money = Number(uData.money) + amt;
        if(type === 'level') { uData.level = Number(uData.level) + amt; uData.xp = 0; }
        if(type === 'prestige') uData.prestige = Number(uData.prestige) + amt;
        await set(ref(db, "users/" + tUser), uData);
        alert(`Erfolgreich ${amt} ${type} an ${tUser} gesendet!`);
    } else { alert("Spieler in DB nicht gefunden!"); }
}

window.adminStartEvent = function() { 
    let idx = document.getElementById("adminEventType").value;
    let evt = specialEvents[idx];
    set(ref(db, "global/event"), { ...evt, exp: Date.now() + 15 * 60000 }); 
    log(`👑 Admin Event gestartet: ${evt.name}`); 
    closeModal(); 
}

window.adminStopEvent = function() {
    set(ref(db, "global/event"), null); 
    log(`👑 Admin hat globale Events beendet.`); 
    closeModal();
}

window.adminCreateAccount = async function() {
    let nUser = document.getElementById('adminNewUser').value.trim();
    let nPass = document.getElementById('adminNewPass').value.trim();
    if(nUser.length < 3 || nPass.length < 4) return alert("Username min 3, Passwort min 4 Zeichen!");
    await set(ref(db, "accounts/" + nUser), nPass); alert(`Account ${nUser} erstellt!`);
}
window.adminDeleteAccount = async function() {
    let dUser = document.getElementById('adminDelUser').value.trim();
    if(!dUser) return alert("Bitte Username eingeben!");
    if(confirm(`Bist du sicher, dass du ${dUser} KOMPLETT löschen willst?`)) {
        await remove(ref(db, "accounts/" + dUser)); await remove(ref(db, "users/" + dUser)); alert(`Account ${dUser} vernichtet!`);
    }
}

window.onload = async () => {
    let savedUser = localStorage.getItem('vFisher_user');
    if(savedUser) {
        currentUser = savedUser;
        document.getElementById('login-error').style.display='none'; 
        await loadData();
    }
};

document.getElementById('btnLogin').addEventListener('click', async () => {
    let u = document.getElementById('username').value.trim(); 
    let p = document.getElementById('password').value;
    try {
        const snap = await get(ref(db, "accounts/" + u));
        if (snap.exists() && snap.val() === p) {
            document.getElementById('login-error').style.display='none'; 
            currentUser=u; localStorage.setItem('vFisher_user', u); await loadData(); 
        } else if (u === "colin" && p === "11012021") {
            await set(ref(db, "accounts/colin"), "11012021"); 
            document.getElementById('login-error').style.display='none'; 
            currentUser=u; localStorage.setItem('vFisher_user', u); await loadData(); 
        } else { 
            document.getElementById('login-error').style.display='block'; 
        }
    } catch(e) {
        document.getElementById('login-error').style.display='block';
    }
});
