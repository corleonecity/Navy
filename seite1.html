    <style>
        /* --- GRUNDDESIGN & HINTERGRUND --- */
        body {
            margin: 0; 
            /* Zwingt das System zur Apple Emoji Darstellung, wo möglich */
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Segoe UI', Tahoma, sans-serif;
            color: #e6f0ff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; 
            background: radial-gradient(circle at center, #0f172a 0%, #010409 100%);
        }

        .bg-bubbles { position: fixed; bottom: -50px; background: rgba(59,130,246,0.05); border-radius: 50%; animation: floatUp linear infinite; z-index: -1; }
        @keyframes floatUp { to { transform: translateY(-120vh) scale(1.5); opacity: 0; } }

        /* --- HAUPT-CONTAINER --- */
        .container {
            width: 95%; max-width: 550px; 
            background: #161b22; padding: 20px; border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); border: 1px solid rgba(59, 130, 246, 0.2);
            text-align: center; position: relative; animation: fadeIn 0.4s ease-out;
            max-height: 98vh; display: flex; flex-direction: column;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ADMIN BUTTON OBEN RECHTS --- */
        #btnAdminTop {
            position: absolute; top: 15px; right: 15px; background: transparent; border: none; 
            font-size: 26px; cursor: pointer; display: none; z-index: 50; padding: 0; box-shadow: none; transition: 0.2s;
        }
        #btnAdminTop:hover { transform: scale(1.1) rotate(15deg); filter: drop-shadow(0 0 5px #3b82f6); }

        /* --- ANGEL-ANIMATION & ZONEN FARBEN --- */
        #fishing-scene {
            height: 120px; position: relative; margin-bottom: 10px; border-bottom: 3px solid #3b82f6;
            overflow: hidden; border-radius: 12px 12px 0 0; transition: background 0.5s ease; flex-shrink: 0;
        }

        #fishing-scene.zone-0 .water-layer-1 { background: linear-gradient(90deg, rgba(59,130,246,0.3) 0%, rgba(59,130,246,0.5) 25%, rgba(59,130,246,0.3) 50%, rgba(59,130,246,0.5) 75%, rgba(59,130,246,0.3) 100%); }
        #fishing-scene.zone-0 .water-layer-2 { background: linear-gradient(90deg, rgba(29,78,216,0.3) 0%, rgba(29,78,216,0.5) 25%, rgba(29,78,216,0.3) 50%, rgba(29,78,216,0.5) 75%, rgba(29,78,216,0.3) 100%); }

        #fishing-scene.zone-1 { background: linear-gradient(180deg, rgba(14,165,233,0.6) 0%, rgba(2,132,199,0.5) 100%); }
        #fishing-scene.zone-1 .water-layer-1 { background: linear-gradient(90deg, rgba(14,165,233,0.3) 0%, rgba(14,165,233,0.5) 25%, rgba(14,165,233,0.3) 50%, rgba(14,165,233,0.5) 75%, rgba(14,165,233,0.3) 100%); }
        #fishing-scene.zone-1 .water-layer-2 { background: linear-gradient(90deg, rgba(2,132,199,0.3) 0%, rgba(2,132,199,0.5) 25%, rgba(2,132,199,0.3) 50%, rgba(2,132,199,0.5) 75%, rgba(2,132,199,0.3) 100%); }

        #fishing-scene.zone-2 { background: linear-gradient(180deg, rgba(15,23,42,0.9) 0%, rgba(30,58,138,0.8) 100%); }
        #fishing-scene.zone-2 .water-layer-1 { background: linear-gradient(90deg, rgba(30,58,138,0.3) 0%, rgba(30,58,138,0.6) 25%, rgba(30,58,138,0.3) 50%, rgba(30,58,138,0.6) 75%, rgba(30,58,138,0.3) 100%); }
        #fishing-scene.zone-2 .water-layer-2 { background: linear-gradient(90deg, rgba(15,23,42,0.4) 0%, rgba(15,23,42,0.7) 25%, rgba(15,23,42,0.4) 50%, rgba(15,23,42,0.7) 75%, rgba(15,23,42,0.4) 100%); }

        #fishing-scene.zone-3 { background: linear-gradient(180deg, rgba(88,28,135,0.8) 0%, rgba(126,34,206,0.6) 100%); }
        #fishing-scene.zone-3 .water-layer-1 { background: linear-gradient(90deg, rgba(168,85,247,0.3) 0%, rgba(168,85,247,0.5) 25%, rgba(168,85,247,0.3) 50%, rgba(168,85,247,0.5) 75%, rgba(168,85,247,0.3) 100%); }
        #fishing-scene.zone-3 .water-layer-2 { background: linear-gradient(90deg, rgba(126,34,206,0.3) 0%, rgba(126,34,206,0.5) 25%, rgba(126,34,206,0.3) 50%, rgba(126,34,206,0.5) 75%, rgba(126,34,206,0.3) 100%); }

        .boat-container { position: absolute; bottom: 12px; left: 15%; animation: bobbingBoat 3s ease-in-out infinite; z-index: 3; }
        @keyframes bobbingBoat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-3px) rotate(2deg); } }
        .fisher-emoji { font-size: 36px; display: inline-block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        
        .bobber { position: absolute; bottom: 15px; left: 60%; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 1px solid #7f1d1d; transition: 0.2s; z-index: 3; box-shadow: 0 0 5px rgba(239,68,68,0.8); }
        .fishing-active .bobber { animation: bobbing 0.8s ease-in-out; }
        @keyframes bobbing { 0% { bottom: 15px; } 20% { bottom: 12px; } 40% { bottom: -2px; opacity: 0.4; } 80% { bottom: -2px; opacity: 0.4; } 100% { bottom: 15px; } }

        #fishing-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .net-anim { position: absolute; bottom: 5px; right: 15%; font-size: 30px; animation: bobbingBoat 4s ease-in-out infinite reverse; z-index: 3; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); display: none; }

        .water-layer-1 { position: absolute; bottom: 0; width: 200%; height: 20px; animation: waves 4s linear infinite; z-index: 4; transition: background 0.5s ease;}
        .water-layer-2 { position: absolute; bottom: 5px; width: 200%; height: 20px; animation: waves 5s linear infinite reverse; z-index: 2; transition: background 0.5s ease;}
        @keyframes waves { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Wetter & Events FX */
        .sun-fx { position: absolute; top: 10px; right: 20px; width: 25px; height: 25px; background: #facc15; border-radius: 50%; box-shadow: 0 0 20px 10px rgba(250, 204, 21, 0.6); animation: pulseSun 2s infinite alternate; }
        @keyframes pulseSun { from { transform: scale(1); opacity: 0.8;} to { transform: scale(1.2); opacity: 1;} }
        .rain-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(170deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 2%, rgba(255,255,255,0.3) 2.5%, rgba(255,255,255,0) 3%); background-size: 100% 200%; animation: rainFall 0.3s linear infinite; z-index: 5;}
        @keyframes rainFall { from { background-position: 0 0; } to { background-position: 0 100%; } }
        .algae-container { position: absolute; bottom: -5px; width: 200%; display: flex; justify-content: space-around; font-size: 16px; animation: waves 6s linear infinite; z-index: 5; opacity: 0.8; }
        .shark-fx { position: absolute; bottom: 2px; font-size: 26px; animation: swimShark 6s linear infinite; z-index: 3; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));}
        @keyframes swimShark { 0% { right: -50px; transform: scaleX(-1); } 100% { right: 120%; transform: scaleX(-1); } }

        #top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 13px; font-weight: bold; flex-shrink: 0;}
        .tooltip { position: relative; cursor: help; border-bottom: 1px dotted #fff; }
        .tooltip .tooltiptext { visibility: hidden; width: 200px; background-color: #0f172a; color: #fff; text-align: center; border-radius: 8px; padding: 10px; position: absolute; z-index: 10; bottom: 150%; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.2s; border: 1px solid #3b82f6; font-size: 12px; font-weight: normal; box-shadow: 0 5px 15px rgba(0,0,0,0.5); pointer-events: none;}
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        #stats-bar { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;}
        .equip-bar { display: flex; justify-content: space-between; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 8px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; flex-shrink: 0;}

        /* Content Scroll */
        #game-controls { flex-grow: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column;}

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 6px; flex-shrink: 0;}
        .btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; flex-shrink: 0;}

        button { padding: 10px; border: none; border-radius: 8px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; transition: 0.15s; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        button:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { background: #334155; cursor: not-allowed; opacity: 0.7; transform: none;}

        .danger-btn { background: #ef4444; padding: 6px 10px; font-size: 11px; flex-direction: row; }
        .prestige-btn { background: #8b5cf6; flex-direction: row; font-size: 14px; flex-shrink: 0;} 
        .success-btn { background: #10b981; flex-direction: row; }
        .update-btn { background: #0ea5e9; flex-direction: row; }

        input { padding: 12px; width: 90%; margin: 8px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }

        /* --- NEUER GROSSER LOG --- */
        #log { 
            height: 250px; /* Sehr groß wie gewünscht */
            overflow-y: auto; background: #0d1117; padding: 12px; border-radius: 8px;

            line-height: 1.6; margin-top: 10px; flex-shrink: 0;
        }
        #log::-webkit-scrollbar { width: 6px; } #log::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* --- MODAL / POPUP SYSTEM --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); animation: fadeIn 0.2s; padding: 10px; box-sizing: border-box;}
        .modal-content { background: #161b22; width: 100%; max-width: 500px; max-height: 90vh; border-radius: 14px; border: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .modal-header { background: #0d1117; padding: 15px 20px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; flex-shrink: 0;}
        .modal-body { padding: 15px 20px; overflow-y: auto; font-size: 14px; text-align: left; }
        .modal-body::-webkit-scrollbar { width: 6px; } .modal-body::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .modal-footer { padding: 15px 20px; background: #0d1117; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #30363d; flex-shrink: 0;}
        .close-btn { background: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0; transition: 0.2s; } .close-btn:hover { color: #f87171; transform: scale(1.2); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .quest-row { background: #0d1117; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
        
        .dex-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .dex-tab { flex: 1; padding: 10px; background: #0d1117; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #30363d; transition: 0.2s; font-weight: bold;}
        .dex-tab.active { background: #2563eb; border-color: #3b82f6; }
        .fish-dex-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
        .dex-card { background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid #30363d; text-align: center; cursor: pointer; transition: 0.2s; }
        .dex-card:hover:not(.locked) { transform: translateY(-2px); border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .dex-card.locked { opacity: 0.3; filter: grayscale(100%); cursor: not-allowed; }
        .dex-emoji { font-size: 26px; margin-bottom: 5px; }
        .shiny-badge { font-size: 11px; background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fcd34d; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 5px;}

        .daily-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px;}
        .daily-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 5px; text-align: center; transition: 0.2s; }
        .daily-card.day7 { grid-column: span 3; background: rgba(245, 158, 11, 0.05); border-color: #fcd34d; padding: 15px;}
        .daily-card.active { background: rgba(59,130,246,0.2); border-color: #3b82f6; transform: scale(1.05); box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .daily-card.missed { opacity: 0.4; }

        .leader-row { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; border: 1px solid #30363d; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .leader-row:hover { border-color: #60a5fa; background: rgba(96,165,250,0.1); transform: translateX(5px); }

        .profile-card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .profile-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 10px;}
        .profile-avatar { font-size: 35px; background: #1e293b; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #60a5fa; flex-shrink: 0;}
        .profile-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 16px; font-weight: bold; color: #60a5fa; }
        .stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

        .update-log-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #30363d; }
        .update-title { color: #60a5fa; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .update-list { font-size: 14px; color: #94a3b8; padding-left: 20px; margin: 0; line-height: 1.6; }
        
        @media (max-width: 480px) {
            .btn-grid { grid-template-columns: 1fr 1fr; }
            .btn-grid-2 { grid-template-columns: 1fr; }
            #btnFish { font-size: 16px; padding: 12px; }
        }
    </style>
</head>

// --- 🌍 EVENT SYSTEM (Global + Local Fallback) ---
function getCurrentEventInfo() {
    let now = Date.now();
    if (globalState && globalState.event && now < globalState.event.exp) {
        return { event: globalState.event, timeLeft: globalState.event.exp - now, isGlobal: true };
    }
    if (gameState && gameState.ev && now < gameState.ev.exp) {
        return { event: gameState.ev, timeLeft: gameState.ev.exp - now, isGlobal: false };
    }
    return { event: specialEvents[0], timeLeft: 0, isGlobal: false }; 
}

function checkEvents() {
    let now = Date.now();
    if(!gameState.ev || now > gameState.ev.exp) {
        let dur = Math.floor(Math.random() * (15 - 5 + 1) + 5) * 60000; 
        let avail = specialEvents.filter(e => !gameState.ev || e.name !== gameState.ev.name); 
        let evtDef = avail[Math.floor(Math.random() * avail.length)];
        gameState.ev = { ...evtDef, exp: now + dur };
        saveData();
    }
}

function getResetKeys() {
    let d = new Date(); let daily = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; let monthly = `${d.getFullYear()}-${d.getMonth()}`;
    let d0 = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); let dayNum = d0.getUTCDay() || 7; d0.setUTCDate(d0.getUTCDate() + 4 - dayNum); let yStart = new Date(Date.UTC(d0.getUTCFullYear(),0,1));
    let weekNo = Math.ceil((((d0 - yStart) / 86400000) + 1)/7); let weekly = `${d0.getUTCFullYear()}-W${weekNo}`;
    return { daily, weekly, monthly };
}

function checkQuestResets() {
    let k = getResetKeys(); 
    if(!gameState.qs || typeof gameState.qs !== 'object') gameState.qs = {};
    if(typeof gameState.qs.d !== 'string' || typeof gameState.qs.w !== 'string' || typeof gameState.qs.m !== 'string') {

    }
    if(!gameState.qs.p || typeof gameState.qs.p !== 'object') gameState.qs.p = { dc:0, de:0, wc:0, we:0, mc:0, me:0 };
    if(!gameState.qs.c || typeof gameState.qs.c !== 'object') gameState.qs.c = {};

    let qs = gameState.qs; let save = false;
    if(qs.d !== k.daily) { qs.d = k.daily; qs.p.dc=0; qs.p.de=0; for(let c in qs.c) if(c.startsWith('d')) delete qs.c[c]; save=true; }
    if(qs.w !== k.weekly) { qs.w = k.weekly; qs.p.wc=0; qs.p.we=0; for(let c in qs.c) if(c.startsWith('w')) delete qs.c[c]; save=true; }
    if(qs.m !== k.monthly) { qs.m = k.monthly; qs.p.mc=0; qs.p.me=0; for(let c in qs.c) if(c.startsWith('m')) delete qs.c[c]; save=true; }

function getFishChance(zIdx, itemN) {
    if(!gameState) return 0;
    let { event } = getCurrentEventInfo(); let rodDef = rodsDB[gameState.eqRod]; let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    if (baitDef && (baitDef.type === "clean" || baitDef.type === "cleanStrong")) pool = pool.filter(i => i.v >= 0);
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if (baitDef && (baitDef.type === "boost" || baitDef.type === "boostStrong")) w *= (baitDef.type === "boost" ? 1.05 : 1.10);
        if (i.n === event.target) w *= event.boost;
        return { n: i.n, weight: w };
    });
    let total = modPool.reduce((s, i) => s + i.weight, 0);
    let myItem = modPool.find(x => x.n === itemN);
    return myItem ? ((myItem.weight / total) * 100).toFixed(2) : 0;
}

function roll(zIdx) {
    let { event } = getCurrentEventInfo(); let rodDef = rodsDB[gameState.eqRod]; let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    if (baitDef && (baitDef.type === "clean" || baitDef.type === "cleanStrong")) pool = pool.filter(i => i.v >= 0); 
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if (baitDef && (baitDef.type === "boost" || baitDef.type === "boostStrong")) w *= (baitDef.type === "boost" ? 1.05 : 1.10);
        if (i.n === event.target) w *= event.boost;
        return { ...i, weight: w };
    });
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total; let baseItem = pool[0];
    for (let i of modPool) { if (r < i.weight) { baseItem = i; break; } r -= i.weight; }
    
    let shinyChance = 0.01;
    if (event.type === "sun") shinyChance *= event.boost;
    if (baitDef && baitDef.type === "shiny") shinyChance *= 3; 
    if (baitDef && baitDef.type === "shinyStrong") shinyChance *= 5; 

    let isShiny = Math.random() < shinyChance;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, e: baseItem.e, isShiny: false };
    
    if (isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n;
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    return finalItem;
}

function updateDex(item) {
    if(!gameState.dex[item.baseName] || typeof gameState.dex[item.baseName] !== 'object') {
        gameState.dex[item.baseName] = { normal: false, shiny: false, count: 0 };
    }
    if(typeof gameState.dex[item.baseName].count !== 'number') gameState.dex[item.baseName].count = 0;
    
    if(item.isShiny) gameState.dex[item.baseName].shiny = true; 
    else gameState.dex[item.baseName].normal = true;
    
    gameState.dex[item.baseName].count++;
}

async function loadData() {
    if (!currentUser) return;
    
    onValue(ref(db, "global"), (snap) => {
        if (snap.exists()) globalState = snap.val();
        else globalState = null;
    });

    const userRef = ref(db, "users/" + currentUser);
    onValue(userRef, (snap) => {
        if (snap.exists()) { 
            gameState = snap.val(); 
        } else { 
            if (!gameState) {
                gameState = { name: currentUser, money: 0, xp: 0, level: 1, zone: 0, combo: 0, inventory: {}, dex: {}, net: { level: 0, lastClaim: Date.now() }, lastDaily: 0, dailyStreak: 0, prestige: 0, stats: { totalCaught: 0, totalEarned: 0 } }; 
                saveData(); 
            }
        }
        
        if(gameState) {
            if(!gameState.inventory) gameState.inventory={}; if(!gameState.dex) gameState.dex={}; if(!gameState.net) gameState.net={level:0, lastClaim:Date.now()}; if(!gameState.stats) gameState.stats={totalCaught:0,totalEarned:0};
            if(!gameState.ownedRods) { gameState.ownedRods = ["r1"]; gameState.eqRod = "r1"; } 
            if(!gameState.eqRod) gameState.eqRod = "r1";
            if(!gameState.baits) { gameState.baits = {}; gameState.eqBait = "none"; }
            if(!gameState.eqBait) gameState.eqBait = "none";
            
            for(let k in gameState.dex) {
                if(typeof gameState.dex[k] === 'boolean') {
                    gameState.dex[k] = { normal: gameState.dex[k], shiny: false, count: 1 };
                }
            }
            
            if(typeof gameState.combo === 'undefined') gameState.combo = 0; 
            if(typeof gameState.lastCatchTime === 'undefined') gameState.lastCatchTime = 0;
            
            checkQuestResets(); updateUI();
            
            if(document.getElementById("authBox").style.display !== "none") {
                document.getElementById("authBox").style.display = "none"; 
                document.getElementById("game").style.display = "flex"; 
                document.getElementById("log").innerHTML = ""; 
                log(`Willkommen zurück, ${currentUser}!`); 
                
                if(currentUser === "colin") document.getElementById("btnAdminTop").style.display = "block";
                else document.getElementById("btnAdminTop").style.display = "none";
            }
        }
    });
}

                gameState.combo = 0;
            } else { gameState.combo++; }
            
            let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
            let finalValue = Math.floor(i.v * comboMult);
            let finalXp = Math.floor(5 * (i.isShiny ? 5 : 1) * comboMult);

            gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; updateDex(i);
            gameState.xp += finalXp; gameState.stats.totalCaught++; addQuestProgress('c', 1);
            
            if(gameState.eqBait !== "none") {
                gameState.baits[gameState.eqBait]--;
                if(gameState.baits[gameState.eqBait] <= 0) { log(`❌ Dein Köder ist aufgebraucht!`); gameState.eqBait = "none"; }
            }
            
            let msg = i.isShiny ? `<span style="color:#fcd34d; font-weight:bold;">🧬 MUTATION: ${i.e} ${i.baseName} (${finalValue}$)</span>` : `${i.e} Gefangen: ${i.baseName} (${finalValue}$)`;
            if (gameState.xp >= gameState.level * 50) { gameState.xp -= gameState.level * 50; gameState.level++; msg += `<br>⭐ LEVEL UP! Level ${gameState.level}!`; }
            
            updateUI(); log(msg); saveData();
        } catch (err) { console.error(err); log("❌ Fehler beim Angeln."); } finally { scene.classList.remove('fishing-active'); btn.disabled = false; }
    }, speed);
}

window.handleSellMenu = function() {
    let base = 0; let has = false; let html = `<h3>Dein Rucksack</h3>`;
    for (let k in gameState.inventory) {
        if (gameState.inventory[k] > 0) { 
            has = true; let isMutant = k.startsWith("🧬 "); let baseN = isMutant ? k.replace("🧬 ", "") : k;
            let baseItem = items.find(x=>x.n===baseN); let val = (isMutant ? baseItem.v * 5 : baseItem.v) * gameState.inventory[k]; base += val; 
            html += `<div class="item-row"><span>${gameState.inventory[k]}x ${baseItem.e} ${k}</span><span style="color:${val>=0?'#10b981':'#ef4444'}">${val.toLocaleString()}$</span></div>`;

    if (!has) return openModal("💰 Verkauf", "<p>Dein Rucksack ist leer!</p>");

window.executeSell = function(val) { 
    let hasItems = false; for(let k in gameState.inventory) { if(gameState.inventory[k] > 0) hasItems = true; }

    gameState.inventory = {}; updateUI(); log(`💰 Alles verkauft für ${val.toLocaleString()}$`); saveData();

    let now = Date.now(); let DAY = 86400000; let can = false; let nStr = gameState.dailyStreak;

    let html = `<div class="daily-grid">`; let cur = 0;
    for (let i = 1; i <= 7; i++) {
        let rew = i * 100 + (gameState.prestige * 50); let cl = "daily-card"; let ic = "⏳";
        if (i < nStr || (!can && i <= nStr)) { cl+=" missed"; ic="✅"; } else if (i === nStr && can) { cl+=" active"; ic="🎁"; cur=rew; }
        if (i === 7) cl += " day7";

window.onload = async () => {
    let savedUser = localStorage.getItem('vFisher_user');
    if(savedUser && validAccounts[savedUser]) {
        currentUser = savedUser;
        document.getElementById('login-error').style.display='none'; 
        await loadData();
    }
};

document.getElementById('btnLogin').addEventListener('click', async () => {
    let u = document.getElementById('username').value.trim(); let p = document.getElementById('password').value;
    if (validAccounts[u] === p) { 
        document.getElementById('login-error').style.display='none'; 
        currentUser=u; localStorage.setItem('vFisher_user', u); await loadData(); 
    } else { document.getElementById('login-error').style.display='block'; }
});

document.getElementById('btnLogout').addEventListener('click', () => { localStorage.removeItem('vFisher_user'); location.reload(); });
