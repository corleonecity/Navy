<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Virtual Fisher Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#020617,#0a192f);
    color: #e6f0ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width: 480px;
    background: rgba(10,20,40,0.6);
    padding: 30px;
    border-radius: 16px;
}

button {
    margin:4px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;
}
button:hover { background:#3b82f6; }

#log {
    height:120px;
    overflow:auto;
    background:#00000060;
    padding:10px;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<h2>🎣 Virtual Fisher PRO</h2>

<button onclick="fish()">🎣 Angeln</button>
<button onclick="sell()">💰 Verkaufen</button>
<button onclick="daily()">🎁 Daily</button>
<button onclick="quest()">📜 Quest</button>
<button onclick="prestige()">🔁 Prestige</button>
<button onclick="buyRod()">🛒 Bessere Rute</button>
<button onclick="changeZone()">🌊 Zone wechseln</button>
<button onclick="profile()">📊 Profil</button>

<div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

const uid = "player1";

// 🌊 Zonen
const zones = ["See","Meer","Tiefsee"];

// 🎣 Items
const items = [
 {n:"Müll",v:-10,c:25,z:0},
 {n:"Schuh",v:-5,c:15,z:0},

 {n:"Karpfen",v:5,c:20,z:0},
 {n:"Forelle",v:10,c:15,z:0},

 {n:"Lachs",v:25,c:10,z:1},
 {n:"Thunfisch",v:40,c:8,z:1},

 {n:"Hai",v:80,c:3,z:2},
 {n:"Leviathan",v:400,c:0.5,z:2}
];

// 🎯 Get weighted item
function roll(zone, rod){
 let pool = items.filter(i=>i.z<=zone);
 let total = pool.reduce((s,i)=>s+i.c,0);
 let r = Math.random()*total;

 for(let i of pool){
   if(r < i.c * (1+rod*0.1)) return i;
   r -= i.c;
 }
}

// 🧱 Load user
async function load(){
 let s = await get(ref(db,"users/"+uid));
 return s.exists()?s.val():{
  money:0,xp:0,level:1,rod:0,zone:0,
  inventory:{},lastDaily:0,prestige:0,quest:0
 };
}

// 💾 Save
async function save(d){
 await set(ref(db,"users/"+uid),d);
}

// 🎣 Fish
window.fish = async ()=>{
 let d = await load();

 let item = roll(d.zone,d.rod);

 d.inventory[item.n]=(d.inventory[item.n]||0)+1;
 d.xp += 5;

 if(d.xp > d.level*50){
   d.xp=0;
   d.level++;
   log("⭐ Level Up!");
 }

 await save(d);
 log("🎣 "+item.n+" ("+item.v+"$)");
};

// 💰 Sell
window.sell = async ()=>{
 let d = await load();
 let total=0;

 for(let k in d.inventory){
   let i = items.find(x=>x.n===k);
   total += i.v * d.inventory[k];
 }

 d.money += total;
 d.inventory={};

 await save(d);
 log("💰 "+total+"$ verkauft");
};

// 🎁 Daily
window.daily = async ()=>{
 let d = await load();
 if(Date.now()-d.lastDaily<86400000) return log("⏳ Daily schon benutzt");

 let reward = 100 + d.prestige*50;
 d.money += reward;
 d.lastDaily = Date.now();

 await save(d);
 log("🎁 "+reward+"$");
};

// 📜 Quest
window.quest = async ()=>{
 let d = await load();
 d.quest++;

 if(d.quest>=5){
   d.money+=200;
   d.quest=0;
   log("📜 Quest fertig +200$");
 }

 await save(d);
};

// 🔁 Prestige
window.prestige = async ()=>{
 let d = await load();
 if(d.money<2000) return log("❌ 2000$ nötig");

 d.money=0;
 d.level=1;
 d.inventory={};
 d.prestige++;

 await save(d);
 log("🔁 Prestige "+d.prestige);
};

// 🛒 Rod
window.buyRod = async ()=>{
 let d = await load();
 let cost = (d.rod+1)*500;

 if(d.money<cost) return log("❌ Zu teuer");

 d.money-=cost;
 d.rod++;

 await save(d);
 log("🛒 Rute verbessert");
};

// 🌊 Zone
window.changeZone = async ()=>{
 let d = await load();
 d.zone = (d.zone+1)%zones.length;

 await save(d);
 log("🌊 "+zones[d.zone]);
};

// 📊 Profile
window.profile = async ()=>{
 let d = await load();

 log(`
💰 ${d.money}
⭐ Level ${d.level}
🎣 Rod ${d.rod}
🌊 ${zones[d.zone]}
🔁 Prestige ${d.prestige}
`);
};

// UI
function log(t){
 document.getElementById("log").innerText = t;
}
</script>

</body>
</html>
