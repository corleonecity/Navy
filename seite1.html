<div class="container">
    
    <!-- Animation Visuals -->
    <div id="fishing-scene">
        <div id="rod" class="rod-anim">🎣</div>
        <div class="water-effect"></div>
    </div>

    <!-- LOGIN -->
    <div id="authBox">
        <h3>🔐 Virtual Fisher Login</h3>
        <!-- Aus "email" wurde "username" -->
        <input id="username" placeholder="Spielername" autocomplete="username">
        <input id="password" type="password" placeholder="Passwort" autocomplete="current-password">
        <br>
        <button id="btnRegister">Registrieren</button>
        <button id="btnLogin">Login</button>
    </div>

    <!-- GAME -->
    <div id="game" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="zoneDisplay" style="font-weight: bold; color: #60a5fa;">🌊 See</span>
            <button id="btnLogout" class="danger-btn" style="padding: 5px 10px;">🚪 Logout</button>
        </div>
        
        <div id="stats-bar">
            <span id="ui-money">💰 0$</span>
            <span id="ui-level">⭐ Lvl 1 (0/50 XP)</span>
        </div>

        <button id="btnFish">🎣 Angeln</button>
        <button id="btnSell">💰 Verkaufen</button>
        <button id="btnDaily">🎁 Daily</button>
        <button id="btnRod">🛒 Rute kaufen</button>
        <button id="btnZone">🌊 Zone wechseln</button>
        <button id="btnPrestige">🔁 Prestige</button>
        <button id="btnProfile">📊 Profil</button>

        <div id="log">Willkommen zurück!</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG (Deine Keys hier einfügen)
const app = initializeApp({
  apiKey: "AIzaSy...", 
  authDomain: "khusland-b7d13.firebaseapp.com",
  databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const auth = getAuth(app);
let uid = null;
let gameState = null;
let tempNameForRegister = ""; // Speichert den Namen kurz für neue Accounts

const zones = ["See", "Meer", "Tiefsee"];
const items = [
 {n: "Müll", v: -10, c: 25, z: 0},
 {n: "Schuh", v: -5, c: 15, z: 0},
 {n: "Karpfen", v: 5, c: 20, z: 0},
 {n: "Forelle", v: 10, c: 15, z: 0},
 {n: "Lachs", v: 25, c: 10, z: 1},
 {n: "Thunfisch", v: 40, c: 8, z: 1},
 {n: "Hai", v: 80, c: 3, z: 2},
 {n: "Leviathan", v: 400, c: 0.5, z: 2}
];

function roll(zone, rodLevel) {
    let pool = items.filter(i => i.z <= zone);
    let modifiedPool = pool.map(item => ({ ...item, weight: item.c * (1 + rodLevel * 0.1) }));
    let total = modifiedPool.reduce((sum, item) => sum + item.weight, 0);
    let r = Math.random() * total;
    
    for (let item of modifiedPool) {
        if (r < item.weight) return item;
        r -= item.weight;
    }
    return pool[0];
}

async function loadData() {
    if (!uid) return;
    try {
        const snapshot = await get(ref(db, "users/" + uid));
        if (snapshot.exists()) {
            gameState = snapshot.val();
            gameState.inventory = gameState.inventory || {};
            gameState.quest = gameState.quest || 0;
            gameState.prestige = gameState.prestige || 0;
            gameState.name = gameState.name || "Angler";
        } else {
            // Neuer Spieler: Nutze den gespeicherten Namen
            let playerName = tempNameForRegister || "Angler";
            gameState = { name: playerName, money: 0, xp: 0, level: 1, rod: 0, zone: 0, inventory: {}, lastDaily: 0, prestige: 0, quest: 0 };
        }
        updateUI();
    } catch (e) {
        log("❌ Fehler beim Laden der Daten.");
    }
}

async function saveData() {
    if (!uid || !gameState) return;
    try { await set(ref(db, "users/" + uid), gameState); } 
    catch (e) { console.error(e); }
}

function updateUI() {
    if(!gameState) return;
    const xpNeeded = gameState.level * 50;
    document.getElementById("ui-money").innerText = `💰 ${gameState.money}$`;
    document.getElementById("ui-level").innerText = `⭐ Lvl ${gameState.level} (${gameState.xp}/${xpNeeded} XP)`;
    document.getElementById("zoneDisplay").innerText = `🌊 ${zones[gameState.zone]}`;
}

function log(text) {
    const logDiv = document.getElementById("log");
    logDiv.innerText = text + "\n" + logDiv.innerText.split("\n").slice(0, 5).join("\n");
}

function triggerRodAnimation() {
    const rod = document.getElementById('rod');
    rod.classList.remove('animate-rod');
    void rod.offsetWidth;
    rod.classList.add('animate-rod');
}

// --- GAME ACTIONS ---

async function handleFish() {
    const btn = document.getElementById('btnFish');
    btn.disabled = true;
    triggerRodAnimation();

    setTimeout(async () => {
        let item = roll(gameState.zone, gameState.rod);
        gameState.inventory[item.n] = (gameState.inventory[item.n] || 0) + 1;
        gameState.xp += 5;
        
        let message = `🎣 Gefangen: ${item.n} (${item.v}$)`;

        gameState.quest++;
        if(gameState.quest >= 5) {
            gameState.money += 200;
            gameState.quest = 0;
            message += `\n📜 Quest erfüllt! +200$`;
        }

        let xpNeeded = gameState.level * 50;
        if (gameState.xp >= xpNeeded) {
            gameState.level++;
            gameState.xp -= xpNeeded;
            message += `\n⭐ LEVEL UP! Du bist jetzt Level ${gameState.level}!`;
        }

        updateUI();
        log(message);
        saveData();
        btn.disabled = false;
    }, 800);
}

function handleSell() {
    let total = 0; let itemsSold = 0;
    for (let k in gameState.inventory) {
        let itemDef = items.find(x => x.n === k);
        if(itemDef) { total += itemDef.v * gameState.inventory[k]; itemsSold += gameState.inventory[k]; }
    }
    if (itemsSold === 0) return log("🎒 Dein Rucksack ist leer!");
    gameState.money += total; gameState.inventory = {};
    updateUI(); log(`💰 ${itemsSold} Items verkauft für ${total}$`); saveData();
}

function handleDaily() {
    const now = Date.now();
    if (now - gameState.lastDaily < 86400000) return log(`⏳ Komm morgen wieder!`);
    let reward = 100 + (gameState.prestige * 50);
    gameState.money += reward; gameState.lastDaily = now;
    updateUI(); log(`🎁 Daily abgeholt: +${reward}$`); saveData();
}

function handleBuyRod() {
    let cost = (gameState.rod + 1) * 500;
    if (gameState.money < cost) return log(`❌ Zu teuer! Kostet ${cost}$.`);
    gameState.money -= cost; gameState.rod++;
    updateUI(); log(`🛒 Rute Level ${gameState.rod}!`); saveData();
}

function handleZone() {
    gameState.zone = (gameState.zone + 1) % zones.length;
    updateUI(); log(`🌊 Du bist nun in: ${zones[gameState.zone]}`); saveData();
}

function handlePrestige() {
    if (gameState.level < 20 || gameState.money < 5000) return log("❌ Brauchst Level 20 und 5000$.");
    let oldName = gameState.name;
    gameState = { name: oldName, money: 0, xp: 0, level: 1, rod: 0, zone: 0, inventory: {}, lastDaily: gameState.lastDaily, prestige: gameState.prestige + 1, quest: 0 };
    updateUI(); log(`🔁 PRESTIGE ${gameState.prestige}!`); saveData();
}

function showProfile() {
    let inv = "";
    for (let i in gameState.inventory) inv += `• ${i}: ${gameState.inventory[i]}\n`;
    log(`👤 ${gameState.name.toUpperCase()}\n💰 Geld: ${gameState.money}$\n⭐ Level: ${gameState.level}\n🎣 Rute: Lvl ${gameState.rod}\n🔁 Prestige: ${gameState.prestige}\n\n🎒 Rucksack:\n${inv || 'Leer'}`);
}

// --- AUTH (NUR NAME & PASSWORT) ---

document.getElementById('btnRegister').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    
    if(username.length < 3 || pass.length < 6) {
        return log("❌ Name mind. 3 Zeichen, Passwort mind. 6 Zeichen!");
    }

    // Der Trick: Aus dem Namen wird im Hintergrund eine Fake-Email
    const dummyEmail = username.toLowerCase() + "@vfisher.local";
    tempNameForRegister = username; // Merken für die Datenbank

    try { 
        await createUserWithEmailAndPassword(auth, dummyEmail, pass); 
    } catch(e) { 
        if(e.code === 'auth/email-already-in-use') {
            log("❌ Dieser Spielername existiert bereits!");
        } else {
            log(`❌ Fehler: ${e.message}`); 
        }
    }
});

document.getElementById('btnLogin').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value;
    
    if(!username || !pass) return log("❌ Bitte Name und Passwort eingeben!");

    // Gleicher Trick fürs Login
    const dummyEmail = username + "@vfisher.local";

    try { 
        await signInWithEmailAndPassword(auth, dummyEmail, pass); 
    } catch(e) { 
        log("❌ Name oder Passwort falsch!"); 
    }
});

document.getElementById('btnLogout').addEventListener('click', async () => { await signOut(auth); });

document.getElementById('btnFish').addEventListener('click', handleFish);
document.getElementById('btnSell').addEventListener('click', handleSell);
document.getElementById('btnDaily').addEventListener('click', handleDaily);
document.getElementById('btnRod').addEventListener('click', handleBuyRod);
document.getElementById('btnZone').addEventListener('click', handleZone);
document.getElementById('btnPrestige').addEventListener('click', handlePrestige);
document.getElementById('btnProfile').addEventListener('click', showProfile);

onAuthStateChanged(auth, async (user) => {
    const authBox = document.getElementById("authBox");
    const gameBox = document.getElementById("game");
    
    if (user) {
        uid = user.uid;
        authBox.style.display = "none";
        gameBox.style.display = "block";
        document.getElementById("log").innerText = "Daten werden geladen...";
        await loadData();
        log(`✅ Willkommen zurück, ${gameState.name}!`);
    } else {
        uid = null;
        gameState = null;
        authBox.style.display = "block";
        gameBox.style.display = "none";
    }
});
</script>
