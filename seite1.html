<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Fisher PRO</title>

<style>
/* --- GRUNDDESIGN --- */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #020617, #0a192f);
    color: #e6f0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    width: 450px;
    background: rgba(15, 23, 42, 0.8);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    position: relative;
}

/* --- ANIMATION & GRAFIK --- */
#fishing-scene {
    height: 120px;
    position: relative;
    margin-bottom: 15px;
    border-bottom: 2px solid #3b82f6;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
}

.rod-anim {
    font-size: 50px;
    position: absolute;
    bottom: -10px;
    left: 40%;
    transform-origin: bottom right;
    transition: 0.3s;
    display: none;
}

@keyframes cast {
    0% { transform: rotate(0deg); }
    30% { transform: rotate(-40deg); }
    100% { transform: rotate(10deg); }
}

.animate-rod { display: block; animation: cast 0.8s ease-in-out; }

.water-effect {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20px;
    background: rgba(59, 130, 246, 0.3);
    animation: waves 2s infinite alternate;
}

@keyframes waves {
    from { transform: translateX(-10px); }
    to { transform: translateX(10px); }
}

/* --- UI ELEMENTE --- */
input {
    padding: 12px;
    width: 90%;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    box-sizing: border-box;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
}

button:hover:not(:disabled) { background: #3b82f6; transform: scale(1.05); }
button:active:not(:disabled) { transform: scale(0.95); }
button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

.danger-btn { background: #ef4444; }
.danger-btn:hover:not(:disabled) { background: #f87171; }
.success-btn { background: #10b981; }
.success-btn:hover:not(:disabled) { background: #34d399; }
.claim-btn { background: #f59e0b; padding: 5px 10px; font-size: 12px; }
.claim-btn:hover:not(:disabled) { background: #fbbf24; }

#stats-bar {
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
    font-weight: bold;
}

#log {
    margin-top: 15px;
    height: 100px;
    overflow: auto;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
    text-align: left;
    border-left: 3px solid #3b82f6;
    line-height: 1.4;
}

/* --- MODAL / POPUP SYSTEM --- */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(3px);
}

.modal-content {
    background: #0f172a;
    width: 400px;
    max-height: 85vh;
    border-radius: 15px;
    border: 1px solid #3b82f6;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
}

.modal-header {
    background: #1e293b;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-body {
    padding: 20px;
    overflow-y: auto;
    font-size: 14px;
    text-align: left;
}

.modal-footer {
    padding: 15px;
    background: #1e293b;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.close-btn { background: none; color: #94a3b8; font-size: 20px; cursor: pointer; border: none; padding: 0; margin: 0; }
.close-btn:hover { color: white; transform: none; }

/* Spezifische Modal-Inhalte */
.item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.quest-row { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.quest-info { display: flex; flex-direction: column; }
.quest-title { font-weight: bold; font-size: 13px; }
.quest-prog { font-size: 11px; color: #94a3b8; margin-top: 3px; }
.quest-section { margin-top: 15px; margin-bottom: 5px; font-size: 16px; font-weight: bold; color: #60a5fa; border-bottom: 1px solid #334155; padding-bottom: 5px;}

.daily-day { padding: 10px; margin: 5px 0; border-radius: 8px; background: #1e293b; display: flex; justify-content: space-between;}
.daily-day.active { background: #2563eb; font-weight: bold; }
.daily-day.missed { background: #475569; opacity: 0.5; }
.zone-row { padding: 10px; margin: 5px 0; border-radius: 8px; background: #1e293b; cursor: pointer; transition: 0.2s;}
.zone-row:hover:not(.locked) { background: #3b82f6; }
.zone-row.locked { opacity: 0.5; cursor: not-allowed; }
.zone-row.current { border: 2px solid #10b981; }
</style>
</head>

<body>

<!-- POPUP OVERLAY -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">Titel</span>
            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
        <div id="modal-body" class="modal-body">Inhalt</div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<div class="container">
    <div id="fishing-scene">
        <div id="rod" class="rod-anim">🎣</div>
        <div class="water-effect"></div>
    </div>

    <!-- LOGIN -->
    <div id="authBox">
        <h3>🔐 Virtual Fisher Login</h3>
        <p style="font-size: 12px; color: #94a3b8;">Verwende einen der 5 zugelassenen Accounts.</p>
        <input id="username" placeholder="Spielername" autocomplete="off">
        <input id="password" type="password" placeholder="Passwort" autocomplete="off">
        <br>
        <button id="btnLogin" style="width: 90%; margin-top: 10px;">Login</button>
        <div id="login-error" style="color: #ef4444; font-size: 13px; margin-top: 10px; display: none;">Falscher Name oder Passwort!</div>
    </div>

    <!-- GAME -->
    <div id="game" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="zoneDisplay" style="font-weight: bold; color: #60a5fa;">🌊 See</span>
            <button id="btnLogout" class="danger-btn" style="padding: 5px 10px; margin: 0;">🚪 Logout</button>
        </div>
        
        <div id="stats-bar">
            <span id="ui-money">💰 0$</span>
            <span id="ui-level">⭐ Lvl 1 (0/50 XP)</span>
        </div>

        <button id="btnFish">🎣 Angeln</button>
        <button id="btnSell">💰 Verkaufen</button>
        <button id="btnDaily">🎁 Daily</button>
        <button id="btnQuest">📜 Quest</button>
        <br>
        <button id="btnRod">🛒 Rute</button>
        <button id="btnZone">🌊 Zone</button>
        <button id="btnPrestige">🔁 Prestige</button>
        <button id="btnProfile">📊 Profil</button>

        <div id="log">Willkommen zurück!</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCw4nadHCIRcouTJJoQ3ElToiVVFr5Rufo",
  authDomain: "khusland-b7d13.firebaseapp.com",
  databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com",
  projectId: "khusland-b7d13",
  storageBucket: "khusland-b7d13.firebasestorage.app",
  messagingSenderId: "69573193613",
  appId: "1:69573193613:web:86c4d839281b1e343cd7c4",
  measurementId: "G-JSCWR4207G"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔒 DIE 5 FESTEN ACCOUNTS
const validAccounts = {
    "Spieler1": "Fisch01",
    "Spieler2": "Fisch02",
    "Spieler3": "Fisch03",
    "Spieler4": "Fisch04",
    "Spieler5": "Fisch05"
};

let currentUser = null;
let gameState = null;

const zones = [
    { name: "See", reqPrestige: 0 },
    { name: "Meer", reqPrestige: 1 },
    { name: "Tiefsee", reqPrestige: 3 },
    { name: "Verlorener Ozean", reqPrestige: 5 }
];

const items = [
 {n: "Müll", v: -10, c: 25, z: 0},
 {n: "Schuh", v: -5, c: 15, z: 0},
 {n: "Karpfen", v: 5, c: 20, z: 0},
 {n: "Forelle", v: 10, c: 15, z: 0},
 {n: "Lachs", v: 25, c: 10, z: 1},
 {n: "Thunfisch", v: 40, c: 8, z: 1},
 {n: "Hai", v: 80, c: 3, z: 2},
 {n: "Leviathan", v: 400, c: 0.5, z: 2},
 {n: "Kraken-Tentakel", v: 1000, c: 0.2, z: 3}
];

// --- QUEST SYSTEM DATEN ---
// t: 'c' = caught (Fische fangen), t: 'e' = earned (Geld verdienen)
const questDB = {
    daily: [
        {id: 'd1', desc: 'Fange 10 Fische', t: 'c', req: 10, rew: 50},
        {id: 'd2', desc: 'Fange 25 Fische', t: 'c', req: 25, rew: 100},
        {id: 'd3', desc: 'Fange 50 Fische', t: 'c', req: 50, rew: 200},
        {id: 'd4', desc: 'Verdiene 200$', t: 'e', req: 200, rew: 100},
        {id: 'd5', desc: 'Verdiene 500$', t: 'e', req: 500, rew: 250}
    ],
    weekly: [
        {id: 'w1', desc: 'Fange 100 Fische', t: 'c', req: 100, rew: 500},
        {id: 'w2', desc: 'Fange 250 Fische', t: 'c', req: 250, rew: 1000},
        {id: 'w3', desc: 'Fange 500 Fische', t: 'c', req: 500, rew: 2000},
        {id: 'w4', desc: 'Verdiene 2500$', t: 'e', req: 2500, rew: 1000},
        {id: 'w5', desc: 'Verdiene 5000$', t: 'e', req: 5000, rew: 2500}
    ],
    monthly: [
        {id: 'm1', desc: 'Fange 1000 Fische', t: 'c', req: 1000, rew: 5000},
        {id: 'm2', desc: 'Fange 2500 Fische', t: 'c', req: 2500, rew: 10000},
        {id: 'm3', desc: 'Fange 5000 Fische', t: 'c', req: 5000, rew: 25000},
        {id: 'm4', desc: 'Fange 7500 Fische', t: 'c', req: 7500, rew: 40000},
        {id: 'm5', desc: 'Fange 10000 Fische', t: 'c', req: 10000, rew: 60000},
        {id: 'm6', desc: 'Verdiene 10.000$', t: 'e', req: 10000, rew: 5000},
        {id: 'm7', desc: 'Verdiene 25.000$', t: 'e', req: 25000, rew: 10000},
        {id: 'm8', desc: 'Verdiene 50.000$', t: 'e', req: 50000, rew: 25000},
        {id: 'm9', desc: 'Verdiene 100.000$', t: 'e', req: 100000, rew: 50000},
        {id: 'm10', desc: 'Verdiene 250.000$', t: 'e', req: 250000, rew: 100000}
    ]
};

function checkQuestResets() {
    const now = Date.now();
    const DAY = 86400000;
    
    // Fallback falls questState fehlt
    if(!gameState.questState) {
        gameState.questState = { 
            resetD: now, resetW: now, resetM: now, 
            prog: { dc: 0, de: 0, wc: 0, we: 0, mc: 0, me: 0 }, 
            claims: {} 
        };
    }

    let qs = gameState.questState;
    let needsSave = false;

    // Daily Reset (24h)
    if (now - qs.resetD > DAY) {
        qs.resetD = now; qs.prog.dc = 0; qs.prog.de = 0;
        for(let k in qs.claims) if(k.startsWith('d')) delete qs.claims[k];
        needsSave = true;
    }
    // Weekly Reset (7 Tage)
    if (now - qs.resetW > DAY * 7) {
        qs.resetW = now; qs.prog.wc = 0; qs.prog.we = 0;
        for(let k in qs.claims) if(k.startsWith('w')) delete qs.claims[k];
        needsSave = true;
    }
    // Monthly Reset (30 Tage)
    if (now - qs.resetM > DAY * 30) {
        qs.resetM = now; qs.prog.mc = 0; qs.prog.me = 0;
        for(let k in qs.claims) if(k.startsWith('m')) delete qs.claims[k];
        needsSave = true;
    }
    
    if(needsSave) saveData();
}

function addQuestProgress(type, amount) {
    let qs = gameState.questState.prog;
    if (type === 'c') { qs.dc += amount; qs.wc += amount; qs.mc += amount; }
    if (type === 'e') { qs.de += amount; qs.we += amount; qs.me += amount; }
}

// --- MODAL LOGIK ---
window.closeModal = function() {
    document.getElementById('modal-overlay').style.display = 'none';
};

function openModal(title, bodyHTML, footerHTML = '') {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    const footer = document.getElementById('modal-footer');
    if(footerHTML) { footer.style.display = 'flex'; footer.innerHTML = footerHTML; } 
    else { footer.style.display = 'none'; }
    document.getElementById('modal-overlay').style.display = 'flex';
}

function roll(zoneIndex, rodLevel) {
    let pool = items.filter(i => i.z <= zoneIndex);
    let modifiedPool = pool.map(item => ({ ...item, weight: item.c * (1 + rodLevel * 0.1) }));
    let total = modifiedPool.reduce((sum, item) => sum + item.weight, 0);
    let r = Math.random() * total;
    for (let item of modifiedPool) {
        if (r < item.weight) return item;
        r -= item.weight;
    }
    return pool[0];
}

async function loadData() {
    if (!currentUser) return;
    try {
        const snapshot = await get(ref(db, "users/" + currentUser));
        if (snapshot.exists()) {
            gameState = snapshot.val();
            gameState.inventory = gameState.inventory || {};
            gameState.dailyStreak = gameState.dailyStreak || 0;
            gameState.stats = gameState.stats || { totalCaught: 0, totalEarned: 0 };
        } else {
            gameState = { 
                name: currentUser, money: 0, xp: 0, level: 1, rod: 0, zone: 0, 
                inventory: {}, lastDaily: 0, dailyStreak: 0, prestige: 0,
                stats: { totalCaught: 0, totalEarned: 0 }
            };
        }
        checkQuestResets();
        updateUI();
        document.getElementById("authBox").style.display = "none";
        document.getElementById("game").style.display = "block";
        log(`✅ Willkommen zurück, ${currentUser}!`);
    } catch (e) { log("❌ Fehler beim Laden."); console.error(e); }
}

async function saveData() {
    if (!currentUser || !gameState) return;
    try { await set(ref(db, "users/" + currentUser), gameState); } catch (e) {}
}

function updateUI() {
    if(!gameState) return;
    const xpNeeded = gameState.level * 50;
    document.getElementById("ui-money").innerText = `💰 ${gameState.money}$`;
    document.getElementById("ui-level").innerText = `⭐ Lvl ${gameState.level} (${gameState.xp}/${xpNeeded} XP)`;
    document.getElementById("zoneDisplay").innerText = `🌊 ${zones[gameState.zone].name}`;
}

function log(text) {
    const logDiv = document.getElementById("log");
    logDiv.innerText = text + "\n" + logDiv.innerText.split("\n").slice(0, 5).join("\n");
}

// --- SPIEL AKTIONEN ---
window.handleFish = function() {
    const btn = document.getElementById('btnFish');
    btn.disabled = true;
    
    const rod = document.getElementById('rod');
    rod.classList.remove('animate-rod'); void rod.offsetWidth; rod.classList.add('animate-rod');

    setTimeout(() => {
        let item = roll(gameState.zone, gameState.rod);
        gameState.inventory[item.n] = (gameState.inventory[item.n] || 0) + 1;
        gameState.xp += 5;
        gameState.stats.totalCaught++;
        addQuestProgress('c', 1); // +1 Fisch für Quests
        
        let message = `🎣 Gefangen: ${item.n} (${item.v}$)`;

        let xpNeeded = gameState.level * 50;
        if (gameState.xp >= xpNeeded) {
            gameState.level++;
            gameState.xp -= xpNeeded;
            message += `\n⭐ LEVEL UP! Du bist jetzt Level ${gameState.level}!`;
        }

        updateUI(); log(message); saveData();
        btn.disabled = false;
    }, 800);
}

// 💰 VERKAUFEN POPUP
window.handleSellMenu = function() {
    let total = 0; let html = `<h3>Dein Rucksack</h3>`; let hasItems = false;

    for (let k in gameState.inventory) {
        let count = gameState.inventory[k];
        if (count > 0) {
            hasItems = true;
            let itemDef = items.find(x => x.n === k);
            let itemTotal = itemDef.v * count;
            total += itemTotal;
            html += `<div class="item-row"><span>${count}x ${k}</span><span style="color: ${itemTotal >= 0 ? '#10b981' : '#ef4444'}">${itemTotal}$</span></div>`;
        }
    }

    if (!hasItems) return openModal("💰 Verkauf", "<p>Dein Rucksack ist leer. Geh erst angeln!</p>");

    html += `<hr><div class="item-row" style="font-weight:bold; font-size: 16px;"><span>Gesamtwert:</span><span style="color: ${total >= 0 ? '#10b981' : '#ef4444'}">${total}$</span></div>`;
    openModal("💰 Verkauf", html, `<button class="success-btn" onclick="executeSell(${total})">Alles Verkaufen</button>`);
}

window.executeSell = function(totalValue) {
    gameState.money += totalValue;
    if(totalValue > 0) {
        gameState.stats.totalEarned += totalValue;
        addQuestProgress('e', totalValue); // +Geld für Quests
    }
    gameState.inventory = {};
    updateUI(); log(`💰 Alles verkauft für ${totalValue}$`); saveData(); closeModal();
}

// 📜 QUEST POPUP
window.handleQuestMenu = function() {
    checkQuestResets(); // Zur Sicherheit nochmal checken
    let qs = gameState.questState;
    let html = ``;

    function buildQuestSection(title, questList, progTypeC, progTypeE) {
        let secHtml = `<div class="quest-section">${title}</div>`;
        questList.forEach(q => {
            let currentProg = q.t === 'c' ? qs.prog[progTypeC] : qs.prog[progTypeE];
            let isDone = currentProg >= q.req;
            let isClaimed = qs.claims[q.id];
            let displayProg = Math.min(currentProg, q.req);

            secHtml += `<div class="quest-row">
                            <div class="quest-info">
                                <span class="quest-title">${q.desc}</span>
                                <span class="quest-prog">${displayProg} / ${q.req}</span>
                            </div>
                            <div>`;
            if (isClaimed) {
                secHtml += `<span style="color: #10b981; font-weight: bold;">✅</span>`;
            } else if (isDone) {
                secHtml += `<button class="success-btn claim-btn" onclick="claimQuest('${q.id}', ${q.rew})">Abholen (${q.rew}$)</button>`;
            } else {
                secHtml += `<span style="color: #94a3b8; font-size: 12px;">🔒 ${q.rew}$</span>`;
            }
            secHtml += `</div></div>`;
        });
        return secHtml;
    }

    html += buildQuestSection("🌞 Daily Quests", questDB.daily, 'dc', 'de');
    html += buildQuestSection("📅 Weekly Quests", questDB.weekly, 'wc', 'we');
    html += buildQuestSection("🏆 Monthly Quests", questDB.monthly, 'mc', 'me');

    openModal("📜 Missionen", html);
}

window.claimQuest = function(qId, reward) {
    gameState.questState.claims[qId] = true;
    gameState.money += reward;
    gameState.stats.totalEarned += reward;
    updateUI();
    log(`📜 Quest Belohnung abgeholt: +${reward}$`);
    saveData();
    // Modal direkt neu laden, damit der Button zu einem Haken wird
    handleQuestMenu();
}

// 🎁 DAILY POPUP (7 TAGE STREAK)
window.handleDailyMenu = function() {
    const now = Date.now(); const oneDay = 86400000;
    let canClaim = false; let nextStreak = gameState.dailyStreak;

    if (gameState.lastDaily === 0) { canClaim = true; nextStreak = 1; } 
    else if (now - gameState.lastDaily >= oneDay * 2) { canClaim = true; nextStreak = 1; } 
    else if (now - gameState.lastDaily >= oneDay) { canClaim = true; nextStreak = Math.min(gameState.dailyStreak + 1, 7); }

    let html = `<p style="color: #94a3b8; font-size: 12px;">Logge dich täglich ein, um bessere Belohnungen zu erhalten!</p>`;
    let currentReward = 0;

    for (let i = 1; i <= 7; i++) {
        let baseReward = i * 100 + (gameState.prestige * 50);
        let statusClass = ""; let icon = "⏳";

        if (i < nextStreak || (!canClaim && i <= gameState.dailyStreak)) { statusClass = "missed"; icon = "✅"; } 
        else if (i === nextStreak && canClaim) { statusClass = "active"; icon = "🎁"; currentReward = baseReward; }

        html += `<div class="daily-day ${statusClass}"><span>Tag ${i}</span><span>${icon} ${baseReward}$</span></div>`;
    }

    if (!canClaim) {
        const hoursLeft = Math.ceil((oneDay - (now - gameState.lastDaily)) / 3600000);
        html += `<p style="text-align:center; margin-top:15px; color:#f59e0b;">⏳ Komm in ${hoursLeft} Stunden wieder.</p>`;
        openModal("🎁 Daily Belohnung", html);
    } else {
        openModal("🎁 Daily Belohnung", html, `<button class="success-btn" onclick="executeDaily(${currentReward}, ${nextStreak})">Abholen (${currentReward}$)</button>`);
    }
}

window.executeDaily = function(reward, newStreak) {
    gameState.money += reward; gameState.stats.totalEarned += reward;
    gameState.lastDaily = Date.now(); gameState.dailyStreak = newStreak;
    updateUI(); log(`🎁 Tag ${newStreak} Daily abgeholt: +${reward}$`); saveData(); closeModal();
}

// 🛒 RUTE KAUFEN POPUP
window.handleRodMenu = function() {
    let currentRod = gameState.rod; let nextCost = (currentRod + 1) * 500;
    let html = `
        <div style="text-align: center; padding: 10px;">
            <div style="font-size: 40px; margin-bottom: 10px;">🎣</div>
            <p>Aktuelle Rute: <b>Level ${currentRod}</b></p>
            <p style="color: #94a3b8; font-size: 12px;">Jedes Level erhöht deine Chance auf seltene Fische um 10%.</p><hr>
            <p>Nächstes Upgrade: <b>Level ${currentRod + 1}</b></p>
            <p>Kosten: <b style="color: #ef4444;">${nextCost}$</b></p>
        </div>`;
    let btnHtml = gameState.money >= nextCost ? `<button class="success-btn" onclick="executeRodBuy(${nextCost})">Kaufen</button>` : `<button disabled>Zu wenig Geld</button>`;
    openModal("🛒 Angelschop", html, btnHtml);
}

window.executeRodBuy = function(cost) {
    gameState.money -= cost; gameState.rod++;
    updateUI(); log(`🛒 Rute auf Level ${gameState.rod} verbessert!`); saveData(); closeModal();
}

// 🌊 ZONE WECHSELN POPUP
window.handleZoneMenu = function() {
    let html = `<p style="font-size: 13px; color: #94a3b8;">Höhere Zonen bieten wertvollere Fische, benötigen aber Prestige.</p>`;
    zones.forEach((z, index) => {
        let isLocked = gameState.prestige < z.reqPrestige; let isCurrent = gameState.zone === index;
        let rowClass = "zone-row" + (isLocked ? " locked" : "") + (isCurrent ? " current" : "");
        let onclick = isLocked || isCurrent ? "" : `onclick="executeZoneChange(${index})"`;
        let status = isCurrent ? "📍 Aktiv" : (isLocked ? `🔒 Braucht Prestige ${z.reqPrestige}` : "🌊 Reisen");
        html += `<div class="${rowClass}" ${onclick}><div style="font-weight: bold;">${z.name}</div><div style="font-size: 12px; color: ${isLocked ? '#ef4444' : '#10b981'};">${status}</div></div>`;
    });
    openModal("🗺️ Weltkarte", html);
}

window.executeZoneChange = function(index) {
    gameState.zone = index; updateUI(); log(`🌊 Du bist zur Zone '${zones[index].name}' gereist.`); saveData(); closeModal();
}

// 🔁 PRESTIGE POPUP
window.handlePrestigeMenu = function() {
    let html = `
        <div style="text-align: center;">
            <h3 style="color: #f59e0b;">Warnung!</h3>
            <p>Ein Prestige-Aufstieg setzt folgendes zurück:</p>
            <ul style="text-align: left; color: #ef4444; font-weight: bold;">
                <li>Dein gesamtes Geld (0$)</li>
                <li>Dein Level & XP (Level 1)</li>
                <li>Deine Angelrute (Level 0)</li>
                <li>Dein gesamtes Inventar</li>
            </ul>
            <p style="color: #10b981; font-weight: bold;">Du behältst: Deine Quests, Statistiken und Dailys. Außerdem schaltest du neue Zonen frei!</p>
            <hr>
            <p>Anforderung: <b>Level 20</b> und <b>5000$</b></p>
            <p>Dein Status: Level ${gameState.level} / ${gameState.money}$</p>
        </div>
    `;

    let canPrestige = gameState.level >= 20 && gameState.money >= 5000;
    let btnHtml = canPrestige 
        ? `<button class="danger-btn" onclick="executePrestige()">⚠️ Ja, Prestige durchführen!</button>`
        : `<button disabled>Nicht bereit</button>`;

    openModal("🔁 Prestige Aufstieg", html, btnHtml);
}

window.executePrestige = function() {
    gameState.money = 0; gameState.level = 1; gameState.xp = 0; gameState.rod = 0; 
    gameState.zone = 0; gameState.inventory = {}; 
    gameState.prestige++;
    
    updateUI(); log(`🎉 PRESTIGE ${gameState.prestige} erreicht! Dein Abenteuer beginnt von vorn.`); saveData(); closeModal();
}

// 📊 PROFIL
window.handleProfileMenu = function() {
    let html = `
        <h3 style="margin-top:0; color: #60a5fa;">${gameState.name.toUpperCase()}</h3>
        <div class="item-row"><span>Geld:</span> <span>${gameState.money}$</span></div>
        <div class="item-row"><span>Level:</span> <span>${gameState.level}</span></div>
        <div class="item-row"><span>Rute:</span> <span>Level ${gameState.rod}</span></div>
        <div class="item-row"><span>Prestige:</span> <span>${gameState.prestige}</span></div>
        <h4 style="margin-bottom: 5px; margin-top: 20px;">📈 Statistiken</h4>
        <div class="item-row" style="font-size: 12px;"><span>Fische gefangen:</span> <span>${gameState.stats.totalCaught}</span></div>
        <div class="item-row" style="font-size: 12px;"><span>Geld verdient:</span> <span>${gameState.stats.totalEarned}$</span></div>
        <div class="item-row" style="font-size: 12px;"><span>Aktueller Streak:</span> <span>${gameState.dailyStreak} Tage</span></div>
    `;
    openModal("👤 Spieler Profil", html);
}

// --- EIGENES LOGIN SYSTEM ---
document.getElementById('btnLogin').addEventListener('click', async () => {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const errorMsg = document.getElementById('login-error');

    if (validAccounts[user] && validAccounts[user] === pass) {
        errorMsg.style.display = 'none';
        currentUser = user;
        document.getElementById("log").innerText = "Lade Spielstand aus der Cloud...";
        await loadData();
    } else { errorMsg.style.display = 'block'; }
});

document.getElementById('btnLogout').addEventListener('click', () => {
    currentUser = null; gameState = null;
    document.getElementById('username').value = ""; document.getElementById('password').value = "";
    document.getElementById("authBox").style.display = "block"; document.getElementById("game").style.display = "none";
});

// EVENT LISTENER
document.getElementById('btnFish').addEventListener('click', handleFish);
document.getElementById('btnSell').addEventListener('click', handleSellMenu);
document.getElementById('btnDaily').addEventListener('click', handleDailyMenu);
document.getElementById('btnQuest').addEventListener('click', handleQuestMenu);
document.getElementById('btnRod').addEventListener('click', handleRodMenu);
document.getElementById('btnZone').addEventListener('click', handleZoneMenu);
document.getElementById('btnPrestige').addEventListener('click', handlePrestigeMenu);
document.getElementById('btnProfile').addEventListener('click', handleProfileMenu);

</script>
</body>
</html>
