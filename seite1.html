<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Fisher PRO</title>
    <style>
        /* --- GRUNDDESIGN & HINTERGRUND --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e6f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-color: #020617;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') center/cover no-repeat;
            opacity: 0.60; /* Deckkraft exakt auf 60% */
            z-index: -1;
        }

        /* --- HAUPT-CONTAINER --- */
        .container {
            width: 440px;
            background: #232936; 
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
        }

        /* --- ANGEL-ANIMATION --- */
        #fishing-scene {
            height: 70px;
            position: relative;
            margin-bottom: 15px;
            border-bottom: 2px solid #3b82f6;
            overflow: hidden;
            border-radius: 10px 10px 0 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .rod-anim {
            font-size: 35px;
            position: absolute;
            bottom: -5px;
            left: 45%;
            transform-origin: bottom right;
            transition: 0.3s;
            display: none;
        }

        @keyframes cast { 0% { transform: rotate(0deg); } 30% { transform: rotate(-40deg); } 100% { transform: rotate(10deg); } }
        .animate-rod { display: block; animation: cast 0.8s ease-in-out; }

        .water-effect {
            position: absolute; bottom: 0; width: 100%; height: 15px;
            background: rgba(59, 130, 246, 0.4); animation: waves 2s infinite alternate;
        }
        @keyframes waves { from { transform: translateX(-10px); } to { transform: translateX(10px); } }

        /* --- UI & BUTTONS --- */
        #top-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: 12px; font-weight: bold;
        }

        #stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #11141a; padding: 12px 15px; border-radius: 8px;
            margin-bottom: 8px; font-size: 14px; font-weight: bold;
        }

        #combo-bar {
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d; font-size: 12px; font-weight: bold; padding: 6px;
            border-radius: 6px; margin-bottom: 12px; display: none;
        }

        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;
        }

        button {
            padding: 12px; border: none; border-radius: 8px;
            background: #3b66f5; color: white; font-weight: bold;
            cursor: pointer; transition: 0.1s; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        button:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.02); }
        button:active:not(:disabled) { transform: scale(0.98); }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

        .danger-btn { background: #f04444; padding: 6px 10px; font-size: 11px; }
        .prestige-btn { background: #7367f0; } 
        .success-btn { background: #10b981; }
        .update-btn { background: #0ea5e9; } /* Cyan Blau für Updates */

        input {
            padding: 12px; width: 90%; margin: 8px 0; border-radius: 8px;
            border: 1px solid #334155; background: #11141a; color: white; box-sizing: border-box;
        }

        /* --- LOG (Konsole unten) --- */
        #log {
            height: 110px; overflow-y: auto; background: #11141a;
            padding: 10px; border-radius: 8px; font-size: 13px; text-align: left;
            border-left: 3px solid #3b82f6; line-height: 1.6; margin-top: 10px;
        }
        #log::-webkit-scrollbar { width: 8px; }
        #log::-webkit-scrollbar-track { background: #11141a; border-radius: 8px; }
        #log::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }

        /* --- MODAL / POPUP SYSTEM --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #1e2532; width: 420px; max-height: 85vh; border-radius: 12px;
            border: 1px solid #3b82f6; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }
        .modal-header { background: #11141a; padding: 15px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; overflow-y: auto; font-size: 14px; text-align: left; }
        .modal-footer { padding: 15px; background: #11141a; display: flex; justify-content: flex-end; gap: 10px; }
        .close-btn { background: none; color: #94a3b8; font-size: 20px; cursor: pointer; padding: 0; }
        
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .quest-row { background: #11141a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .leader-row { background: #11141a; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .fish-dex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .dex-card { background: #11141a; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px;}
        .dex-card.locked { opacity: 0.4; filter: grayscale(100%); }
        .shiny-badge { font-size: 12px; background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fcd34d; padding: 2px 5px; border-radius: 4px; display: inline-block; margin-top: 5px;}
        
        .update-log-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .update-log-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .update-title { color: #60a5fa; font-weight: bold; margin-bottom: 5px; font-size: 15px; }
        .update-latest { color: #10b981; }
        .update-list { font-size: 13px; color: #94a3b8; padding-left: 20px; margin: 0; line-height: 1.5; }
    </style>
</head>
<body>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title"></span>
            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<div class="container">
    <div id="fishing-scene"><div id="rod" class="rod-anim">🎣</div><div class="water-effect"></div></div>

    <div id="authBox">
        <h3>🔐 Virtual Fisher Login</h3>
        <p style="font-size: 12px; color: #94a3b8;">Accounts: Spieler1 bis Spieler5</p>
        <input id="username" placeholder="Spielername" autocomplete="off">
        <input id="password" type="password" placeholder="Passwort" autocomplete="off"><br>
        <button id="btnLogin" style="width: 90%; margin: 15px auto;">Login</button>
        <div id="login-error" style="color: #ef4444; font-size: 13px; display: none;">Daten falsch!</div>
    </div>

    <div id="game" style="display:none;">
        <div id="top-info">
            <span id="zoneDisplay" style="color: #60a5fa;">🌊 See</span>
            <span id="weatherDisplay" style="color: #fcd34d;">☀️ Sonnig</span>
            <span id="eventDisplay" style="color: #c084fc;">🌍 Kein Event</span>
            <button id="btnLogout" class="danger-btn">🚪 Logout</button>
        </div>
        
        <div id="stats-bar">
            <span id="ui-money">💰 0$</span>
            <span id="ui-level">⭐ Lvl 1 (0/50)</span>
        </div>
        
        <div id="combo-bar">🔥 Combo: x1.00 (0 Fänge)</div>
        
        <div id="bait-info" style="color: #10b981; font-size: 12px; margin-bottom: 10px; display: none;">
            🪱 Premium-Köder: <span id="bait-clicks">0</span> Würfe
        </div>

        <button id="btnFish" style="width: 100%; margin-bottom: 15px; padding: 15px; font-size: 18px;">🎣 Angeln</button>
        
        <div class="btn-grid">
            <button id="btnSell">💰 Verkaufen</button>
            <button id="btnShop">🛒 Shop</button>
            <button id="btnNet">⚙️ Auto-Angeln</button>
            <button id="btnDex">🏆 Fisch-Dex</button>
            <button id="btnQuest">📜 Quest</button>
            <button id="btnDaily">🎁 Daily</button>
            <button id="btnLeader">👑 Top 5</button>
            <button id="btnZone">🗺️ Zone</button>
        </div>
        
        <div style="display: flex; gap: 8px; margin-top: 5px;">
            <button id="btnPrestige" class="prestige-btn" style="flex: 1;">🔁 Prestige</button>
            <button id="btnProfile" style="flex: 1;">📊 Profil</button>
            <button id="btnUpdates" class="update-btn" style="flex: 1;">📝 Updates</button>
        </div>

        <div id="log">Willkommen zurück!</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCw4nadHCIRcouTJJoQ3ElToiVVFr5Rufo",
    authDomain: "khusland-b7d13.firebaseapp.com",
    databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com",
    projectId: "khusland-b7d13",
    storageBucket: "khusland-b7d13.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const validAccounts = { "Spieler1": "Fisch01", "Spieler2": "Fisch02", "Spieler3": "Fisch03", "Spieler4": "Fisch04", "Spieler5": "Fisch05" };
let currentUser = null; 
let gameState = null;

const zones = [{ name: "See", reqPrestige: 0 }, { name: "Meer", reqPrestige: 1 }, { name: "Tiefsee", reqPrestige: 3 }, { name: "Verlorener Ozean", reqPrestige: 5 }];

const items = [
    {n:"Müll",v:-10,c:25,z:0}, {n:"Schuh",v:-5,c:15,z:0}, {n:"Alge",v:-2,c:20,z:0}, {n:"Kaulquappe",v:2,c:30,z:0}, 
    {n:"Karpfen",v:5,c:20,z:0}, {n:"Rotauge",v:8,c:15,z:0}, {n:"Forelle",v:10,c:15,z:0}, {n:"Barsch",v:15,c:10,z:0}, 
    {n:"Zander",v:20,c:8,z:0}, {n:"Hecht",v:35,c:5,z:0},
    {n:"Qualle",v:10,c:20,z:1}, {n:"Hering",v:15,c:18,z:1}, {n:"Makrele",v:20,c:15,z:1}, {n:"Lachs",v:25,c:10,z:1}, 
    {n:"Scholle",v:30,c:12,z:1}, {n:"Thunfisch",v:40,c:8,z:1}, {n:"Kabeljau",v:50,c:6,z:1}, {n:"Schwertfisch",v:80,c:4,z:1},
    {n:"Blobfisch",v:60,c:10,z:2}, {n:"Hai",v:80,c:8,z:2}, {n:"Laternenfisch",v:100,c:6,z:2}, {n:"Riesenkalmar",v:150,c:4,z:2}, 
    {n:"Anglerfisch",v:200,c:3,z:2}, {n:"Riemenfisch",v:250,c:2,z:2}, {n:"Koboldhai",v:300,c:1.5,z:2}, {n:"Leviathan",v:400,c:0.5,z:2},
    {n:"Geisterschiff-Teil",v:300,c:5,z:3}, {n:"Atlantis-Kristall",v:800,c:2,z:3}, {n:"Kraken-Tentakel",v:1000,c:1,z:3}, 
    {n:"Megalodon",v:1500,c:0.5,z:3}, {n:"Nessie",v:2500,c:0.2,z:3}, {n:"Poseidons Dreizack",v:5000,c:0.05,z:3}
];

// --- AUTO ANGELN SYSTEM ---
const autoLevels = [
    { cost: 0, time: 0, cap: 0 },
    { cost: 5000, time: 300, cap: 12 },    // Lvl 1: 5 Min, max 12 (1 Std)
    { cost: 25000, time: 270, cap: 16 },   // Lvl 2: 4.5 Min, max 16
    { cost: 100000, time: 240, cap: 24 },  // Lvl 3: 4 Min, max 24
    { cost: 500000, time: 210, cap: 32 },  // Lvl 4: 3.5 Min, max 32
    { cost: 2500000, time: 180, cap: 48 }, // Lvl 5: 3 Min, max 48
    { cost: 10000000, time: 120, cap: 60 } // Lvl 6: 2 Min, max 60 (2 Std)
];

const weathers = [{ name: "☀️ Sonnig" }, { name: "🌧️ Regen" }, { name: "⛈️ Sturm" }];
const specialEvents = [
    { name: "Kein Event", target: "none", boost: 1 },
    { name: "🦈 Hai-Woche", target: "Hai", boost: 5 },
    { name: "🐟 Lachs-Saison", target: "Lachs", boost: 5 },
    { name: "🌟 Schatzsuche", target: "Atlantis-Kristall", boost: 10 },
    { name: "🥾 Müllflut", target: "Schuh", boost: 8 },
    { name: "🦑 Kraken-Zorn", target: "Kraken-Tentakel", boost: 4 }
];

function getCurrentWeather() { return weathers[Math.floor(Date.now() / 180000) % 3]; }
function getCurrentEvent() { return specialEvents[Math.floor(Date.now() / (1000 * 60 * 60 * 2)) % specialEvents.length]; }

// 📜 QUESTS EXAKT WIE GEWÜNSCHT
const questDB = {
    daily: [
        {id:'d1',desc:'Fange 15 Fische',t:'c',req:15,rew:50}, {id:'d2',desc:'Fange 30 Fische',t:'c',req:30,rew:100},
        {id:'d3',desc:'Fange 50 Fische',t:'c',req:50,rew:200}, {id:'d4',desc:'Verdiene 250$',t:'e',req:250,rew:100}, {id:'d5',desc:'Verdiene 1000$',t:'e',req:1000,rew:300}
    ],
    weekly: [
        {id:'w1',desc:'Fange 150 Fische',t:'c',req:150,rew:500}, {id:'w2',desc:'Fange 300 Fische',t:'c',req:300,rew:1000},
        {id:'w3',desc:'Fange 500 Fische',t:'c',req:500,rew:2000}, {id:'w4',desc:'Verdiene 3000$',t:'e',req:3000,rew:1000}, {id:'w5',desc:'Verdiene 10000$',t:'e',req:10000,rew:3000}
    ],
    monthly: [
        {id:'m1',desc:'Fange 500 Fische',t:'c',req:500,rew:2500}, {id:'m2',desc:'Fange 1000 Fische',t:'c',req:1000,rew:5000},
        {id:'m3',desc:'Fange 2500 Fische',t:'c',req:2500,rew:10000}, {id:'m4',desc:'Fange 5000 Fische',t:'c',req:5000,rew:20000},
        {id:'m5',desc:'Fange 10000 Fische',t:'c',req:10000,rew:50000}, {id:'m6',desc:'Verdiene 5000$',t:'e',req:5000,rew:2000},
        {id:'m7',desc:'Verdiene 15000$',t:'e',req:15000,rew:5000}, {id:'m8',desc:'Verdiene 50000$',t:'e',req:50000,rew:15000},
        {id:'m9',desc:'Verdiene 150000$',t:'e',req:150000,rew:50000}, {id:'m10',desc:'Verdiene 500000$',t:'e',req:500000,rew:150000}
    ]
};

// 🕰️ ECHTE RESET LOGIK (00:00 Uhr)
function getResetKeys() {
    let d = new Date();
    let daily = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    let monthly = `${d.getFullYear()}-${d.getMonth()}`;
    let d0 = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    let dayNum = d0.getUTCDay() || 7; d0.setUTCDate(d0.getUTCDate() + 4 - dayNum);
    let yStart = new Date(Date.UTC(d0.getUTCFullYear(),0,1));
    let weekNo = Math.ceil((((d0 - yStart) / 86400000) + 1)/7);
    let weekly = `${d0.getUTCFullYear()}-W${weekNo}`;
    return { daily, weekly, monthly };
}

function checkQuestResets() {
    let keys = getResetKeys();
    if(!gameState.qs || typeof gameState.qs.d !== 'string') {
        gameState.qs = { d: keys.daily, w: keys.weekly, m: keys.monthly, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    }
    let qs = gameState.qs; let save = false;
    
    if(qs.d !== keys.daily) { qs.d = keys.daily; qs.p.dc=0; qs.p.de=0; for(let k in qs.c) if(k.startsWith('d')) delete qs.c[k]; save=true; }
    if(qs.w !== keys.weekly) { qs.w = keys.weekly; qs.p.wc=0; qs.p.we=0; for(let k in qs.c) if(k.startsWith('w')) delete qs.c[k]; save=true; }
    if(qs.m !== keys.monthly) { qs.m = keys.monthly; qs.p.mc=0; qs.p.me=0; for(let k in qs.c) if(k.startsWith('m')) delete qs.c[k]; save=true; }
    
    if(save) saveData();
}

function addQuestProgress(t, amt) {
    let p = gameState.qs.p;
    if(t === 'c') { p.dc+=amt; p.wc+=amt; p.mc+=amt; }
    if(t === 'e') { p.de+=amt; p.we+=amt; p.me+=amt; }
}

function roll(zIdx, rodLvl) {
    let weather = getCurrentWeather(); 
    let evt = getCurrentEvent();
    let pool = items.filter(i => i.z <= zIdx);
    
    if (weather.name.includes("Sturm") || (gameState.bait > 0)) pool = pool.filter(i => i.v >= 0);
    
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodLvl * 0.1);
        if (weather.name.includes("Regen") && i.v > 25) w *= 1.5;
        if (i.n === evt.target) w *= evt.boost;
        return { ...i, weight: w };
    });
    
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total;
    let baseItem = pool[0];
    for (let i of modPool) { if (r < i.weight) { baseItem = i; break; } r -= i.weight; }
    
    // 🧬 MUTATION / SHINY LOGIK (1% Chance)
    let isShiny = Math.random() < 0.01;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, isShiny: false };
    
    if (isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n + " (Mutation)";
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    
    return finalItem;
}

function updateDex(item) {
    if(!gameState.dex[item.baseName] || typeof gameState.dex[item.baseName] !== 'object') {
        gameState.dex[item.baseName] = { normal: false, shiny: false };
    }
    if(item.isShiny) gameState.dex[item.baseName].shiny = true;
    else gameState.dex[item.baseName].normal = true;
}

async function loadData() {
    if (!currentUser) return;
    try {
        const snap = await get(ref(db, "users/" + currentUser));
        if (snap.exists()) { gameState = snap.val(); } 
        else { 
            gameState = { 
                name: currentUser, money: 0, xp: 0, level: 1, rod: 0, zone: 0, combo: 0,
                inventory: {}, dex: {}, bait: 0, net: { level: 0, lastClaim: Date.now() }, 
                lastDaily: 0, dailyStreak: 0, prestige: 0, stats: { totalCaught: 0, totalEarned: 0 } 
            }; 
        }
        
        if(!gameState.inventory) gameState.inventory={}; 
        if(!gameState.dex) gameState.dex={}; 
        if(!gameState.net) gameState.net={level:0, lastClaim:Date.now()};
        if(!gameState.stats) gameState.stats={totalCaught:0,totalEarned:0};
        gameState.combo = 0; // Combo reset on login
        
        checkQuestResets(); updateUI();
        document.getElementById("authBox").style.display = "none"; 
        document.getElementById("game").style.display = "block"; 
        log(`✅ Willkommen zurück!`);
    } catch (e) { console.error(e); }
}

function saveData() { if (currentUser && gameState) set(ref(db, "users/" + currentUser), gameState); }

function updateUI() {
    if(!gameState) return;
    
    document.getElementById("ui-money").innerText = `💰 ${gameState.money}$`;
    document.getElementById("ui-level").innerText = `⭐ Lvl ${gameState.level} (${gameState.xp}/${gameState.level * 50})`;
    document.getElementById("zoneDisplay").innerText = `🌊 ${zones[gameState.zone].name}`;
    document.getElementById("weatherDisplay").innerText = getCurrentWeather().name;
    
    let evt = getCurrentEvent();
    document.getElementById("eventDisplay").innerText = evt.name !== "Kein Event" ? evt.name : "🌍 Kein Event";
    
    let baitUI = document.getElementById("bait-info");
    if(gameState.bait > 0) { baitUI.style.display = "block"; document.getElementById("bait-clicks").innerText = gameState.bait; } 
    else { baitUI.style.display = "none"; }

    let comboBar = document.getElementById("combo-bar");
    if(gameState.combo > 1) {
        comboBar.style.display = "block";
        let mult = 1 + (Math.min(gameState.combo, 50) * 0.02);
        comboBar.innerText = `🔥 Combo: x${mult.toFixed(2)} (${gameState.combo} Fänge)`;
    } else {
        comboBar.style.display = "none";
    }
}
setInterval(() => { if(gameState) updateUI(); }, 5000);

function log(t) { 
    let l = document.getElementById("log"); 
    let prefix = t.startsWith("✅") || t.startsWith("💰") || t.startsWith("🕸️") || t.startsWith("🧬") || t.startsWith("❌") ? "" : "🎣 ";
    l.innerHTML = prefix + t + "<br>" + l.innerHTML.split("<br>").slice(0, 8).join("<br>"); 
}

window.closeModal = function() { document.getElementById('modal-overlay').style.display = 'none'; };
function openModal(t, b, f='') { 
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = b; 
    document.getElementById('modal-footer').innerHTML = f; 
    document.getElementById('modal-footer').style.display = f ? 'flex' : 'none'; 
    document.getElementById('modal-overlay').style.display = 'flex'; 
}

// --- AKTIONEN ---
window.handleFish = function() {
    const btn = document.getElementById('btnFish'); btn.disabled = true;
    const rod = document.getElementById('rod'); rod.classList.remove('animate-rod'); void rod.offsetWidth; rod.classList.add('animate-rod');
    
    setTimeout(() => {
        let i = roll(gameState.zone, gameState.rod);
        
        // COMBO LOGIK
        if (i.baseName === "Müll" || i.baseName === "Schuh" || i.baseName === "Alge") {
            if(gameState.combo > 5) log(`❌ Combo gebrochen durch ${i.baseName}!`);
            gameState.combo = 0;
        } else {
            gameState.combo++;
        }
        
        let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
        let finalValue = Math.floor(i.v * comboMult);
        let finalXp = Math.floor(5 * (i.isShiny ? 5 : 1) * comboMult);

        gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; 
        updateDex(i);
        gameState.xp += finalXp; 
        gameState.stats.totalCaught++; 
        addQuestProgress('c', 1);
        
        if(gameState.bait > 0) gameState.bait--;
        
        let msg = i.isShiny ? `<span style="color:#fcd34d; font-weight:bold;">🧬 MUTATION GEFANGEN: ${i.baseName} (${finalValue}$)</span>` : `Gefangen: ${i.n} (${finalValue}$)`;
        
        if (gameState.xp >= gameState.level * 50) { 
            gameState.xp -= gameState.level * 50; gameState.level++; 
            msg += `<br>⭐ LEVEL UP! Du bist jetzt Level ${gameState.level}!`; 
        }
        
        updateUI(); log(msg); saveData(); btn.disabled = false;
    }, 800);
}

window.handleSellMenu = function() {
    let base = 0; let has = false; let html = `<h3>Dein Rucksack</h3>`;
    for (let k in gameState.inventory) {
        if (gameState.inventory[k] > 0) { 
            has = true; 
            let isMutant = k.startsWith("🧬 ");
            let baseN = isMutant ? k.replace("🧬 ", "").replace(" (Mutation)", "") : k;
            let baseVal = items.find(x=>x.n===baseN).v;
            let val = (isMutant ? baseVal * 5 : baseVal) * gameState.inventory[k];
            
            base += val; 
            html += `<div class="item-row"><span>${gameState.inventory[k]}x ${k}</span><span style="color:${val>=0?'#10b981':'#ef4444'}">${val}$</span></div>`; 
        }
    }
    if (!has) return openModal("💰 Verkauf", "<p>Dein Rucksack ist leer!</p>");
    
    let bonus = gameState.prestige * 1; let finalTotal = Math.floor(base * (1 + (bonus / 100)));
    
    html += `<hr><div class="item-row" style="color:#94a3b8;"><span>Basiswert:</span><span>${base}$</span></div>`;
    if (bonus > 0 && base > 0) html += `<div class="item-row" style="color:#f59e0b; font-size:13px;"><span>🏆 Prestige Bonus (+${bonus}%):</span><span>+${finalTotal - base}$</span></div>`;
    html += `<div class="item-row" style="font-weight:bold; font-size:18px; color:${finalTotal>=0?'#10b981':'#ef4444'};"><span>Gesamt:</span><span>${finalTotal}$</span></div>`;
    
    openModal("💰 Verkauf", html, `<button class="success-btn" onclick="executeSell(${finalTotal})">Alles Verkaufen</button>`);
}

window.executeSell = function(val) { 
    gameState.money += val; if(val>0){ gameState.stats.totalEarned += val; addQuestProgress('e', val); } 
    gameState.inventory = {}; updateUI(); log(`💰 Alles verkauft für ${val}$`); saveData(); closeModal(); 
}

window.handleNetMenu = function() {
    let n = gameState.net;
    let nextLvl = n.level + 1;
    let nextInfo = autoLevels[nextLvl];
    
    if (n.level === 0) {
        openModal("⚙️ Auto-Angeln", `<div style="text-align:center;"><p>Schalte automatisches Angeln frei! (Fängt auch offline Fische)</p><div style="font-weight:bold; margin-top:15px; color:#60a5fa;">Stufe 1:<br>1 Fisch alle ${nextInfo.time/60} Min.<br>Maximal: ${nextInfo.cap} Fische</div></div>`, gameState.money>=nextInfo.cost?`<button class="success-btn" onclick="buyNet(${nextInfo.cost})">Kaufen (${nextInfo.cost.toLocaleString()}$)</button>`:`<button disabled>Zu wenig Geld (${nextInfo.cost.toLocaleString()}$)</button>`);
    } else {
        let curInfo = autoLevels[n.level];
        let minsPassed = Math.floor((Date.now() - n.lastClaim) / 60000);
        let fishPerMin = 1 / (curInfo.time / 60);
        let cnt = Math.floor(Math.min(minsPassed * fishPerMin, curInfo.cap));
        
        let html = `<div style="text-align:center;"><p>Dein System lief im Hintergrund.</p><h2 style="color:#10b981; margin:10px 0;">${cnt} / ${curInfo.cap} Fische</h2><p style="font-size:12px; color:#94a3b8;">(1 Fisch alle ${curInfo.time/60} Min)</p></div>`;
        
        if(nextLvl < autoLevels.length) {
            html += `<hr style="border-color:#334155; margin: 15px 0;"><div style="text-align:left;"><b>Upgrade (Stufe ${nextLvl}):</b><br><span style="font-size:12px; color:#94a3b8;">1 Fisch alle ${nextInfo.time/60} Min (Max ${nextInfo.cap})</span><br><button class="success-btn" style="margin-top:8px; width:100%;" ${gameState.money<nextInfo.cost?'disabled':''} onclick="buyNet(${nextInfo.cost})">Upgrade für ${nextInfo.cost.toLocaleString()}$</button></div>`;
        }
        
        openModal("⚙️ Auto-Angeln Stufe " + n.level, html, cnt>0?`<button class="success-btn" onclick="claimNet(${cnt})">Maschine leeren</button>`:`<button disabled>Kein Fisch bereit</button>`);
    }
}
window.buyNet = function(cost) { gameState.money-=cost; gameState.net.level++; gameState.net.lastClaim=Date.now(); saveData(); handleNetMenu(); }
window.claimNet = function(c) { 
    for(let i=0;i<c;i++){ let item=roll(gameState.zone, 0); gameState.inventory[item.n]=(gameState.inventory[item.n]||0)+1; updateDex(item); } 
    gameState.net.lastClaim=Date.now(); updateUI(); log(`🕸️ System geleert! ${c} Fische verstaut.`); saveData(); closeModal(); 
}

window.handleQuestMenu = function() {
    checkQuestResets(); let qs = gameState.qs; let html = ``;
    function build(title, list, pC, pE) {
        let sec = `<h4 style="color:#60a5fa; border-bottom:1px solid #334155; margin-bottom:10px; margin-top: 20px;">${title}</h4>`;
        list.forEach(q => {
            let prog = q.t === 'c' ? qs.p[pC] : qs.p[pE]; let done = prog >= q.req; let claimed = qs.c[q.id]; let dProg = Math.min(prog, q.req);
            sec += `<div class="quest-row">
                        <div><b>${q.desc}</b><br><span style="font-size:12px;color:#94a3b8;">${dProg} / ${q.req}</span></div>
                        <div>`;
            if (claimed) sec += `✅`; else if (done) sec += `<button class="success-btn" style="padding: 5px 10px; font-size: 12px;" onclick="claimQuest('${q.id}', ${q.rew})">${q.rew}$</button>`; else sec += `<span style="font-size: 12px; color: #94a3b8;">🔒 ${q.rew}$</span>`;
            sec += `</div></div>`;
        }); return sec;
    }
    html += build("🌞 Daily Quests", questDB.daily, 'dc', 'de') + build("📅 Weekly Quests", questDB.weekly, 'wc', 'we') + build("🏆 Monthly Quests", questDB.monthly, 'mc', 'me');
    openModal("📜 Missionen", html);
}
window.claimQuest = function(id, rew) { gameState.qs.c[id]=true; gameState.money+=rew; gameState.stats.totalEarned+=rew; updateUI(); saveData(); handleQuestMenu(); }

window.handleDailyMenu = function() {
    let now = Date.now(); let DAY = 86400000; let can = false; let nStr = gameState.dailyStreak;
    if (gameState.lastDaily === 0 || now - gameState.lastDaily >= DAY * 2) { can=true; nStr=1; } else if (now - gameState.lastDaily >= DAY) { can=true; nStr=Math.min(nStr+1, 7); }
    let html = `<p style="font-size:12px;color:#94a3b8;">Logge dich täglich ein, um Belohnungen zu erhalten!</p>`; let cur = 0;
    for (let i = 1; i <= 7; i++) {
        let rew = i * 100 + (gameState.prestige * 50); let cl = ""; let ic = "⏳";
        if (i < nStr || (!can && i <= nStr)) { cl="missed"; ic="✅"; } else if (i === nStr && can) { cl="active"; ic="🎁"; cur=rew; }
        html += `<div class="daily-day ${cl}"><span>Tag ${i}</span><span>${ic} ${rew}$</span></div>`;
    }
    if(!can) html += `<p style="color:#f59e0b; text-align: center; margin-top: 15px;">⏳ Komm in ${Math.ceil((DAY-(now-gameState.lastDaily))/3600000)} Stunden wieder.</p>`;
    openModal("🎁 Daily Belohnung", html, can ? `<button class="success-btn" onclick="claimDaily(${cur},${nStr})">Abholen (${cur}$)</button>` : "");
}
window.claimDaily = function(rew, str) { gameState.money+=rew; gameState.stats.totalEarned+=rew; gameState.lastDaily=Date.now(); gameState.dailyStreak=str; updateUI(); saveData(); closeModal(); }

window.handleLeaderboard = async function() {
    openModal("👑 Top 5", "<p style='text-align: center;'>Lade Spielerdaten...</p>"); 
    try { 
        const snap = await get(ref(db,"users")); 
        if(snap.exists()) { 
            let usrs=[]; snap.forEach(c=>usrs.push(c.val())); 
            usrs.sort((a,b)=>b.prestige-a.prestige||b.level-a.level||b.money-a.money); 
            let html=``; 
            usrs.slice(0,5).forEach((u,i)=> {
                let medal = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : `${i+1}.`;
                html+=`<div class="leader-row" style="${u.name===currentUser?'border:1px solid #10b981;':''}">
                         <b>${medal} ${u.name}</b> 
                         <span style="text-align: right; font-size: 12px; color: #94a3b8;">Prestige ${u.prestige} | Lvl ${u.level}<br><span style="color:#10b981;">${u.money.toLocaleString()}$</span></span>
                       </div>`;
            }); 
            openModal("👑 Globale Top 5", html); 
        } 
    } catch(e){ openModal("👑 Top 5", "<p>Fehler beim Laden.</p>"); }
}
