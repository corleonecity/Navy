<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Virtual Fisher PRO v3.6</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Tahoma, sans-serif;
            color: #e6f0ff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; transition: background 1s ease-in-out;
            background: radial-gradient(circle at center, #0f172a 0%, #010409 100%); padding: 10px;
        }
        #aquarium-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        .aqua-fish-entity { position: absolute; font-size: clamp(40px, 8vw, 55px); filter: drop-shadow(0 0 10px rgba(59,130,246,0.5)); transition: left 5s linear, top 5s linear; white-space: nowrap; }
        
        body.zone-bg-0 { background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%); }
        body.zone-bg-1 { background: radial-gradient(circle at top, #0284c7 0%, #082f49 100%); }
        body.zone-bg-2 { background: radial-gradient(circle at bottom, #1e1b4b 0%, #020617 100%); }
        body.zone-bg-3 { background: radial-gradient(circle at center, #4c1d95 0%, #000000 100%); }
        
        #btnAdminTop { position: fixed; top: 10px; right: 10px; background: rgba(15, 23, 42, 0.8); border: 1px solid #3b82f6; font-size: 24px; cursor: pointer; display: none; z-index: 1000; padding: 8px 12px; border-radius: 40px; }
        
        .container {
            width: 100%; max-width: 550px; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(12px);
            padding: 15px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 10; max-height: 95vh; overflow-y: auto;
        }
        #fishing-scene { height: 110px; position: relative; margin-bottom: 12px; border-bottom: 3px solid #3b82f6; overflow: hidden; border-radius: 16px 16px 0 0; background: rgba(0,0,0,0.2); }
        .boat-container { position: absolute; bottom: 10px; left: 10%; animation: bobbingBoat 3s ease-in-out infinite; z-index: 3; }
        @keyframes bobbingBoat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-3px) rotate(2deg); } }
        .fisher-emoji { font-size: clamp(28px, 7vw, 36px); display: inline-block; }
        
        .bobber { position: absolute; bottom: 12px; left: 60%; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 2px solid #7f1d1d; transition: 0.1s; z-index: 3; box-shadow: 0 0 8px rgba(239,68,68,0.8); }
        .fishing-active .bobber { animation: bobUnder 0.6s ease-in-out infinite alternate; }
        @keyframes bobUnder { 0% { bottom: 12px; transform: scale(1); } 100% { bottom: -5px; transform: scale(0.7); opacity: 0.6; } }
        
        #fishing-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .water-layer-1 { position: absolute; bottom: 0; width: 200%; height: 20px; background: linear-gradient(90deg, rgba(59,130,246,0.3) 0%, rgba(59,130,246,0.6) 25%, rgba(59,130,246,0.3) 50%, rgba(59,130,246,0.6) 75%, rgba(59,130,246,0.3) 100%); animation: waves 4s linear infinite; z-index: 4; }
        .water-layer-2 { position: absolute; bottom: 5px; width: 200%; height: 20px; background: linear-gradient(90deg, rgba(29,78,216,0.3) 0%, rgba(29,78,216,0.6) 25%, rgba(29,78,216,0.3) 50%, rgba(29,78,216,0.6) 75%, rgba(29,78,216,0.3) 100%); animation: waves 5s linear infinite reverse; z-index: 2; }
        @keyframes waves { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        .rain-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(170deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 2%, rgba(255,255,255,0.4) 2.5%, rgba(255,255,255,0) 3%); background-size: 100% 200%; animation: rainFall 0.3s linear infinite; z-index: 5; pointer-events: none; }
        @keyframes rainFall { from { background-position: 0 0; } to { background-position: 0 100%; } }
        .shark-fx { position: absolute; bottom: 5px; font-size: 22px; animation: swimShark 8s linear infinite; z-index: 3; pointer-events: none; }
        @keyframes swimShark { 0% { right: -40px; transform: scaleX(-1); } 100% { right: 110%; transform: scaleX(-1); } }
        
        #top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: bold; flex-wrap: wrap; gap: 8px; }
        #stats-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 10px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; font-weight: bold; flex-wrap: wrap; gap: 8px; }
        .equip-bar { display: flex; justify-content: space-between; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 8px 12px; border-radius: 12px; font-size: 12px; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
        .btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        button { padding: 12px 8px; border: none; border-radius: 12px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; transition: 0.15s; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-direction: column; }
        button span { font-size: 20px; }
        button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { background: #334155; cursor: not-allowed; opacity: 0.6; }
        .danger-btn { background: #ef4444; flex-direction: row; }
        .prestige-btn { background: #8b5cf6; flex-direction: row; justify-content: center; font-size: 16px; }
        .success-btn { background: #10b981; flex-direction: row; }
        .update-btn { background: #0ea5e9; flex-direction: row; }
        
        #log { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; font-size: 13px; text-align: left; border-left: 4px solid #3b82f6; margin-top: 10px; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); word-break: break-word; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(8px); padding: 16px; }
        .modal-content { background: #161b22; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 20px; border: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { background: #0d1117; padding: 15px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .modal-body { padding: 20px; overflow-y: auto; font-size: 14px; }
        .modal-footer { padding: 15px 20px; background: #0d1117; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #30363d; }
        .close-btn { background: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 8px; }
        .quest-row { background: #0d1117; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* Neues Design für Rucksack-Abrechnung */
        .summary-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .summary-total { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-top: 10px; font-size: 16px; font-weight: bold; }
        
        /* Leaderboard & Profile Cards */
        .leader-card, .profile-card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 10px; transition: 0.2s; cursor: pointer; }
        .leader-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .profile-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #30363d; padding-bottom: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .profile-avatar { font-size: 40px; background: #1e293b; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #60a5fa; }
        .card-stats { display: flex; justify-content: space-between; font-size: 13px; color: #8b949e; margin-top: 5px; }

        #minigame-container { background: #0f172a; padding: 20px; border-radius: 20px; border: 2px solid #ef4444; text-align: center; }
        .power-bar-bg { width: 100%; background: #1e293b; height: 30px; border-radius: 8px; overflow: hidden; margin: 8px 0; }
        .power-bar-fill { height: 100%; transition: width 0.1s linear; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-weight: bold; font-size: 11px; }
        @keyframes bossShake { 0%,100%{ transform: translate(0,0); } 25%{ transform: translate(2px,2px); } 50%{ transform: translate(-2px,-1px); } 75%{ transform: translate(1px,-2px); } }
        .boss-active { animation: bossShake 0.3s infinite; }
        
        @media (max-width: 550px) {
            .container { padding: 12px; }
            .btn-grid { grid-template-columns: repeat(2, 1fr); }
            .btn-grid-2 { grid-template-columns: 1fr; }
            button { padding: 10px; font-size: 12px; }
            button span { font-size: 18px; }
        }
    </style>
</head>

<script type="module">

import { getDatabase, ref, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB7AmLb6NwR8sKyDXtIhmghGszpX_VsICY",
    authDomain: "cc-shop-36c3b.firebaseapp.com",
    databaseURL: "https://cc-shop-36c3b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cc-shop-36c3b",
    storageBucket: "cc-shop-36c3b.firebasestorage.app"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let gameState = null;
let globalState = null;

const zones = [
    { name: "See", reqPrestige: 0 },
    { name: "Meer", reqPrestige: 1 },
    { name: "Tiefsee", reqPrestige: 3 },
    { name: "Verlorener Ozean", reqPrestige: 5 }
];

const items = [
    {n:"Müll",v:-10,c:25,z:-1,e:"🗑️"}, {n:"Schuh",v:-5,c:15,z:-1,e:"👞"}, {n:"Alge",v:-2,c:20,z:-1,e:"🌿"},
    {n:"Rostige Dose",v:-3,c:15,z:-1,e:"🥫"}, {n:"Plastiktüte",v:-5,c:10,z:-1,e:"🛍️"},
    {n:"Kaulquappe",v:2,c:30,z:0,e:"🦠"}, {n:"Karpfen",v:5,c:20,z:0,e:"🐟"}, {n:"Forelle",v:10,c:15,z:0,e:"🐟"},
    {n:"Hecht",v:35,c:5,z:0,e:"🐊"}, {n:"Stör",v:60,c:1.5,z:0,e:"🐉"},
    {n:"Sardine",v:8,c:25,z:1,e:"🐟"}, {n:"Lachs",v:25,c:10,z:1,e:"🍣"}, {n:"Schwertfisch",v:80,c:4,z:1,e:"🗡️"},
    {n:"Hai",v:80,c:8,z:2,e:"🦈"}, {n:"Anglerfisch",v:200,c:3,z:2,e:"🎣"}, {n:"Leviathan",v:400,c:0.5,z:2,e:"🐋"},
    {n:"Atlantis-Kristall",v:800,c:2,z:3,e:"💎"}, {n:"Megalodon",v:1500,c:0.5,z:3,e:"🦖"}, {n:"Poseidons Dreizack",v:5000,c:0.05,z:3,e:"🔱"}
];

const rodsDB = {
    "r1": { name: "Holzrute", e: "🪵", cost: 0, boost: 0, desc: "Standard" },
    "r2": { name: "Fiberglas", e: "🎣", cost: 5000, boost: 0.1, desc: "+10% Seltene" },
    "r3": { name: "Meisterrute", e: "🔱", cost: 100000, boost: 0.4, desc: "+40% Seltene" }
};
const baitsDB = {
    "b1": { name: "Brot", e: "🍞", cost: 100, amt: 20, desc: "+5% Chance", type: "boost" },
    "b2": { name: "Wurm", e: "🪱", cost: 500, amt: 20, desc: "Blockt Müll", type: "clean" }
};

const specialEvents = [
    { name: "☀️ Goldene Sonne", type: "sun", boost: 3, target: "shiny", desc: "+300% Mutation" },
    { name: "🌧️ Monsun", type: "rain", boost: 2, target: "speed", desc: "Doppelt so schnell!" },
    { name: "🦈 Hai-Woche", type: "hai", boost: 5, target: "Hai", desc: "5x Chance auf Haie" },
    { name: "🌍 Friede", type: "normal", boost: 1, target: "none", desc: "Normales Wetter" }
];

function getCurrentEventInfo() {
    let now = Date.now();
    if (globalState && globalState.event && now < globalState.event.exp) {
        return { event: globalState.event, timeLeft: globalState.event.exp - now };
    }
    let cycle = 30 * 60 * 1000;
    let epoch = Math.floor(now / cycle);
    let evtDef = specialEvents[epoch % specialEvents.length];
    return { event: evtDef, timeLeft: ((epoch + 1) * cycle) - now };
}

let weatherInterval = null;
function startWeatherEffects() {
    if(weatherInterval) clearInterval(weatherInterval);
    weatherInterval = setInterval(() => {
        let scene = document.getElementById('fishing-scene');
        if(!scene) return;
        let oldRain = scene.querySelector('.rain-fx');
        let oldShark = scene.querySelector('.shark-fx');
        if(oldRain) oldRain.remove();
        if(oldShark) oldShark.remove();
        let { event } = getCurrentEventInfo();
        if(event.type === 'rain') {
            let rainDiv = document.createElement('div');
            rainDiv.className = 'rain-fx';
            scene.appendChild(rainDiv);
        }
        if(event.type === 'hai') {
            let sharkDiv = document.createElement('div');
            sharkDiv.className = 'shark-fx';
            sharkDiv.innerText = '🦈';
            scene.appendChild(sharkDiv);
        }
    }, 100);
}

function renderAquarium() {
    let bg = document.getElementById("aquarium-bg");
    if(!bg) return;
    bg.innerHTML = "";
    if(!gameState?.aquarium?.fishes) return;
    gameState.aquarium.fishes.forEach((f, idx) => {
        let div = document.createElement("div");
        div.className = "aqua-fish-entity";
        div.innerText = f.e;
        div.style.left = Math.random() * 85 + "%";
        div.style.top = Math.random() * 80 + 10 + "%";
        let moveInterval = setInterval(() => {
            if(!document.body.contains(div)) { clearInterval(moveInterval); return; }
            let newX = Math.random() * 85;
            let newY = Math.random() * 80 + 10;
            if(newX < parseFloat(div.style.left)) div.style.transform = "scaleX(-1)";
            else div.style.transform = "scaleX(1)";
            div.style.left = newX + "%";
            div.style.top = newY + "%";
        }, 6000);
        bg.appendChild(div);
    });
}

function roll(zIdx) {
    let { event } = getCurrentEventInfo();
    let rodDef = rodsDB[gameState.eqRod] || rodsDB.r1;
    let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1);
    if(baitDef?.type === "clean") pool = pool.filter(i => i.v >= 0);
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if(baitDef?.type === "boost") w *= 1.05;
        if(i.n === event.target) w *= event.boost;
        return { ...i, weight: w };
    });
    let total = modPool.reduce((s,i)=>s+i.weight,0);
    let r = Math.random() * total;
    let baseItem = pool[0];
    for(let i of modPool) {
        if(r < i.weight) { baseItem = i; break; }
        r -= i.weight;
    }
    let shinyChance = 0.01;
    if(event.target === "shiny") shinyChance *= event.boost;
    let isShiny = Math.random() < shinyChance;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, e: baseItem.e, isShiny: false };
    if(isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n;
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    return finalItem;
}

function updateDex(item) {
    if(!gameState.dex[item.baseName]) gameState.dex[item.baseName] = { normal: false, shiny: false, count: 0 };
    if(item.isShiny) gameState.dex[item.baseName].shiny = true;
    else gameState.dex[item.baseName].normal = true;
    gameState.dex[item.baseName].count++;
}

const questDB = {
    daily: [{id:'d1',desc:'Fange 15 Fische',t:'c',req:15,rew:50},{id:'d2',desc:'Verdiene 250$',t:'e',req:250,rew:100}],
    weekly: [{id:'w1',desc:'Fange 150 Fische',t:'c',req:150,rew:500}],
    monthly: [{id:'m1',desc:'Fange 500 Fische',t:'c',req:500,rew:2500}]
};

function getResetKeys() {
    let d = new Date();
    let daily = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    let monthly = `${d.getFullYear()}-${d.getMonth()}`;
    let d0 = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    let dayNum = d0.getUTCDay() || 7;
    d0.setUTCDate(d0.getUTCDate() + 4 - dayNum);
    let yStart = new Date(Date.UTC(d0.getUTCFullYear(),0,1));
    let weekNo = Math.ceil((((d0 - yStart) / 86400000) + 1)/7);
    let weekly = `${d0.getUTCFullYear()}-W${weekNo}`;
    return { daily, weekly, monthly };
}

function checkQuestResets() {
    let k = getResetKeys();
    if(!gameState.qs) {
        gameState.qs = { d: k.daily, w: k.weekly, m: k.monthly, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    }
    if(!gameState.qs.p) gameState.qs.p = { dc:0, de:0, wc:0, we:0, mc:0, me:0 }; // Sicherheits-Check
    if(!gameState.qs.c) gameState.qs.c = {};
    let qs = gameState.qs;
    let save = false;
    if(qs.d !== k.daily) { qs.d = k.daily; qs.p.dc=0; qs.p.de=0; for(let c in qs.c) if(c.startsWith('d')) delete qs.c[c]; save=true; }
    if(qs.w !== k.weekly) { qs.w = k.weekly; qs.p.wc=0; qs.p.we=0; for(let c in qs.c) if(c.startsWith('w')) delete qs.c[c]; save=true; }
    if(qs.m !== k.monthly) { qs.m = k.monthly; qs.p.mc=0; qs.p.me=0; for(let c in qs.c) if(c.startsWith('m')) delete qs.c[c]; save=true; }
    if(save) saveData();
}

function addQuestProgress(t, amt) {
    if(!gameState?.qs?.p) return;
    let p = gameState.qs.p;
    if(t === 'c') { p.dc+=amt; p.wc+=amt; p.mc+=amt; }
    if(t === 'e') { p.de+=amt; p.we+=amt; p.me+=amt; }
}

async function loadData() {
    if(!currentUser) return;
    onValue(ref(db, "global"), (snap) => {
        globalState = snap.exists() ? snap.val() : null;
        updateUI();
    });
    onValue(ref(db, "users/" + currentUser), (snap) => {
        if(snap.exists()) { gameState = snap.val(); }
        else {
            gameState = {
                name: currentUser, money: 0, xp: 0, level: 1, zone: 0, combo: 0,
                inventory: {}, dex: {}, aquarium: { unlocked: false, fishes: [] },
                lastDaily: 0, dailyStreak: 0, prestige: 0,
                stats: { totalCaught: 0, totalEarned: 0 },
                ownedRods: ["r1"], eqRod: "r1", baits: {}, eqBait: "none"
            };
            saveData();
        }
        if(gameState) {
            if(!gameState.aquarium) gameState.aquarium = { unlocked: false, fishes: [] };
            if(!gameState.aquarium.fishes) gameState.aquarium.fishes = [];
            if(!gameState.ownedRods) { gameState.ownedRods = ["r1"]; gameState.eqRod = "r1"; }
            if(!gameState.baits) { gameState.baits = {}; gameState.eqBait = "none"; }
            if(!gameState.stats) gameState.stats = { totalCaught: 0, totalEarned: 0 };
            if(!gameState.prestige) gameState.prestige = 0;
            checkQuestResets();
            updateUI();
            renderAquarium();
            if(document.getElementById("authBox").style.display !== "none") {
                document.getElementById("authBox").style.display = "none";
                document.getElementById("game").style.display = "flex";
                log(`Willkommen, ${currentUser}!`);
                if(currentUser === "colin") document.getElementById("btnAdminTop").style.display = "block";
                startWeatherEffects();
            }
        }
    });
    setInterval(() => {
        if(gameState?.aquarium?.fishes?.length > 0) {
            let income = gameState.aquarium.fishes.reduce((s,f) => s + Math.floor(f.v * 0.1), 0);
            if(income > 0) {
                gameState.money += income;
                log(`🐟 Aquarium: +${income}$ passiv`);
                saveData();
                updateUI();
            }
        }
    }, 60000);
}

        let endY = (bobRect.top - sRect.top) + bobRect.height/2;
        line.setAttribute('x1', startX);
        line.setAttribute('y1', startY);
        line.setAttribute('x2', endX);
        line.setAttribute('y2', endY);

let minigameActive = false, mgPlayerPower = 0, mgFishPower = 50, mgFishItem = null, mgTimer = null, mgClicksNeeded = 15, mgLastClick = 0;
function triggerMinigame(item) {
    minigameActive = true;
    mgFishItem = item;
    mgPlayerPower = 0;
    mgFishPower = Math.random() * 51 + 50;
    mgLastClick = Date.now();
    document.getElementById('minigame-container').classList.add('boss-active');
    mgClicksNeeded = item.isShiny ? 25 : (item.v >= 500 ? 40 : (item.v >= 200 ? 30 : 15));
    document.getElementById('minigame-overlay').style.display = 'flex';
    document.getElementById('mg-fish-name').innerHTML = `${item.e} ${item.n.toUpperCase()}`;
    document.getElementById('mg-fish-emoji').innerHTML = item.e;
    updateMinigameUI();
    if(mgTimer) clearInterval(mgTimer);
    mgTimer = setInterval(() => {
        if(!minigameActive) return clearInterval(mgTimer);
        if(Date.now() - mgLastClick > 1000) finishMinigame(false);
        mgFishPower = Math.max(0, mgFishPower - 0.5);
        updateMinigameUI();
    }, 100);
}
document.getElementById('btnSpamClick')?.addEventListener('click', () => {
    if(!minigameActive) return;
    mgLastClick = Date.now();
    mgClicksNeeded--;
    mgPlayerPower = Math.min(100, mgPlayerPower + Math.floor(Math.random() * 10) + 6);
    if(mgClicksNeeded <= 0) finishMinigame(true);
    updateMinigameUI();
});
function updateMinigameUI() {
    document.getElementById('mg-player-val').innerText = Math.floor(mgPlayerPower);
    document.getElementById('mg-player-bar').style.width = mgPlayerPower + "%";
    document.getElementById('mg-fish-val').innerText = Math.floor(mgFishPower);
    document.getElementById('mg-fish-bar').style.width = mgFishPower + "%";
    document.getElementById('mg-clicks-left').innerHTML = `Noch ${mgClicksNeeded} Klicks!`;
}
function finishMinigame(won) {
    minigameActive = false;
    clearInterval(mgTimer);
    document.getElementById('minigame-overlay').style.display = 'none';
    document.getElementById('minigame-container').classList.remove('boss-active');
    if(won) {
        let comboMult = 1 + Math.min(gameState.combo, 50) * 0.02;
        let finalValue = Math.floor(mgFishItem.v * comboMult);
        let finalXp = Math.floor(20 * comboMult);
        gameState.inventory[mgFishItem.n] = (gameState.inventory[mgFishItem.n] || 0) + 1;
        updateDex(mgFishItem);
        gameState.xp += finalXp;
        gameState.stats.totalCaught++;
        addQuestProgress('c', 1);
        log(`⚔️ BOSS BESIEGT! ${mgFishItem.e} ${mgFishItem.baseName} (${finalValue}$)`);
        if(gameState.xp >= gameState.level * 50) {
            gameState.xp -= gameState.level * 50;
            gameState.level++;
            log(`⭐ LEVEL UP! Level ${gameState.level}!`);
        }
        updateUI();
        saveData();
    } else {
        let loss = Math.min(Math.floor(Math.abs(mgFishItem.v) * 0.3), Math.floor(gameState.money * 0.03));
        if(loss > 0) gameState.money -= loss;
        gameState.combo = 0;
        log(`❌ Boss entkommen! Verlust: ${loss}$`);
        updateUI();
        saveData();
    }
    document.getElementById('btnFish').disabled = false;
    document.getElementById('fishing-scene').classList.remove('fishing-active');
}

window.handleFish = function() {
    let btn = document.getElementById('btnFish');
    btn.disabled = true;
    let scene = document.getElementById('fishing-scene');
    scene.classList.add('fishing-active');
    let fishTime = 800;
    let { event } = getCurrentEventInfo();
    if(event.type === "rain") fishTime = 400;
    setTimeout(() => {
        let item = roll(gameState.zone);
        if(gameState.eqBait !== "none") {
            gameState.baits[gameState.eqBait]--;
            if(gameState.baits[gameState.eqBait] <= 0) {
                log(`❌ Köder aufgebraucht!`);
                gameState.eqBait = "none";
            }
        }
        
        if(item.v < 0) {
            let penalty = Math.abs(item.v);
            gameState.xp = Math.max(0, gameState.xp - penalty);
            gameState.inventory[item.n] = (gameState.inventory[item.n] || 0) + 1;
            gameState.combo = 0;
            log(`🗑️ ${item.e} ${item.baseName} gefangen! -${penalty} XP`);
            updateUI();
            saveData();
            scene.classList.remove('fishing-active');
            btn.disabled = false;
            return;
        }

        gameState.combo++;
        if(item.isShiny || item.v >= 150) {
            triggerMinigame(item);
            scene.classList.remove('fishing-active');
            btn.disabled = true;
            return;
        }
        let comboMult = 1 + Math.min(gameState.combo, 50) * 0.02;
        let finalValue = Math.floor(item.v * comboMult);
        let finalXp = Math.floor(5 * (item.isShiny ? 5 : 1) * comboMult);
        gameState.inventory[item.n] = (gameState.inventory[item.n] || 0) + 1;
        updateDex(item);
        gameState.xp += finalXp;
        gameState.stats.totalCaught++;
        addQuestProgress('c', 1);
        let msg = item.isShiny ? `🧬 MUTATION: ${item.e} ${item.baseName} (${finalValue}$)` : `${item.e} Gefangen: ${item.baseName} (${finalValue}$)`;
        if(gameState.xp >= gameState.level * 50) {
            gameState.xp -= gameState.level * 50;
            gameState.level++;
            msg += ` ⭐ LEVEL UP! Level ${gameState.level}!`;
        }
        log(msg);
        updateUI();
        saveData();
        scene.classList.remove('fishing-active');
        btn.disabled = false;
    }, fishTime);
}

window.handleSellMenu = function() {
    if(!gameState.aquarium) gameState.aquarium = { unlocked: false, fishes: [] };
    
    let baseValue = 0;
    let trashValue = 0;
    let hasItems = false;
    
    let html = `<h3>🎒 Rucksack</h3><div style="max-height:40vh; overflow-y:auto; padding-right:5px; margin-bottom:10px;">`;
    
    for(let [name, count] of Object.entries(gameState.inventory)) {
        if(count > 0) {
            hasItems = true;
            let isMutant = name.startsWith("🧬 ");
            let baseName = isMutant ? name.replace("🧬 ", "") : name;
            let baseItem = items.find(i => i.n === baseName);
            if(baseItem) {
                let itemValue = (isMutant ? baseItem.v * 5 : baseItem.v) * count;
                if(itemValue >= 0) baseValue += itemValue;
                else trashValue += itemValue;
                
                let color = itemValue >= 0 ? '#10b981' : '#ef4444';
                let aquaBtn = '';
                if(baseItem.v > 0 && gameState.aquarium.unlocked && gameState.aquarium.fishes.length < 5) {
                    aquaBtn = `<button class="update-btn" style="padding:5px 8px; font-size:11px; margin-left:10px; flex-direction:row;" onclick="sendToAquarium('${name}')">🐟 Ins Aqua</button>`;
                }
                
                html += `<div class="item-row" style="align-items:center;">
                    <div style="flex:1;"><b>${count}x ${baseItem.e} ${name}</b></div>
                    <div style="color:${color}; font-weight:bold;">${itemValue >= 0 ? '+' : ''}${itemValue.toLocaleString()}$</div>
                    ${aquaBtn}
                </div>`;
            }
        }
    }
    html += `</div>`;
    
    if(!hasItems) return openModal("💰 Rucksack", "<p>Dein Rucksack ist leer!</p>");
    
    let bonusPercent = gameState.prestige || 0;
    let prestigeBonus = Math.floor(baseValue * (bonusPercent / 100));
    let finalTotal = baseValue + prestigeBonus + trashValue;
    
    html += `
    <div class="summary-box">
        <div class="summary-row"><span>🐟 Basis-Wert (Fische):</span> <span style="color:#10b981;">+${baseValue.toLocaleString()}$</span></div>
        <div class="summary-row"><span>👑 Prestige Bonus (+${bonusPercent}%):</span> <span style="color:#60a5fa;">+${prestigeBonus.toLocaleString()}$</span></div>
        <div class="summary-row"><span>🗑️ Müll-Strafe:</span> <span style="color:#ef4444;">${trashValue.toLocaleString()}$</span></div>
        <div class="summary-total">
            <span>Gesamtbetrag:</span> 
            <span style="color:${finalTotal >= 0 ? '#10b981' : '#ef4444'};">${finalTotal >= 0 ? '+' : ''}${finalTotal.toLocaleString()}$</span>
        </div>
    </div>`;
    
    let sellBtnText = finalTotal < 0 ? "Müll kostenpflichtig entsorgen" : "Alles verkaufen";
    let sellBtnClass = finalTotal < 0 ? "danger-btn" : "success-btn";
    
    openModal("💰 Rucksack", html, `<button class="${sellBtnClass}" onclick="executeSell(${finalTotal})">${sellBtnText}</button>`);
}

window.executeSell = function(val) {
    let hasItems = Object.values(gameState.inventory).some(v => v > 0);
    if(!hasItems) return;
    
    gameState.money += val;
    if(gameState.money < 0) gameState.money = 0; 
    
    if(val > 0) { gameState.stats.totalEarned += val; addQuestProgress('e', val); }
    gameState.inventory = {};
    updateUI();
    
    if(val < 0) log(`💸 Müll entsorgt. Das hat dich ${Math.abs(val).toLocaleString()}$ gekostet.`);
    else log(`💰 Rucksack verkauft für ${val.toLocaleString()}$`);
    
    saveData();
    handleSellMenu();
}

window.handleAquaMenu = function() {
    if(!gameState) return;
    if(!gameState.aquarium) gameState.aquarium = { unlocked: false, fishes: [] };
    if(!gameState.aquarium.fishes) gameState.aquarium.fishes = [];

window.unlockAquarium = function() {
    if(gameState.money >= 50000) gameState.money -= 50000;
    gameState.aquarium.unlocked = true;
    saveData();
    handleAquaMenu();
    log("🐟 Aquarium freigeschaltet!");
    renderAquarium();
}

window.sendToAquarium = function(itemName) {
    if(!gameState.aquarium) gameState.aquarium = { unlocked: false, fishes: [] };
    if(!gameState.aquarium.unlocked) return alert("Aquarium nicht freigeschaltet!");
    if(gameState.aquarium.fishes.length >= 5) return alert("Maximal 5 Fische!");
    
    let count = gameState.inventory[itemName];
    if(!count) return;
    let isMutant = itemName.startsWith("🧬 ");
    let baseName = isMutant ? itemName.replace("🧬 ", "") : itemName;
    let baseItem = items.find(i => i.n === baseName);
    
    if(baseItem && baseItem.v > 0) {
        gameState.inventory[itemName]--;
        if(gameState.inventory[itemName] <= 0) delete gameState.inventory[itemName];
        let value = isMutant ? baseItem.v * 5 : baseItem.v;
        gameState.aquarium.fishes.push({ n: itemName, e: baseItem.e, v: value });
        saveData();
        renderAquarium();
        handleSellMenu();
        log(`🐟 ${itemName} ins Aquarium gesetzt!`);
    }
}

window.removeFromAquarium = function(idx) {
    let fish = gameState.aquarium.fishes.splice(idx, 1)[0];
    gameState.inventory[fish.n] = (gameState.inventory[fish.n] || 0) + 1;
    saveData();
    renderAquarium();
    handleAquaMenu();
}

window.handleQuestMenu = function() {
    checkQuestResets();
    let qs = gameState.qs || { p: {}, c: {} };
    let qsP = qs.p || {};
    let html = `<p style="color:#fcd34d;">⏳ Täglich um 0 Uhr reset</p>`;
    let cats = [{n:"🌞 Daily", l:questDB.daily, c:'dc', e:'de'}, {n:"📅 Weekly", l:questDB.weekly, c:'wc', e:'we'}, {n:"🏆 Monthly", l:questDB.monthly, c:'mc', e:'me'}];
    cats.forEach(cat => {
        html += `<h4>${cat.n}</h4>`;
        cat.l.forEach(q => {
            let prog = (q.t === 'c' ? qsP[cat.c] : qsP[cat.e]) || 0;
            let done = prog >= q.req;
            let claimed = qs.c && qs.c[q.id];
            html += `<div class="quest-row"><div><b>${q.desc}</b><br>${Math.min(prog, q.req)}/${q.req}</div><div>${claimed ? '✅' : (done ? `<button class="success-btn" onclick="claimQuest('${q.id}',${q.rew})">${q.rew}$</button>` : `🔒 ${q.rew}$`)}</div></div>`;
        });
    });
    openModal("📜 Quests", html);
}
window.claimQuest = function(id, rew) { if(!gameState.qs.c) gameState.qs.c={}; gameState.qs.c[id]=true; gameState.money += rew; gameState.stats.totalEarned += rew; saveData(); updateUI(); handleQuestMenu(); }

window.handleDexMenu = function() {
    let html = `<div style="display:flex; gap:10px; margin-bottom:15px;"><button onclick="showDexTab('normal')" id="dexTabNormal" style="flex:1; background:#3b82f6;">Normal</button><button onclick="showDexTab('shiny')" id="dexTabShiny" style="flex:1;">Mutationen</button></div><div id="dexGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px;"></div>`;
    openModal("📖 Fisch-Dex", html);
    showDexTab('normal');
}
window.showDexTab = function(tab) {
    let grid = document.getElementById('dexGrid');
    if(!grid) return;
    document.getElementById('dexTabNormal')?.setAttribute('style', tab==='normal' ? 'flex:1; background:#3b82f6;' : 'flex:1; background:#1e293b;');
    document.getElementById('dexTabShiny')?.setAttribute('style', tab==='shiny' ? 'flex:1; background:#3b82f6;' : 'flex:1; background:#1e293b;');
    let collected = 0, total = 0;
    grid.innerHTML = '';
    items.forEach(item => {
        if(item.v < 0) return; // Müll ignorieren
        total++;
        let d = gameState.dex ? gameState.dex[item.n] : null;
        let has = tab === 'normal' ? (d?.normal) : (d?.shiny);
        if(has) collected++;
        let div = document.createElement('div');
        div.style.cssText = 'background:#0d1117; padding:8px; border-radius:12px; text-align:center; border:1px solid #30363d;' + (has ? '' : 'opacity:0.4; filter:grayscale(1);');
        div.innerHTML = `<div style="font-size:36px;">${item.e}</div><div style="font-size:11px;">${has ? (tab==='shiny'?'🧬 ':'')+item.n : '???'}</div>`;
        if(has) div.onclick = () => showFishInfo(item.n, tab);
        grid.appendChild(div);
    });
    let info = document.getElementById('dexInfo') || document.createElement('div');
    info.id = 'dexInfo';
    info.style.cssText = 'text-align:center; margin-top:15px; padding:10px; background:#0d1117; border-radius:12px;';
    info.innerHTML = `<b>Gesammelt: ${collected}/${total}</b><br><small style="color:#8b949e;">(Hinweis: Es gibt aktuell genau ${total} Fische im Code)</small>`;
    if(!document.getElementById('dexInfo')) grid.parentNode.appendChild(info);
}
window.showFishInfo = function(name, tab) {
    let item = items.find(i => i.n === name);
    if(!item) return;
    let d = gameState.dex[name];
    let rarity = item.c >= 15 ? 'Gewöhnlich' : (item.c >= 5 ? 'Selten' : (item.c >= 1 ? 'Episch' : 'Legendär'));
    let html = `<div style="text-align:center"><div style="font-size:60px;">${item.e}</div><h3>${tab==='shiny'?'🧬 ':''}${item.n}</h3><p>💰 Wert: ${tab==='shiny' ? item.v*5 : item.v}$<br>⭐ Seltenheit: ${rarity}<br>🌍 Zone: ${item.z === -1 ? 'Überall' : zones[item.z]?.name || 'Unbekannt'}<br>🎣 Gefangen: ${d?.count || 0}x</p><button class="update-btn" onclick="handleDexMenu()">Zurück</button></div>`;
    openModal(`🐟 ${item.n}`, html);
}

window.handleZoneMenu = function() {
    let html = zones.map((z,i) => `<div class="item-row"><b>${z.name}</b>${gameState.zone===i ? '<span style="color:#10b981;">📍 Aktiv</span>' : (gameState.prestige<z.reqPrestige ? `<span style="color:#ef4444;">🔒 Prestige ${z.reqPrestige}</span>` : `<button class="success-btn" onclick="changeZone(${i})">Reisen</button>`)}</div>`).join('');
    openModal("🗺️ Weltkarte", html);
}
window.changeZone = function(i) { gameState.zone = i; saveData(); updateUI(); log(`🗺️ Reise nach ${zones[i].name}`); closeModal(); }

window.handleLeaderboard = async function() {
    openModal("🏆 Leaderboard", "<p style='text-align:center;'>Lade Daten...</p>");
    let snap = await get(ref(db,"users"));
    if(snap.exists()) {
        let users = [];
        snap.forEach(c => users.push(c.val()));
        users.sort((a,b) => b.prestige - a.prestige || b.level - a.level || b.money - a.money);
        
        let html = users.slice(0,20).map((u,i) => {
            let rank = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
            let caught = u.stats?.totalCaught || 0;
            return `
            <div class="leader-card" onclick="showPlayerProfile('${u.name}')">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #30363d; padding-bottom:8px; margin-bottom:8px;">
                    <b style="font-size:16px;">${rank} ${u.name}</b>
                    <span style="color:#60a5fa;">👑 P${u.prestige||0} | ⭐ Lvl ${u.level}</span>
                </div>
                <div class="card-stats">
                    <span>💰 ${Math.floor(u.money).toLocaleString()}$</span>
                    <span>🐟 ${caught.toLocaleString()} Gefangen</span>
                </div>
            </div>`;
        }).join('');

}

window.showPlayerProfile = async function(name) {

        let html = `
        <div class="profile-card">

                <div><h2 style="margin:0;">${u.name}</h2><div style="color:#60a5fa;">👑 Prestige ${u.prestige||0} | ⭐ Level ${u.level}</div></div>
            </div>
            <div class="card-stats"><span>💰 ${Math.floor(u.money).toLocaleString()}$</span> <span>🐟 ${u.stats?.totalCaught||0} Fische</span></div>
        </div>
        <button class="update-btn" onclick="handleLeaderboard()">Zurück zum Leaderboard</button>`;

    }
}

window.handleDailyMenu = function() {
    let now = Date.now(), DAY=86400000;
    let can = false, streak = gameState.dailyStreak||0;
    let timeDiff = now - gameState.lastDaily;
    let cooldownText = "";

    if(gameState.lastDaily===0 || timeDiff>=DAY*2) { can=true; streak=1; }
    else if(timeDiff>=DAY) { can=true; streak=Math.min(streak+1,7); }
    else {
        let timeLeft = DAY - timeDiff;
        let h = Math.floor(timeLeft / 3600000);
        let m = Math.floor((timeLeft % 3600000) / 60000);
        cooldownText = `<p style="color:#ef4444; text-align:center; font-weight:bold;">⏳ Nächste Belohnung in: ${h}h ${m}m</p>`;
    }

    let html = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">`;
    for(let i=1;i<=7;i++) {
        let rew = i*100 + gameState.prestige*50;
        let active = (i===streak && can);
        html += `<div style="background:#0d1117; padding:10px; border-radius:12px; text-align:center; ${active?'border:2px solid #3b82f6;':''}"><div>Tag ${i}</div><div style="font-size:24px;">${active?'🎁':'✅'}</div><div>${rew}$</div></div>`;
    }
    html += `</div>${cooldownText}`;
    openModal("🎁 Daily Bonus", html, can ? `<button class="success-btn" onclick="claimDaily(${streak*100 + gameState.prestige*50},${streak})">Abholen</button>` : '');
}

window.claimDaily = function(rew, streak) { gameState.money += rew; gameState.stats.totalEarned += rew; gameState.lastDaily=Date.now(); gameState.dailyStreak=streak; updateUI(); saveData(); handleDailyMenu(); }

window.handlePrestigeMenu = function() {
    let reqLvl = 20 + gameState.prestige*5;
    let reqMoney = 5000 * Math.pow(2, gameState.prestige);
    let can = gameState.level >= reqLvl && gameState.money >= reqMoney;
    openModal("🔁 Prestige", `<p>Mache Prestige, um einen <b>dauerhaften Verkaufs-Bonus</b> zu erhalten!</p><p>Reset: Level, Geld, Inventar<br>Bonus: <b>+1% Verkaufswert pro Prestige</b><br>Voraussetzung: Level ${reqLvl}, ${reqMoney.toLocaleString()}$</p>`, can ? `<button class="danger-btn" onclick="doPrestige()">PRESTIGE AUSFÜHREN</button>` : '');
}
window.doPrestige = function() { gameState.prestige++; gameState.money=0; gameState.level=1; gameState.xp=0; gameState.combo=0; gameState.inventory={}; saveData(); location.reload(); }

window.handleAdminMenu = function() {
    let html = `<h3>👑 Admin</h3>
    <input id="adminTarget" placeholder="Username" style="width:100%; padding:10px; margin:5px 0; border-radius:10px;">
    <select id="adminType" style="width:100%; padding:10px; margin:5px 0;"><option value="money">💰 Geld</option><option value="level">⭐ Level</option><option value="prestige">👑 Prestige</option></select>
    <input id="adminAmount" placeholder="Menge" style="width:100%; padding:10px; margin:5px 0;">
    <button class="success-btn" onclick="adminGive()">Geben</button>
    <hr><h4>📦 Item Giver</h4><select id="adminItem" style="width:100%; padding:10px;">${items.map(i=>`<option value="${i.n}">${i.e} ${i.n}</option>`).join('')}</select>
    <input id="adminItemCount" placeholder="Anzahl" style="width:100%; padding:10px; margin:5px 0;">
    <button class="update-btn" onclick="adminGiveItem()">Item geben</button>
    <hr><h4>⚠️ Account löschen</h4><input id="adminDelUser" placeholder="Username" style="width:100%; padding:10px;"><button class="danger-btn" style="margin-top:5px;" onclick="adminDeleteAccount()">Löschen</button>
    <hr><h4>📝 Account erstellen</h4><input id="newAccUser" placeholder="Username" style="width:48%;"><input id="newAccPass" placeholder="Passwort" style="width:48%;"><button class="success-btn" style="margin-top:5px;" onclick="adminCreateAccount()">Erstellen</button>`;
    openModal("Admin Panel", html);
}
window.adminGive = async function() {
    let target = document.getElementById('adminTarget').value.trim();
    let type = document.getElementById('adminType').value;
    let amount = Number(document.getElementById('adminAmount').value);
    if(!target || isNaN(amount)) return alert("Username und Menge!");
    let snap = await get(ref(db, "users/"+target));
    if(snap.exists()) {
        let data = snap.val();
        if(type === 'money') data.money += amount;
        if(type === 'level') { data.level += amount; data.xp = 0; }
        if(type === 'prestige') data.prestige += amount;
        await set(ref(db, "users/"+target), data);
        alert(`✅ ${amount} ${type} an ${target}`);
    } else alert("Spieler nicht gefunden!");
}
window.adminGiveItem = async function() {
    let target = document.getElementById('adminTarget').value.trim();
    let item = document.getElementById('adminItem').value;
    let count = Number(document.getElementById('adminItemCount').value);
    if(!target || isNaN(count)) return alert("Username und Anzahl!");
    let snap = await get(ref(db, "users/"+target));
    if(snap.exists()) {
        let data = snap.val();
        if(!data.inventory) data.inventory = {};
        data.inventory[item] = (data.inventory[item]||0) + count;
        await set(ref(db, "users/"+target), data);
        alert(`✅ ${count}x ${item} an ${target}`);
    } else alert("Spieler nicht gefunden!");
}
window.adminDeleteAccount = async function() {
    let user = document.getElementById('adminDelUser').value.trim();
    if(!user) return alert("Username!");
    if(confirm(`⚠️ ${user} unwiderruflich löschen?`)) {
        await remove(ref(db, "accounts/"+user));
        await remove(ref(db, "users/"+user));
        alert(`🗑️ ${user} gelöscht`);
    }
}
window.adminCreateAccount = async function() {
    let user = document.getElementById('newAccUser').value.trim();
    let pass = document.getElementById('newAccPass').value.trim();
    if(user.length<3 || pass.length<3) return alert("Min. 3 Zeichen!");
    await set(ref(db, "accounts/"+user), pass);
    alert(`✅ Account ${user} erstellt!`);
}
