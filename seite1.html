<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Fisher PRO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #020617, #0a192f);
    color: #e6f0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    width: 450px;
    background: rgba(15, 23, 42, 0.8);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    position: relative;
}

/* 🎣 Animation Area */
#fishing-scene {
    height: 120px;
    position: relative;
    margin-bottom: 20px;
    border-bottom: 2px solid #3b82f6;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
}

.rod-anim {
    font-size: 50px;
    position: absolute;
    bottom: -10px;
    left: 40%;
    transform-origin: bottom right;
    transition: 0.3s;
    display: none;
}

@keyframes cast {
    0% { transform: rotate(0deg); }
    30% { transform: rotate(-40deg); }
    100% { transform: rotate(10deg); }
}

.animate-rod {
    display: block;
    animation: cast 0.8s ease-in-out;
}

.water-effect {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20px;
    background: rgba(59, 130, 246, 0.3);
    animation: waves 2s infinite alternate;
}

@keyframes waves {
    from { transform: translateX(-10px); }
    to { transform: translateX(10px); }
}

/* UI Elements */
input {
    padding: 12px;
    width: 90%;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    box-sizing: border-box;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s, opacity 0.2s;
}

button:hover:not(:disabled) { background: #3b82f6; transform: scale(1.05); }
button:active:not(:disabled) { transform: scale(0.95); }
button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

.danger-btn { background: #ef4444; }
.danger-btn:hover:not(:disabled) { background: #f87171; }

#stats-bar {
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
    font-weight: bold;
}

#log {
    margin-top: 15px;
    height: 120px;
    overflow: auto;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
    text-align: left;
    border-left: 3px solid #3b82f6;
    line-height: 1.4;
}

hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0; }
</style>
</head>

<body>

<div class="container">
    
    <!-- Animation Visuals -->
    <div id="fishing-scene">
        <div id="rod" class="rod-anim">🎣</div>
        <div class="water-effect"></div>
    </div>

    <!-- LOGIN -->
    <div id="authBox">
        <h3>🔐 Virtual Fisher Login</h3>
        <p style="font-size: 12px; color: #94a3b8;">Login mit: Angler / Start123</p>
        <input id="username" placeholder="Spielername" autocomplete="off">
        <input id="password" type="password" placeholder="Passwort" autocomplete="off">
        <br>
        <button id="btnLogin" style="width: 90%; margin-top: 10px;">Login</button>
    </div>

    <!-- GAME -->
    <div id="game" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="zoneDisplay" style="font-weight: bold; color: #60a5fa;">🌊 See</span>
            <button id="btnLogout" class="danger-btn" style="padding: 5px 10px;">🚪 Logout</button>
        </div>
        
        <div id="stats-bar">
            <span id="ui-money">💰 0$</span>
            <span id="ui-level">⭐ Lvl 1 (0/50 XP)</span>
        </div>

        <button id="btnFish">🎣 Angeln</button>
        <button id="btnSell">💰 Verkaufen</button>
        <button id="btnDaily">🎁 Daily</button>
        <button id="btnRod">🛒 Rute kaufen</button>
        <button id="btnZone">🌊 Zone wechseln</button>
        <button id="btnPrestige">🔁 Prestige</button>
        <button id="btnProfile">📊 Profil</button>

        <div id="log">Willkommen zurück!</div>
    </div>
</div>

<script>
// --- SPIEL VARIABLEN ---
let gameState = null;
const SAVE_KEY = "vfisher_save_data"; // Schlüssel für den lokalen Speicher

// Die festen Zugangsdaten
const VALID_USER = "Angler";
const VALID_PASS = "Start123";

const zones = ["See", "Meer", "Tiefsee"];
const items = [
 {n: "Müll", v: -10, c: 25, z: 0},
 {n: "Schuh", v: -5, c: 15, z: 0},
 {n: "Karpfen", v: 5, c: 20, z: 0},
 {n: "Forelle", v: 10, c: 15, z: 0},
 {n: "Lachs", v: 25, c: 10, z: 1},
 {n: "Thunfisch", v: 40, c: 8, z: 1},
 {n: "Hai", v: 80, c: 3, z: 2},
 {n: "Leviathan", v: 400, c: 0.5, z: 2}
];

// --- CORE LOGIK ---

function roll(zone, rodLevel) {
    let pool = items.filter(i => i.z <= zone);
    let modifiedPool = pool.map(item => ({ ...item, weight: item.c * (1 + rodLevel * 0.1) }));
    let total = modifiedPool.reduce((sum, item) => sum + item.weight, 0);
    let r = Math.random() * total;
    
    for (let item of modifiedPool) {
        if (r < item.weight) return item;
        r -= item.weight;
    }
    return pool[0];
}

function loadData() {
    let savedData = localStorage.getItem(SAVE_KEY);
    if (savedData) {
        gameState = JSON.parse(savedData);
        // Fallbacks, falls alte Werte fehlen
        gameState.inventory = gameState.inventory || {};
        gameState.quest = gameState.quest || 0;
        gameState.prestige = gameState.prestige || 0;
    } else {
        // Neuer Spielstand
        gameState = { name: VALID_USER, money: 0, xp: 0, level: 1, rod: 0, zone: 0, inventory: {}, lastDaily: 0, prestige: 0, quest: 0 };
    }
    updateUI();
    log(`✅ Eingeloggt als ${VALID_USER}!`);
}

function saveData() {
    if (gameState) {
        localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
    }
}

// --- UI UPDATES ---

function updateUI() {
    if(!gameState) return;
    const xpNeeded = gameState.level * 50;
    document.getElementById("ui-money").innerText = `💰 ${gameState.money}$`;
    document.getElementById("ui-level").innerText = `⭐ Lvl ${gameState.level} (${gameState.xp}/${xpNeeded} XP)`;
    document.getElementById("zoneDisplay").innerText = `🌊 ${zones[gameState.zone]}`;
}

function log(text) {
    const logDiv = document.getElementById("log");
    logDiv.innerText = text + "\n" + logDiv.innerText.split("\n").slice(0, 5).join("\n");
}

function triggerRodAnimation() {
    const rod = document.getElementById('rod');
    rod.classList.remove('animate-rod');
    void rod.offsetWidth;
    rod.classList.add('animate-rod');
}

// --- GAME ACTIONS ---

function handleFish() {
    const btn = document.getElementById('btnFish');
    btn.disabled = true;
    triggerRodAnimation();

    setTimeout(() => {
        let item = roll(gameState.zone, gameState.rod);
        gameState.inventory[item.n] = (gameState.inventory[item.n] || 0) + 1;
        gameState.xp += 5;
        
        let message = `🎣 Gefangen: ${item.n} (${item.v}$)`;

        gameState.quest++;
        if(gameState.quest >= 5) {
            gameState.money += 200;
            gameState.quest = 0;
            message += `\n📜 Quest erfüllt! +200$`;
        }

        let xpNeeded = gameState.level * 50;
        if (gameState.xp >= xpNeeded) {
            gameState.level++;
            gameState.xp -= xpNeeded;
            message += `\n⭐ LEVEL UP! Du bist jetzt Level ${gameState.level}!`;
        }

        updateUI();
        log(message);
        saveData();
        btn.disabled = false;
    }, 800);
}

function handleSell() {
    let total = 0; let itemsSold = 0;
    for (let k in gameState.inventory) {
        let itemDef = items.find(x => x.n === k);
        if(itemDef) { total += itemDef.v * gameState.inventory[k]; itemsSold += gameState.inventory[k]; }
    }
    if (itemsSold === 0) return log("🎒 Dein Rucksack ist leer!");
    gameState.money += total; gameState.inventory = {};
    updateUI(); log(`💰 ${itemsSold} Items verkauft für ${total}$`); saveData();
}

function handleDaily() {
    const now = Date.now();
    if (now - gameState.lastDaily < 86400000) {
        const hoursLeft = Math.ceil((86400000 - (now - gameState.lastDaily)) / 3600000);
        return log(`⏳ Daily noch nicht bereit! Komm in ${hoursLeft} Stunden wieder.`);
    }
    let reward = 100 + (gameState.prestige * 50);
    gameState.money += reward; gameState.lastDaily = now;
    updateUI(); log(`🎁 Daily abgeholt: +${reward}$`); saveData();
}

function handleBuyRod() {
    let cost = (gameState.rod + 1) * 500;
    if (gameState.money < cost) return log(`❌ Zu teuer! Kostet ${cost}$.`);
    gameState.money -= cost; gameState.rod++;
    updateUI(); log(`🛒 Rute Level ${gameState.rod}!`); saveData();
}

function handleZone() {
    gameState.zone = (gameState.zone + 1) % zones.length;
    updateUI(); log(`🌊 Du bist nun in: ${zones[gameState.zone]}`); saveData();
}

function handlePrestige() {
    if (gameState.level < 20 || gameState.money < 5000) return log("❌ Brauchst Level 20 und 5000$.");
    gameState = { name: VALID_USER, money: 0, xp: 0, level: 1, rod: 0, zone: 0, inventory: {}, lastDaily: gameState.lastDaily, prestige: gameState.prestige + 1, quest: 0 };
    updateUI(); log(`🔁 PRESTIGE ${gameState.prestige}!`); saveData();
}

function showProfile() {
    let inv = "";
    for (let i in gameState.inventory) inv += `• ${i}: ${gameState.inventory[i]}\n`;
    log(`👤 ${gameState.name.toUpperCase()}\n💰 Geld: ${gameState.money}$\n⭐ Level: ${gameState.level}\n🎣 Rute: Lvl ${gameState.rod}\n🔁 Prestige: ${gameState.prestige}\n\n🎒 Rucksack:\n${inv || 'Leer'}`);
}

// --- AUTH / LOGIN LOGIK ---

document.getElementById('btnLogin').addEventListener('click', () => {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (user === VALID_USER && pass === VALID_PASS) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        loadData(); // Läd den Spielstand
    } else {
        alert("❌ Falscher Benutzername oder Passwort! Nutze 'Angler' und 'Start123'");
    }
});

document.getElementById('btnLogout').addEventListener('click', () => {
    document.getElementById('authBox').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    gameState = null; // Spielstand aus dem Arbeitsspeicher werfen
    document.getElementById('username').value = "";
    document.getElementById('password').value = "";
});

// Event Listener für In-Game Buttons
document.getElementById('btnFish').addEventListener('click', handleFish);
document.getElementById('btnSell').addEventListener('click', handleSell);
document.getElementById('btnDaily').addEventListener('click', handleDaily);
document.getElementById('btnRod').addEventListener('click', handleBuyRod);
document.getElementById('btnZone').addEventListener('click', handleZone);
document.getElementById('btnPrestige').addEventListener('click', handlePrestige);
document.getElementById('btnProfile').addEventListener('click', showProfile);

</script>
</body>
</html>
