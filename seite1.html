<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Fisher PRO</title>

<style>
/* --- GRUNDDESIGN & HINTERGRUND --- */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e6f0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    background-color: #020617;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') center/cover no-repeat;
    opacity: 0.65;
    z-index: -1;
}

/* --- HAUPT-CONTAINER --- */
.container {
    width: 450px;
    background: rgba(15, 23, 42, 0.85); /* Das schöne, ursprüngliche Dunkelblau */
    backdrop-filter: blur(6px);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-align: center;
    position: relative;
}

/* --- ANIMATION & GRAFIK --- */
#fishing-scene {
    height: 100px;
    position: relative;
    margin-bottom: 15px;
    border-bottom: 2px solid #3b82f6;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
    background: rgba(0,0,0,0.2);
}

.rod-anim {
    font-size: 45px;
    position: absolute;
    bottom: -5px;
    left: 45%;
    transform-origin: bottom right;
    transition: 0.3s;
    display: none;
}

@keyframes cast {
    0% { transform: rotate(0deg); }
    30% { transform: rotate(-40deg); }
    100% { transform: rotate(10deg); }
}

.animate-rod { display: block; animation: cast 0.8s ease-in-out; }

.water-effect {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20px;
    background: rgba(59, 130, 246, 0.3);
    animation: waves 2s infinite alternate;
}

@keyframes waves {
    from { transform: translateX(-10px); }
    to { transform: translateX(10px); }
}

/* --- UI ELEMENTE --- */
input {
    padding: 12px;
    width: 90%;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
    box-sizing: border-box;
}

.btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
}

button {
    padding: 10px 15px;
    margin: 5px 0;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    font-size: 13px;
}

button:hover:not(:disabled) { background: #3b82f6; transform: scale(1.03); }
button:active:not(:disabled) { transform: scale(0.97); }
button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

.danger-btn { background: #ef4444; } .danger-btn:hover:not(:disabled) { background: #f87171; }
.success-btn { background: #10b981; } .success-btn:hover:not(:disabled) { background: #34d399; }
.prestige-btn { background: #6366f1; } .prestige-btn:hover:not(:disabled) { background: #818cf8; }

#top-info {
    display: flex; justify-content: space-between; align-items: center; 
    margin-bottom: 10px; font-size: 13px; font-weight: bold;
}

#stats-bar {
    display: flex; justify-content: space-between; background: rgba(0,0,0,0.4);
    padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; font-weight: bold;
}

#log {
    height: 100px; overflow: auto; background: rgba(0,0,0,0.5);
    padding: 10px; border-radius: 10px; font-size: 13px; text-align: left;
    border-left: 3px solid #3b82f6; line-height: 1.4; margin-top: 10px;
}

/* --- MODAL / POPUP SYSTEM (Das alte, schöne Design) --- */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;
    z-index: 100; backdrop-filter: blur(4px);
}

.modal-content {
    background: #0f172a; width: 420px; max-height: 85vh; border-radius: 15px;
    border: 1px solid #3b82f6; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
}

.modal-header { background: #1e293b; padding: 15px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 20px; overflow-y: auto; font-size: 14px; text-align: left; }
.modal-footer { padding: 15px; background: #1e293b; display: flex; justify-content: flex-end; gap: 10px; }

.close-btn { background: none; color: #94a3b8; font-size: 20px; cursor: pointer; border: none; padding: 0; margin: 0; }
.close-btn:hover { color: white; transform: none; }

/* Spezifische Modal-Inhalte */
.item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.fish-dex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dex-card { background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; }
.dex-card.locked { opacity: 0.5; filter: grayscale(100%); }
.leader-row { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; }
.quest-row { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.daily-day { padding: 10px; margin: 5px 0; border-radius: 8px; background: #1e293b; display: flex; justify-content: space-between;}
.daily-day.active { background: #2563eb; font-weight: bold; } 
.daily-day.missed { background: #475569; opacity: 0.5; }
</style>
</head>

<body>

<!-- POPUP OVERLAY -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">Titel</span>
            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
        <div id="modal-body" class="modal-body">Inhalt</div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<div class="container">
    <div id="fishing-scene">
        <div id="rod" class="rod-anim">🎣</div>
        <div class="water-effect"></div>
    </div>

    <!-- LOGIN -->
    <div id="authBox">
        <h3>🔐 Virtual Fisher Login</h3>
        <p style="font-size: 12px; color: #94a3b8;">Verwende einen der 5 zugelassenen Accounts.</p>
        <input id="username" placeholder="Spielername" autocomplete="off">
        <input id="password" type="password" placeholder="Passwort" autocomplete="off">
        <br>
        <button id="btnLogin" style="width: 90%; margin-top: 15px;">Login</button>
        <div id="login-error" style="color: #ef4444; font-size: 13px; margin-top: 10px; display: none;">Falscher Name oder Passwort!</div>
    </div>

    <!-- GAME -->
    <div id="game" style="display:none;">
        <div id="top-info">
            <span id="zoneDisplay" style="color: #60a5fa;">🌊 See</span>
            <span id="weatherDisplay" style="color: #fcd34d;">☀️ Sonnig</span>
            <button id="btnLogout" class="danger-btn" style="padding: 5px 10px; margin: 0; font-size: 11px;">🚪 Logout</button>
        </div>
        
        <div id="stats-bar">
            <span id="ui-money">💰 0$</span>
            <span id="ui-level">⭐ Lvl 1 (0/50 XP)</span>
        </div>
        
        <div id="bait-info" style="color: #10b981; font-size: 12px; margin-bottom: 10px; display: none;">
            🪱 Aktiver Köder: <span id="bait-clicks">0</span> Würfe
        </div>

        <button id="btnFish" style="width: 100%; margin-bottom: 10px; padding: 15px; font-size: 16px;">🎣 Angeln</button>

        <div class="btn-grid">
            <button id="btnSell">💰 Verkaufen</button>
            <button id="btnShop">🛒 Shop</button>
            
            <button id="btnNet">🕸️ Idle-Netz</button>
            <button id="btnDex">📖 Fisch-Dex</button>
            
            <button id="btnQuest">📜 Quest</button>
            <button id="btnDaily">🎁 Daily</button>
            
            <button id="btnLeader">🏆 Top 5</button>
            <button id="btnZone">🌊 Zone</button>
        </div>
        
        <div style="display: flex; gap: 8px;">
            <button id="btnPrestige" class="prestige-btn" style="flex: 1;">🔁 Prestige</button>
            <button id="btnProfile" style="flex: 1;">📊 Profil</button>
        </div>

        <div id="log">Willkommen zurück!</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 DEINE FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCw4nadHCIRcouTJJoQ3ElToiVVFr5Rufo",
  authDomain: "khusland-b7d13.firebaseapp.com",
  databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com",
  projectId: "khusland-b7d13",
  storageBucket: "khusland-b7d13.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔒 ACCOUNTS
const validAccounts = { 
    "Spieler1": "Fisch01", 
    "Spieler2": "Fisch02", 
    "Spieler3": "Fisch03", 
    "Spieler4": "Fisch04", 
    "Spieler5": "Fisch05" 
};

let currentUser = null; 
let gameState = null;

// 🌊 ZONEN
const zones = [
    { name: "See", reqPrestige: 0 }, 
    { name: "Meer", reqPrestige: 1 },
    { name: "Tiefsee", reqPrestige: 3 }, 
    { name: "Verlorener Ozean", reqPrestige: 5 }
];

// 🐟 32 FISCHE UND ITEMS
const items = [
    // ZONE 0: See
    {n:"Müll",v:-10,c:25,z:0}, {n:"Schuh",v:-5,c:15,z:0}, {n:"Alge",v:-2,c:20,z:0}, {n:"Kaulquappe",v:2,c:30,z:0}, 
    {n:"Karpfen",v:5,c:20,z:0}, {n:"Rotauge",v:8,c:15,z:0}, {n:"Forelle",v:10,c:15,z:0}, {n:"Barsch",v:15,c:10,z:0}, 
    {n:"Zander",v:20,c:8,z:0}, {n:"Hecht",v:35,c:5,z:0},
    // ZONE 1: Meer
    {n:"Qualle",v:10,c:20,z:1}, {n:"Hering",v:15,c:18,z:1}, {n:"Makrele",v:20,c:15,z:1}, {n:"Lachs",v:25,c:10,z:1}, 
    {n:"Scholle",v:30,c:12,z:1}, {n:"Thunfisch",v:40,c:8,z:1}, {n:"Kabeljau",v:50,c:6,z:1}, {n:"Schwertfisch",v:80,c:4,z:1},
    // ZONE 2: Tiefsee
    {n:"Blobfisch",v:60,c:10,z:2}, {n:"Hai",v:80,c:8,z:2}, {n:"Laternenfisch",v:100,c:6,z:2}, {n:"Riesenkalmar",v:150,c:4,z:2}, 
    {n:"Anglerfisch",v:200,c:3,z:2}, {n:"Riemenfisch",v:250,c:2,z:2}, {n:"Koboldhai",v:300,c:1.5,z:2}, {n:"Leviathan",v:400,c:0.5,z:2},
    // ZONE 3: Verlorener Ozean
    {n:"Geisterschiff-Teil",v:300,c:5,z:3}, {n:"Atlantis-Kristall",v:800,c:2,z:3}, {n:"Kraken-Tentakel",v:1000,c:1,z:3}, 
    {n:"Megalodon",v:1500,c:0.5,z:3}, {n:"Nessie",v:2500,c:0.2,z:3}, {n:"Poseidons Dreizack",v:5000,c:0.05,z:3}
];

// 🌦️ WETTER
const weathers = [
    { name: "☀️ Sonnig", desc: "Standardwetter" }, 
    { name: "🌧️ Regen", desc: "+50% Chance auf seltene Fische!" }, 
    { name: "⛈️ Sturm", desc: "Kein Müll oder Schuhe!" }
];

function getCurrentWeather() { 
    return weathers[Math.floor(Date.now() / 180000) % 3]; 
}

// 📜 QUEST DATENBANK
const questDB = {
    daily: [
        {id:'d1',desc:'Fange 15 Fische',t:'c',req:15,rew:50},
        {id:'d2',desc:'Verdiene 250$',t:'e',req:250,rew:100}
    ],
    weekly: [
        {id:'w1',desc:'Fange 150 Fische',t:'c',req:150,rew:500},
        {id:'w2',desc:'Verdiene 3000$',t:'e',req:3000,rew:1000}
    ],
    monthly: [
        {id:'m1',desc:'Fange 1000 Fische',t:'c',req:1000,rew:5000},
        {id:'m2',desc:'Verdiene 15.000$',t:'e',req:15000,rew:5000}
    ]
};

function roll(zIdx, rodLvl) {
    let weather = getCurrentWeather(); 
    let pool = items.filter(i => i.z <= zIdx);
    
    if (weather.name.includes("Sturm") || (gameState.bait > 0)) {
        pool = pool.filter(i => i.v >= 0);
    }
    
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodLvl * 0.1);
        if (weather.name.includes("Regen") && i.v > 25) w *= 1.5;
        return { ...i, weight: w };
    });
    
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total;
    
    for (let i of modPool) { 
        if (r < i.weight) return i; 
        r -= i.weight; 
    } 
    return pool[0];
}

function checkQuestResets() {
    let now = Date.now(); let DAY = 86400000;
    
    if(!gameState.qs) {
        gameState.qs = { rD: now, rW: now, rM: now, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    }
    
    let qs = gameState.qs; let save = false;
    
    if(now - qs.rD > DAY) { qs.rD = now; qs.p.dc=0; qs.p.de=0; for(let k in qs.c) if(k.startsWith('d')) delete qs.c[k]; save=true; }
    if(now - qs.rW > DAY*7) { qs.rW = now; qs.p.wc=0; qs.p.we=0; for(let k in qs.c) if(k.startsWith('w')) delete qs.c[k]; save=true; }
    if(now - qs.rM > DAY*30) { qs.rM = now; qs.p.mc=0; qs.p.me=0; for(let k in qs.c) if(k.startsWith('m')) delete qs.c[k]; save=true; }
    
    if(save) saveData();
}

function addQuestProgress(t, amt) {
    let p = gameState.qs.p;
    if(t === 'c') { p.dc+=amt; p.wc+=amt; p.mc+=amt; }
    if(t === 'e') { p.de+=amt; p.we+=amt; p.me+=amt; }
}

async function loadData() {
    if (!currentUser) return;
    try {
        const snap = await get(ref(db, "users/" + currentUser));
        if (snap.exists()) { 
            gameState = snap.val(); 
        } else { 
            gameState = { 
                name: currentUser, money: 0, xp: 0, level: 1, rod: 0, zone: 0, 
                inventory: {}, dex: {}, bait: 0, net: { level: 0, lastClaim: Date.now() }, 
                lastDaily: 0, dailyStreak: 0, prestige: 0, stats: { totalCaught: 0, totalEarned: 0 } 
            }; 
        }
        
        if(!gameState.inventory) gameState.inventory={}; 
        if(!gameState.dex) gameState.dex={}; 
        if(!gameState.stats) gameState.stats={totalCaught:0,totalEarned:0};
        
        checkQuestResets(); updateUI();
        
        document.getElementById("authBox").style.display = "none"; 
        document.getElementById("game").style.display = "block"; 
        log(`✅ Willkommen zurück!`);
    } catch (e) { 
        console.error(e); 
    }
}

function saveData() { 
    if (currentUser && gameState) set(ref(db, "users/" + currentUser), gameState); 
}

function updateUI() {
    if(!gameState) return;
    
    const xpNeeded = gameState.level * 50;
    document.getElementById("ui-money").innerText = `💰 ${gameState.money}$`;
    document.getElementById("ui-level").innerText = `⭐ Lvl ${gameState.level} (${gameState.xp}/${xpNeeded})`;
    document.getElementById("zoneDisplay").innerText = `🌊 ${zones[gameState.zone].name}`;
    document.getElementById("weatherDisplay").innerText = getCurrentWeather().name;
    
    let baitUI = document.getElementById("bait-info");
    if(gameState.bait > 0) { 
        baitUI.style.display = "block"; 
        document.getElementById("bait-clicks").innerText = gameState.bait; 
    } else { 
        baitUI.style.display = "none"; 
    }
}
setInterval(() => { if(gameState) updateUI(); }, 5000);

function log(t) { 
    let l = document.getElementById("log"); 
    let prefix = t.startsWith("✅") || t.startsWith("💰") || t.startsWith("🕸️") ? "" : "🎣 ";
    l.innerHTML = prefix + t + "<br>" + l.innerHTML.split("<br>").slice(0, 6).join("<br>"); 
}

window.closeModal = function() { document.getElementById('modal-overlay').style.display = 'none'; };

function openModal(t, b, f='') { 
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = b; 
    document.getElementById('modal-footer').innerHTML = f; 
    document.getElementById('modal-footer').style.display = f ? 'flex' : 'none'; 
    document.getElementById('modal-overlay').style.display = 'flex'; 
}

// --- AKTIONEN ---
window.handleFish = function() {
    const btn = document.getElementById('btnFish'); btn.disabled = true;
    const rod = document.getElementById('rod'); rod.classList.remove('animate-rod'); void rod.offsetWidth; rod.classList.add('animate-rod');
    
    setTimeout(() => {
        let i = roll(gameState.zone, gameState.rod);
        gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; 
        gameState.dex[i.n] = true;
        gameState.xp += 5; 
        gameState.stats.totalCaught++; addQuestProgress('c', 1);
        
        if(gameState.bait > 0) gameState.bait--;
        
        let msg = `Gefangen: ${i.n} (${i.v}$)`;
        if (gameState.xp >= gameState.level * 50) { 
            gameState.xp -= gameState.level * 50; gameState.level++; 
            msg += ` - ⭐ LEVEL UP! Level ${gameState.level}!`; 
        }
        
        updateUI(); log(msg); saveData(); btn.disabled = false;
    }, 800);
}

window.handleSellMenu = function() {
    let base = 0; let has = false; let html = `<h3>Dein Rucksack</h3>`;
    for (let k in gameState.inventory) {
        if (gameState.inventory[k] > 0) { 
            has = true; let val = items.find(x=>x.n===k).v * gameState.inventory[k]; base += val; 
            html += `<div class="item-row"><span>${gameState.inventory[k]}x ${k}</span><span style="color:${val>=0?'#10b981':'#ef4444'}">${val}$</span></div>`; 
        }
    }
    if (!has) return openModal("💰 Verkauf", "<p>Rucksack ist leer!</p>");
    
    let bonus = gameState.prestige * 1; let finalTotal = Math.floor(base * (1 + (bonus / 100)));
    
    html += `<hr><div class="item-row" style="color:#94a3b8;"><span>Basiswert:</span><span>${base}$</span></div>`;
    if (bonus > 0 && base > 0) html += `<div class="item-row" style="color:#f59e0b; font-size:13px;"><span>🏆 Prestige Bonus (+${bonus}%):</span><span>+${finalTotal - base}$</span></div>`;
    html += `<div class="item-row" style="font-weight:bold; font-size:18px; color:${finalTotal>=0?'#10b981':'#ef4444'};"><span>Gesamt:</span><span>${finalTotal}$</span></div>`;
    
    openModal("💰 Verkauf", html, `<button class="success-btn" onclick="executeSell(${finalTotal})">Alles Verkaufen</button>`);
}

window.executeSell = function(val) { 
    gameState.money += val; 
    if(val>0){ gameState.stats.totalEarned += val; addQuestProgress('e', val); } 
    gameState.inventory = {}; updateUI(); log(`💰 Alles verkauft für ${val}$`); saveData(); closeModal(); 
}

window.handleShopMenu = function() {
    let nRod = (gameState.rod + 1) * 500;
    let html = `
        <h4 style="color:#60a5fa; margin-top:0;">🎣 Ausrüstung</h4>
        <div class="item-row" style="align-items: center;">
            <div><b>Rute Lvl ${gameState.rod+1}</b><br><span style="font-size: 11px; color: #94a3b8;">+10% Chance auf seltene Fische</span></div>
            <button class="success-btn" ${gameState.money<nRod?'disabled':''} onclick="gameState.money-=${nRod};gameState.rod++;saveData();handleShopMenu();">${nRod}$</button>
        </div>
        <h4 style="color:#60a5fa; margin-top:20px;">🪱 Köder</h4>
        <div class="item-row" style="align-items: center;">
            <div><b>Premium Wurm (20x)</b><br><span style="font-size: 11px; color: #94a3b8;">Blockiert Müll beim Angeln</span></div>
            <button class="success-btn" ${gameState.money<1000?'disabled':''} onclick="gameState.money-=1000;gameState.bait+=20;saveData();handleShopMenu();">1000$</button>
        </div>
    `;
    openModal("🛒 Shop", html);
}

window.handleNetMenu = function() {
    let n = gameState.net;
    if (n.level === 0) {
        openModal("🕸️ Idle-Netz", `<div style="text-align:center;"><div style="font-size:40px; margin-bottom:10px;">🕸️</div><p>Das Netz fängt vollautomatisch 1 Fisch pro Minute, auch wenn du offline bist.</p></div>`, gameState.money>=2000?`<button class="success-btn" onclick="gameState.money-=2000;gameState.net.level=1;gameState.net.lastClaim=Date.now();saveData();handleNetMenu();">Kaufen (2000$)</button>`:`<button disabled>Zu wenig Geld (2000$)</button>`);
    } else {
        let cnt = Math.min(Math.floor((Date.now() - n.lastClaim) / 60000), 20);
        openModal("🕸️ Idle-Netz", `<div style="text-align:center;"><p>Dein Netz war im Wasser.</p><h2 style="color:#10b981;">${cnt} / 20 Fische</h2><p style="font-size: 12px; color: #94a3b8;">Fängt Fische aus deiner aktuellen Zone.</p></div>`, cnt>0?`<button class="success-btn" onclick="claimNet(${cnt})">Netz leeren</button>`:`<button disabled>Netz ist leer</button>`);
    }
}
window.claimNet = function(c) { 
    for(let i=0;i<c;i++){ let item=roll(gameState.zone,0); gameState.inventory[item.n]=(gameState.inventory[item.n]||0)+1; gameState.dex[item.n]=true; } 
    gameState.net.lastClaim=Date.now(); updateUI(); log(`🕸️ Netz geleert! ${c} Items verstaut.`); saveData(); closeModal(); 
}

window.handleQuestMenu = function() {
    checkQuestResets(); let qs = gameState.qs; let html = ``;
    function build(title, list, pC, pE) {
        let sec = `<h4 style="color:#60a5fa; border-bottom:1px solid #334155; margin-bottom:10px; margin-top: 20px;">${title}</h4>`;
        list.forEach(q => {
            let prog = q.t === 'c' ? qs.p[pC] : qs.p[pE]; let done = prog >= q.req; let claimed = qs.c[q.id]; let dProg = Math.min(prog, q.req);
            sec += `<div class="quest-row">
                        <div><b>${q.desc}</b><br><span style="font-size:12px;color:#94a3b8;">${dProg} / ${q.req}</span></div>
                        <div>`;
            if (claimed) sec += `✅`; else if (done) sec += `<button class="success-btn" style="padding: 5px 10px; font-size: 12px;" onclick="claimQuest('${q.id}', ${q.rew})">${q.rew}$</button>`; else sec += `<span style="font-size: 12px; color: #94a3b8;">🔒 ${q.rew}$</span>`;
            sec += `</div></div>`;
        }); return sec;
    }
    html += build("🌞 Daily Quests", questDB.daily, 'dc', 'de') + build("📅 Weekly Quests", questDB.weekly, 'wc', 'we') + build("🏆 Monthly Quests", questDB.monthly, 'mc', 'me');
    openModal("📜 Missionen", html);
}
window.claimQuest = function(id, rew) { gameState.qs.c[id]=true; gameState.money+=rew; gameState.stats.totalEarned+=rew; updateUI(); saveData(); handleQuestMenu(); }

window.handleDailyMenu = function() {
    let now = Date.now(); let DAY = 86400000; let can = false; let nStr = gameState.dailyStreak;
    if (gameState.lastDaily === 0 || now - gameState.lastDaily >= DAY * 2) { can=true; nStr=1; } else if (now - gameState.lastDaily >= DAY) { can=true; nStr=Math.min(nStr+1, 7); }
    let html = `<p style="font-size:12px;color:#94a3b8;">Logge dich täglich ein, um Belohnungen zu erhalten!</p>`; let cur = 0;
    for (let i = 1; i <= 7; i++) {
        let rew = i * 100 + (gameState.prestige * 50); let cl = ""; let ic = "⏳";
        if (i < nStr || (!can && i <= nStr)) { cl="missed"; ic="✅"; } else if (i === nStr && can) { cl="active"; ic="🎁"; cur=rew; }
        html += `<div class="daily-day ${cl}"><span>Tag ${i}</span><span>${ic} ${rew}$</span></div>`;
    }
    if(!can) html += `<p style="color:#f59e0b; text-align: center; margin-top: 15px;">⏳ Komm in ${Math.ceil((DAY-(now-gameState.lastDaily))/3600000)} Stunden wieder.</p>`;
    openModal("🎁 Daily Belohnung", html, can ? `<button class="success-btn" onclick="claimDaily(${cur},${nStr})">Abholen (${cur}$)</button>` : "");
}
window.claimDaily = function(rew, str) { gameState.money+=rew; gameState.stats.totalEarned+=rew; gameState.lastDaily=Date.now(); gameState.dailyStreak=str; updateUI(); saveData(); closeModal(); }

window.handleDexMenu = function() { 
    let html=`<div class="fish-dex-grid">`; let c=0; 
    items.forEach(i=>{ 
        if(gameState.dex[i.n]) c++; 
        html+=`<div class="dex-card ${gameState.dex[i.n]?'':'locked'}"><div>${gameState.dex[i.n]?i.n:'???'}</div><div style="font-size:12px; color: #94a3b8; font-weight: normal; margin-top: 3px;">${gameState.dex[i.n]?i.v+'$':'Wert unbekannt'}</div></div>`; 
    }); 
    openModal("📖 Fisch-Lexikon", html+`</div><p style="text-align: center; margin-top: 15px;"><b>Gesammelt: ${c} / ${items.length}</b></p>`); 
}

window.handleZoneMenu = function() { 
    let html=`<p style="font-size: 13px; color: #94a3b8;">Höhere Zonen bieten wertvollere Fische, benötigen aber Prestige.</p>`; 
    zones.forEach((z,i)=>{ 
        let l=gameState.prestige<z.reqPrestige; 
        html+=`<div class="item-row ${l?'locked':''}" style="align-items: center;">
                 <b>${z.name}</b> 
                 ${gameState.zone===i?'<span style="color:#10b981; font-weight: bold;">📍 Aktiv</span>':(l?`<span style="color:#ef4444; font-size: 12px;">🔒 Braucht Prestige ${z.reqPrestige}</span>`:`<button class="success-btn" style="padding: 6px 12px;" onclick="gameState.zone=${i};saveData();updateUI();closeModal();">Reisen</button>`)}
               </div>`; 
    }); 
    openModal("🗺️ Weltkarte", html); 
}

window.handleProfileMenu = function() { 
    let html = `
        <h3 style="margin-top:0; color: #60a5fa; text-align: center;">${gameState.name.toUpperCase()}</h3>
        <div class="item-row"><span>Geld:</span> <span>${gameState.money}$</span></div>
        <div class="item-row"><span>Level:</span> <span>${gameState.level}</span></div>
        <div class="item-row"><span>Rute:</span> <span>Level ${gameState.rod}</span></div>
        <div class="item-row"><span>Prestige:</span> <span>${gameState.prestige}</span></div>
        <h4 style="margin-bottom: 5px; margin-top: 20px;">📈 Statistiken</h4>
        <div class="item-row" style="font-size: 12px;"><span>Fische gefangen:</span> <span>${gameState.stats.totalCaught}</span></div>
        <div class="item-row" style="font-size: 12px;"><span>Geld verdient:</span> <span>${gameState.stats.totalEarned}$</span></div>
        <div class="item-row" style="font-size: 12px;"><span>Aktueller Streak:</span> <span>${gameState.dailyStreak} Tage</span></div>
    `;
    openModal("📊 Profil", html); 
}

window.handlePrestigeMenu = function() { 
    let html = `
        <div style="text-align: center;">
            <p style="color: #ef4444; font-weight: bold;">Dies setzt dein Level, Geld, Rute und Inventar auf 0 zurück!</p>
            <p>Dafür erhältst du +1% permanenten Verkaufsbonus pro Prestige und schaltest neue Zonen frei.</p>
            <hr style="border-color: #334155;">
            <p>Voraussetzung: <b>Level 20</b> und <b>5000$</b></p>
        </div>
    `;
    openModal("🔁 Prestige Aufstieg", html, gameState.level>=20&&gameState.money>=5000?`<button class="danger-btn" style="font-size: 14px; padding: 10px;" onclick="gameState.prestige++;gameState.money=0;gameState.level=1;gameState.inventory={};saveData();location.reload();">⚠️ Prestige durchführen!</button>`:`<button disabled style="padding: 10px;">Nicht bereit</button>`); 
}

window.handleLeaderboard = async function() {
    openModal("🏆 Top 5", "<p style='text-align: center;'>Lade Spielerdaten...</p>"); 
    try { 
        const snap = await get(ref(db,"users")); 
        if(snap.exists()) { 
            let usrs=[]; snap.forEach(c=>usrs.push(c.val())); 
            usrs.sort((a,b)=>b.prestige-a.prestige||b.level-a.level||b.money-a.money); 
            
            let html=``; 
            usrs.slice(0,5).forEach((u,i)=> {
                let medal = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : `${i+1}.`;
                html+=`<div class="leader-row" style="${u.name===currentUser?'border:1px solid #10b981;':''}">
                         <b>${medal} ${u.name}</b> 
                         <span style="text-align: right; font-size: 12px; color: #94a3b8;">Prestige ${u.prestige} | Lvl ${u.level}<br><span style="color:#10b981;">${u.money}$</span></span>
                       </div>`;
            }); 
            openModal("🏆 Globale Top 5", html); 
        } 
    } catch(e){ openModal("🏆 Top 5", "<p>Fehler beim Laden.</p>"); }
}

document.getElementById('btnLogin').addEventListener('click', async () => {
    let u = document.getElementById('username').value.trim(); 
    let p = document.getElementById('password').value;
    if (validAccounts[u] === p) { 
        document.getElementById('login-error').style.display='none'; currentUser=u; await loadData(); 
    } else { document.getElementById('login-error').style.display='block'; }
});
