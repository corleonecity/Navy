<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Virtual Fisher Web</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #020617, #0a192f);
    color: #e6f0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
    background: rgba(10,20,40,0.5);
    padding: 40px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    width: 420px;
}

/* Title */
h1 {
    margin-bottom: 10px;
    color: #7fb3ff;
}

/* Buttons */
button {
    padding: 12px 20px;
    margin: 6px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #1e3a8a;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #3b82f6;
}

/* Output */
#result {
    margin-top: 15px;
    min-height: 40px;
}

#profile {
    margin-top: 15px;
    text-align: left;
    font-size: 14px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 8px;
    max-height: 150px;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎣 Virtual Fisher</h1>

    <button onclick="fish()">🎣 Angeln</button>
    <button onclick="loadProfile()">📊 Profil</button>

    <div id="result"></div>
    <div id="profile"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "khusland-b7d13.firebaseapp.com",
  databaseURL: "https://khusland-b7d13-default-rtdb.firebaseio.com",
  projectId: "khusland-b7d13",
  storageBucket: "khusland-b7d13.firebasestorage.app",
  messagingSenderId: "69573193613",
  appId: "1:69573193613:web:86c4d839281b1e343cd7c4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USER (für GitHub Demo fix)
const userId = "player1";

// 🎣 FISCH LISTE (viele + rarity)
const fishList = [
    { name: "Karpfen", value: 5, chance: 30 },
    { name: "Forelle", value: 8, chance: 25 },
    { name: "Barsch", value: 10, chance: 20 },
    { name: "Hecht", value: 20, chance: 10 },
    { name: "Lachs", value: 25, chance: 8 },
    { name: "Thunfisch", value: 40, chance: 5 },
    { name: "Hai", value: 80, chance: 1 },
    { name: "Goldfisch", value: 60, chance: 3 },
    { name: "Perlenfisch", value: 100, chance: 1 },
    { name: "Tiefsee-Anglerfisch", value: 120, chance: 0.8 },
    { name: "Blauer Marlin", value: 150, chance: 0.5 },
    { name: "Elektrischer Aal", value: 90, chance: 2 },
    { name: "Feuerfisch", value: 70, chance: 2 },
    { name: "Kristallfisch", value: 200, chance: 0.3 },
    { name: "Phantomfisch", value: 250, chance: 0.2 },
    { name: "Legendärer Leviathan", value: 500, chance: 0.05 }
];

// 🎲 Weighted Random
function getFish() {
    const total = fishList.reduce((sum, f) => sum + f.chance, 0);
    let rand = Math.random() * total;

    for (let fish of fishList) {
        if (rand < fish.chance) return fish;
        rand -= fish.chance;
    }
}

// ⏳ Cooldown
let lastFish = 0;
const cooldown = 3000;

window.fish = async function() {
    const now = Date.now();

    if (now - lastFish < cooldown) {
        document.getElementById("result").innerText = "⏳ Warte kurz...";
        return;
    }

    lastFish = now;

    const caught = getFish();

    const userRef = ref(db, "users/" + userId);
    const snap = await get(userRef);

    let data = snap.exists() ? snap.val() : { money: 0, inventory: [] };

    data.money += caught.value;
    data.inventory.push(caught.name);

    await set(userRef, data);

    document.getElementById("result").innerText =
        `🎣 ${caught.name} gefangen! (+${caught.value}$)`;
};

// 📊 Profil
window.loadProfile = async function() {
    const snap = await get(ref(db, "users/" + userId));

    if (!snap.exists()) {
        document.getElementById("profile").innerText = "Kein Profil";
        return;
    }

    const data = snap.val();

    let list = "";
    data.inventory.slice(-10).forEach(f => list += "• " + f + "\n");

    document.getElementById("profile").innerText =
        `💰 Geld: ${data.money}\n\n🐟 Letzte Fische:\n${list}`;
};
</script>

</body>
</html>
