function checkQuestResets() {
    let k = getResetKeys(); if(!gameState.qs || typeof gameState.qs.d !== 'string') gameState.qs = { d: k.daily, w: k.weekly, m: k.monthly, p: { dc:0, de:0, wc:0, we:0, mc:0, me:0 }, c: {} };
    let qs = gameState.qs; let save = false;
    if(qs.d !== k.daily) { qs.d = k.daily; qs.p.dc=0; qs.p.de=0; for(let c in qs.c) if(c.startsWith('d')) delete qs.c[c]; save=true; }
    if(qs.w !== k.weekly) { qs.w = k.weekly; qs.p.wc=0; qs.p.we=0; for(let c in qs.c) if(c.startsWith('w')) delete qs.c[c]; save=true; }

}

function getFishChance(zIdx, itemN) {
    if(!gameState) return 0;
    let evt = gameState.ev; let rodDef = rodsDB[gameState.eqRod]; let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    if (baitDef && baitDef.type === "clean") pool = pool.filter(i => i.v >= 0);
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if (baitDef && baitDef.type === "boost") w *= 1.05;
        if (i.n === evt.target) w *= evt.boost;
        return { n: i.n, weight: w };
    });
    let total = modPool.reduce((s, i) => s + i.weight, 0);
    let myItem = modPool.find(x => x.n === itemN);
    return myItem ? ((myItem.weight / total) * 100).toFixed(2) : 0;
}

function roll(zIdx) {
    let evt = gameState.ev; let rodDef = rodsDB[gameState.eqRod]; let baitDef = gameState.eqBait !== "none" ? baitsDB[gameState.eqBait] : null;
    let pool = items.filter(i => i.z === zIdx || i.z === -1); 
    if (baitDef && baitDef.type === "clean") pool = pool.filter(i => i.v >= 0); 
    let modPool = pool.map(i => {
        let w = i.c * (1 + rodDef.boost);
        if (baitDef && baitDef.type === "boost") w *= 1.05; 
        if (i.n === evt.target) w *= evt.boost;
        return { ...i, weight: w };
    });
    let total = modPool.reduce((s, i) => s + i.weight, 0); 
    let r = Math.random() * total; let baseItem = pool[0];
    for (let i of modPool) { if (r < i.weight) { baseItem = i; break; } r -= i.weight; }
    
    let shinyChance = 0.01;
    if (evt.type === "sun") shinyChance *= evt.boost;
    if (baitDef && baitDef.type === "shiny") shinyChance *= 3; 

    let isShiny = Math.random() < shinyChance;
    let finalItem = { baseName: baseItem.n, n: baseItem.n, v: baseItem.v, e: baseItem.e, isShiny: false };
    
    if (isShiny && baseItem.v >= 0) {
        finalItem.n = "🧬 " + baseItem.n;
        finalItem.v *= 5;
        finalItem.isShiny = true;
    }
    return finalItem;
}

function updateDex(item) {
    if(!gameState.dex[item.baseName]) gameState.dex[item.baseName] = { normal: false, shiny: false, count: 0 };
    if(item.isShiny) gameState.dex[item.baseName].shiny = true; else gameState.dex[item.baseName].normal = true;
    gameState.dex[item.baseName].count++;
}

window.handleFish = function() {
    const btn = document.getElementById('btnFish'); btn.disabled = true;
    const scene = document.getElementById('fishing-scene'); scene.classList.add('fishing-active');
    let evt = gameState.ev; let speed = evt.type === "rain" ? 400 : 800;

    setTimeout(() => {
        try {
            let i = roll(gameState.zone);
            gameState.lastCatchTime = Date.now() + 1500; // Combo-Zeitfenster: 1.5s
            
            if (i.baseName === "Müll" || i.baseName === "Schuh" || i.baseName === "Alge") {
                if(gameState.combo > 5) log(`❌ Combo gebrochen durch ${i.baseName}!`);
                gameState.combo = 0;
            } else { gameState.combo++; }
            
            let comboMult = 1 + (Math.min(gameState.combo, 50) * 0.02);
            let finalValue = Math.floor(i.v * comboMult);
            let finalXp = Math.floor(5 * (i.isShiny ? 5 : 1) * comboMult);

            gameState.inventory[i.n] = (gameState.inventory[i.n] || 0) + 1; updateDex(i);
            gameState.xp += finalXp; gameState.stats.totalCaught++; addQuestProgress('c', 1);
            
            if(gameState.eqBait !== "none") {
                gameState.baits[gameState.eqBait]--;
                if(gameState.baits[gameState.eqBait] <= 0) { log(`❌ Dein Köder ist aufgebraucht!`); gameState.eqBait = "none"; }
            }
            
            let msg = i.isShiny ? `<span style="color:#fcd34d; font-weight:bold;">🧬 MUTATION: ${i.e} ${i.baseName} (${finalValue}$)</span>` : `${i.e} Gefangen: ${i.baseName} (${finalValue}$)`;
            if (gameState.xp >= gameState.level * 50) { gameState.xp -= gameState.level * 50; gameState.level++; msg += `<br>⭐ LEVEL UP! Level ${gameState.level}!`; }
            
            updateUI(); log(msg); saveData();
        } finally {
            scene.classList.remove('fishing-active'); btn.disabled = false;
        }
    }, speed);
}

                 <div class="dex-emoji">${i.e}</div>
                 <div>${has ? (tab==='shiny'?'🧬 ':'')+i.n : '???'}</div>
                 ${has&&tab==='shiny' ? `<div class="shiny-badge">Mutation</div>` : ''}
               </div>`; 
    }); 
    openModal("📖 Fisch-Lexikon", html+`</div><p style="text-align: center; margin-top: 15px;"><b>Gesammelt: ${c} / ${items.length}</b></p>`); 
}

window.showFishDetails = function(name) {
    try {
        let item = items.find(x => x.n === name); let d = gameState.dex[name]; let count = d.count || 0;
        let rarity = getRarity(item.c); let myChance = getFishChance(gameState.zone, item.n);
        let html = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));">${item.e}</div>
                <h2 style="margin: 0; color: #60a5fa;">${item.n}</h2>
                <span class="dex-rarity ${rarity.cl}" style="font-size: 14px; margin-top: 5px;">${rarity.l}</span>
            </div>
            <div class="profile-card">
                <div class="item-row"><span>Basis-Wert:</span> <b>${item.v}$</b></div>
                <div class="item-row"><span>Heimat:</span> <b>${item.z === -1 ? 'Überall' : zones[item.z].name}</b></div>
                <div class="item-row"><span>Gefangen:</span> <b>${count} Mal</b></div>
                <div class="item-row" style="color:#fcd34d;"><span>Fangchance (Hier & Jetzt):</span> <b>${myChance}%</b></div>
            </div>
            <button class="update-btn" style="width: 100%;" onclick="handleDexMenu()">⬅ Zurück zum Lexikon</button>
        `; openModal("🐟 Fisch-Akte", html);
    } catch(e) { log("❌ Konnte Fisch-Akte nicht laden."); }
}

window.handleZoneMenu = function() { 
    let html=`<p style="font-size: 13px; color: #94a3b8; margin-top:0;">Bestimmte Fische leben nur in bestimmten Zonen!</p>`; 
    zones.forEach((z,i)=>{ 
        let l=gameState.prestige<z.reqPrestige; 
        html+=`<div class="item-row ${l?'locked':''}" style="align-items: center;"><b>${z.name}</b> ${gameState.zone===i?'<span style="color:#10b981; font-weight: bold;">📍 Aktiv</span>':(l?`<span style="color:#ef4444; font-size: 12px;">🔒 Prestige ${z.reqPrestige}</span>`:`<button class="success-btn" style="padding: 6px 12px;" onclick="changeZone(${i})">Reisen</button>`)}</div>`; 
    }); openModal("🗺️ Weltkarte", html); 
}

window.handleProfileMenu = function() { 
    let html = `
        <div class="profile-card">
            <div class="profile-header"><div class="profile-avatar">${gameState.prestige > 0 ? '👑' : '🎣'}</div><div style="text-align: left;"><h2 style="margin:0; color:#60a5fa;">${gameState.name.toUpperCase()}</h2><div style="color:#94a3b8; font-size:12px;">Level ${gameState.level} • Prestige ${gameState.prestige}</div></div></div>
            <div class="profile-stats-grid">
                <div class="stat-box"><div class="stat-lbl">Kapital</div><div class="stat-val" style="color:#10b981;">${gameState.money.toLocaleString()}$</div></div>
                <div class="stat-box"><div class="stat-lbl">Gefangen</div><div class="stat-val">${gameState.stats.totalCaught.toLocaleString()}</div></div>
                <div class="stat-box"><div class="stat-lbl">Verdient</div><div class="stat-val">${gameState.stats.totalEarned.toLocaleString()}$</div></div>
                <div class="stat-box"><div class="stat-lbl">Streak</div><div class="stat-val" style="color:#fcd34d;">${gameState.dailyStreak} 🔥</div></div>
            </div>
        </div>
    `; openModal("📊 Spieler-Profil", html); 
}

window.showPlayerProfile = async function(pName) {
    openModal("📊 Lade Profil...", "<div style='text-align:center;'>Bitte warten...</div>");
    try {
        const snap = await get(ref(db, "users/" + pName));
        if(snap.exists()) {
            let u = snap.val();
            let html = `
                <div class="profile-card">
                    <div class="profile-header"><div class="profile-avatar">${u.prestige > 0 ? '👑' : '🎣'}</div><div style="text-align: left;"><h2 style="margin:0; color:#60a5fa;">${u.name.toUpperCase()}</h2><div style="color:#94a3b8; font-size:12px;">Level ${u.level} • Prestige ${u.prestige}</div></div></div>
                    <div class="profile-stats-grid">
                        <div class="stat-box"><div class="stat-lbl">Kapital</div><div class="stat-val" style="color:#10b981;">${u.money.toLocaleString()}$</div></div>
                        <div class="stat-box"><div class="stat-lbl">Gefangen</div><div class="stat-val">${u.stats.totalCaught.toLocaleString()}</div></div>
                    </div>
                </div>
                <button class="update-btn" style="width: 100%;" onclick="handleLeaderboard()">⬅ Zurück</button>
            `; openModal(`📊 Profil von ${u.name}`, html);
        }
    } catch(e) {}
}

window.handlePrestigeMenu = function() { 
    let html = `<div style="text-align: center;"><p style="color: #ef4444; font-weight: bold;">Reset von Level, Geld, und Inventar!</p><p>Gibt +1% Bonus pro Prestige und schaltet Zonen frei.<br><i>(Ruten, Netze und der Dex bleiben erhalten)</i></p><hr style="border-color: #30363d;"><p>Voraussetzung: <b>Level 20</b> und <b>5.000$</b></p></div>`;
    openModal("🔁 Prestige", html, gameState.level>=20&&gameState.money>=5000?`<button class="danger-btn" style="font-size: 14px; padding: 10px;" onclick="doPrestige()">⚠️ Prestige durchführen!</button>`:`<button disabled style="padding: 10px;">Nicht bereit</button>`); 
}

window.handleLeaderboard = async function() {
    openModal("🏆 Leaderboard", "<p style='text-align: center;'>Lade Spieler...</p>"); 
    try { 
        const snap = await get(ref(db,"users")); 
        if(snap.exists()) { 
            let usrs=[]; snap.forEach(c=>usrs.push(c.val())); 
            usrs.sort((a,b)=>b.prestige-a.prestige||b.level-a.level||b.money-a.money); 
            let html=``; 
            usrs.forEach((u,i)=> {
                let medal = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : `<b>${i+1}.</b>`;
                html+=`<div class="leader-row" onclick="showPlayerProfile('${u.name}')" style="${u.name===currentUser?'border:1px solid #10b981;':''}"><span>${medal} ${u.name}</span> <span style="text-align: right; font-size: 12px; color: #94a3b8;">Prestige ${u.prestige} | Lvl ${u.level}<br><span style="color:#10b981;">${u.money.toLocaleString()}$</span></span></div>`;
            }); openModal("🏆 Globales Leaderboard", html); 
        } 
    } catch(e){ openModal("🏆 Leaderboard", "<p>Fehler beim Laden.</p>"); }
}

// --- EVENT LISTENER ---
document.getElementById('btnLogin').addEventListener('click', async () => {
    let u = document.getElementById('username').value.trim(); let p = document.getElementById('password').value;
    if (validAccounts[u] === p) { document.getElementById('login-error').style.display='none'; currentUser=u; await loadData(); } 
    else { document.getElementById('login-error').style.display='block'; }
});
document.getElementById('btnLogout').addEventListener('click', () => location.reload());

document.getElementById('btnFish').addEventListener('click', handleFish); document.getElementById('btnSell').addEventListener('click', handleSellMenu);
document.getElementById('btnShop').addEventListener('click', handleShopMenu); document.getElementById('btnInv').addEventListener('click', handleInvMenu);
document.getElementById('btnNet').addEventListener('click', handleNetMenu);
document.getElementById('btnDex').addEventListener('click', () => handleDexMenu('normal')); document.getElementById('btnQuest').addEventListener('click', handleQuestMenu);
document.getElementById('btnDaily').addEventListener('click', handleDailyMenu); document.getElementById('btnLeader').addEventListener('click', handleLeaderboard);
document.getElementById('btnZone').addEventListener('click', handleZoneMenu); document.getElementById('btnPrestige').addEventListener('click', handlePrestigeMenu);
document.getElementById('btnProfile').addEventListener('click', handleProfileMenu); document.getElementById('btnUpdates').addEventListener('click', handleUpdateMenu);
