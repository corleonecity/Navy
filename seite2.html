<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Keks-Klicker – Der Suchtmacher</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #3b2b1f, #1e130c);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
            color: #fff3e0;
            user-select: none;
        }
        .game-container {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .cookie-btn {
            background: none;
            border: none;
            font-size: 10rem;
            cursor: pointer;
            transition: transform 0.05s ease, filter 0.1s;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.5));
            margin: 1rem 0;
            line-height: 1;
        }
        .cookie-btn:active {
            transform: scale(0.85);
            filter: brightness(1.3) drop-shadow(0 25px 30px rgba(0,0,0,0.7));
        }
        .cookie-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15) drop-shadow(0 20px 25px rgba(0,0,0,0.6));
        }
        .stats {
            font-size: 2rem;
            font-weight: bold;
            margin: 0.2rem 0;
            letter-spacing: 0.5px;
        }
        .cps {
            font-size: 1.2rem;
            color: #deb887;
            margin-bottom: 1.8rem;
        }
        .upgrade-panel {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 1rem;
            align-items: stretch;
        }
        .upgrade {
            background: #4a3828;
            border: none;
            border-radius: 2rem;
            color: #ffeedd;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s, opacity 0.2s;
            cursor: pointer;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
        }
        .upgrade.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #33281e;
        }
        .upgrade:not(.locked):hover {
            background: #5f4b34;
        }
        .upgrade-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .upgrade-count {
            background: rgba(255,255,240,0.2);
            border-radius: 1rem;
            padding: 0.1rem 0.7rem;
            margin-left: 0.3rem;
            font-size: 0.9rem;
        }
        .reset-btn {
            margin-top: 2rem;
            background: transparent;
            border: 2px solid #b66;
            color: #fbb;
            padding: 0.5rem 1.8rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: #b66;
            color: white;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🍪 Keks-Klicker</h1>
    <div class="stats" id="cookieDisplay">0 Kekse</div>
    <div class="cps" id="cpsDisplay">pro Sekunde: 0</div>
    <button class="cookie-btn" id="cookieButton">🍪</button>
    <div class="upgrade-panel" id="upgradeContainer"></div>
    <button class="reset-btn" id="resetButton">🔄 Spiel zurücksetzen</button>
</div>

<script>
    (function() {
        // --- Spielzustand ---
        let cookies = 0;
        let cookiesPerClick = 1;
        let totalCookiesPerSecond = 0;

        // Upgrade-Definitionen: Name, Emoji, Basiskosten, Basis-CPS-Zuwachs, Wachstumsfaktor
        const upgrades = [
            { id: 'cursor',     name: 'Mauszeiger', emoji: '🖱️', baseCost: 15,   baseCps: 0.1, costMult: 1.15 },
            { id: 'grandma',    name: 'Oma',        emoji: '👵', baseCost: 100,  baseCps: 0.5, costMult: 1.15 },
            { id: 'farm',       name: 'Bauernhof',  emoji: '🌾', baseCost: 600,  baseCps: 2,   costMult: 1.15 },
            { id: 'factory',    name: 'Fabrik',     emoji: '🏭', baseCost: 3500, baseCps: 10,  costMult: 1.15 },
            { id: 'mine',       name: 'Mine',       emoji: '⛏️', baseCost: 12000,baseCps: 40,  costMult: 1.15 },
            { id: 'spaceship',  name: 'Raumschiff', emoji: '🚀', baseCost: 80000,baseCps: 200, costMult: 1.15 }
        ];

        // Anzahl der gekauften Upgrades
        let upgradeCounts = {
            cursor: 0, grandma: 0, farm: 0, factory: 0, mine: 0, spaceship: 0
        };

        // DOM-Elemente
        const cookieDisplay = document.getElementById('cookieDisplay');
        const cpsDisplay = document.getElementById('cpsDisplay');
        const cookieButton = document.getElementById('cookieButton');
        const upgradeContainer = document.getElementById('upgradeContainer');
        const resetButton = document.getElementById('resetButton');

        // --- Hilfsfunktionen ---
        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            let suffixes = ["", "K", "M", "Mrd", "Bio", "Brd"];
            let tier = Math.floor(Math.log10(num) / 3);
            if (tier >= suffixes.length) tier = suffixes.length - 1;
            let scaled = num / Math.pow(10, tier * 3);
            return scaled.toFixed(1) + ' ' + suffixes[tier];
        }

        function updateDisplay() {
            cookieDisplay.textContent = formatNumber(cookies) + ' Kekse';
            cpsDisplay.textContent = 'pro Sekunde: ' + formatNumber(totalCookiesPerSecond);
        }

        function calculateCps() {
            let cps = 0;
            upgrades.forEach(upg => {
                cps += upgradeCounts[upg.id] * upg.baseCps;
            });
            totalCookiesPerSecond = Math.round(cps * 10) / 10; // eine Dezimalstelle
        }

        function getUpgradeCost(upg) {
            let count = upgradeCounts[upg.id];
            return Math.floor(upg.baseCost * Math.pow(upg.costMult, count));
        }

        function canAfford(upg) {
            return cookies >= getUpgradeCost(upg);
        }

        function buyUpgrade(upg) {
            let cost = getUpgradeCost(upg);
            if (cookies >= cost) {
                cookies -= cost;
                upgradeCounts[upg.id] += 1;
                calculateCps();
                updateDisplay();
                renderUpgrades();
                saveGame();
            }
        }

        function renderUpgrades() {
            upgradeContainer.innerHTML = '';
            upgrades.forEach(upg => {
                let cost = getUpgradeCost(upg);
                let count = upgradeCounts[upg.id];
                let affordable = canAfford(upg);

                let btn = document.createElement('button');
                btn.className = 'upgrade' + (affordable ? '' : ' locked');
                btn.innerHTML = `
                    <span class="upgrade-name">${upg.emoji} ${upg.name} <span class="upgrade-count">${count}</span></span>
                    <span>Kosten: ${formatNumber(cost)} Kekse</span>
                `;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (affordable) buyUpgrade(upg);
                });
                upgradeContainer.appendChild(btn);
            });
        }

        // --- Speichern/Laden ---
        function saveGame() {
            let saveData = {
                cookies: cookies,
                upgradeCounts: upgradeCounts,
                cookiesPerClick: cookiesPerClick
            };
            localStorage.setItem('keksKlickerSave', JSON.stringify(saveData));
        }

        function loadGame() {
            let raw = localStorage.getItem('keksKlickerSave');
            if (!raw) return;
            try {
                let data = JSON.parse(raw);
                cookies = data.cookies || 0;
                upgradeCounts = data.upgradeCounts || {
                    cursor: 0, grandma: 0, farm: 0, factory: 0, mine: 0, spaceship: 0
                };
                cookiesPerClick = data.cookiesPerClick || 1;
            } catch (e) {
                // Bei Fehler neu starten
                resetGame();
            }
            calculateCps();
            updateDisplay();
            renderUpgrades();
        }

        function resetGame() {
            if (confirm('Möchtest du wirklich alle Kekse und Fortschritte löschen?')) {
                cookies = 0;
                upgradeCounts = { cursor: 0, grandma: 0, farm: 0, factory: 0, mine: 0, spaceship: 0 };
                cookiesPerClick = 1;
                calculateCps();
                updateDisplay();
                renderUpgrades();
                saveGame();
            }
        }

        // --- Klick-Handler ---
        cookieButton.addEventListener('click', () => {
            cookies += cookiesPerClick;
            updateDisplay();
            saveGame();
            renderUpgrades(); // um Verfügbarkeit zu aktualisieren
        });

        // --- Automatischer Zuwachs pro Sekunde ---
        setInterval(() => {
            if (totalCookiesPerSecond > 0) {
                cookies += totalCookiesPerSecond / 20; // 20 mal pro Sekunde (alle 50ms), flüssig
                updateDisplay();
                // Nicht bei jedem Tick speichern, sondern nur alle 2 Sekunden um Storage zu schonen
            }
        }, 50);

        // Speichern periodisch + beim Verlassen
        setInterval(() => {
            saveGame();
            renderUpgrades(); // Aktualisiere Button-Zustände regelmäßig
        }, 2000);
        window.addEventListener('beforeunload', saveGame);

        // Reset-Button
        resetButton.addEventListener('click', resetGame);

        // Initialer Start
        loadGame();
        calculateCps();
        updateDisplay();
        renderUpgrades();
    })();
</script>
</body>
</html>
