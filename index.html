<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>U.S Navy Marine Stopuhr</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e6f0ff;
            background: #050a19;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') no-repeat center center/cover;
            z-index: -2;
        }

        /* Overlay weniger stark (0.5 statt 0.85), damit Hintergrund besser sichtbar ist */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 10, 25, 0.55);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 850px;
            max-height: 90vh; /* Scrollbar für den Hauptcontainer */
            overflow-y: auto;
            backdrop-filter: blur(8px);
            background: rgba(10, 20, 40, 0.75);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid rgba(120,160,255,0.3);
            box-shadow: 0 10px 50px rgba(0,0,0,0.7);
            scrollbar-width: thin;
            scrollbar-color: #30475e transparent;
        }

        .time {
            font-size: 80px;
            letter-spacing: 4px;
            margin: 15px 0;
            color: #cfe3ff;
            text-shadow: 0 0 15px rgba(80,140,255,0.6);
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .section-title {
            color: #9cc7ff;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 30px;
            margin-bottom: 15px;
            border-left: 4px solid #9cc7ff;
            padding-left: 10px;
            text-align: left;
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(156, 199, 255, 0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            outline: none;
            width: 250px;
        }

        .save-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .boat-card {
            background: rgba(255,255,255,0.07);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .boat-card h4 { margin: 0; font-size: 15px; color: #fff; }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(120,160,255,0.25);
            cursor: pointer;
            color: #e6f0ff;
            background: rgba(20, 40, 80, 0.7);
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover { 
            background: rgba(40, 80, 160, 0.9);
            transform: translateY(-1px);
        }

        .btn-save { background: rgba(0, 150, 255, 0.2); font-size: 11px; }
        .btn-save:hover { background: rgba(0, 150, 255, 0.4); }

        .search-results {
            margin-top: 40px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(156, 199, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th {
            background: rgba(156, 199, 255, 0.1);
            color: #9cc7ff;
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { width: 70px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <div class="header-section">
        <img class="logo" src="https://cdn.corleonecity.de/api/raw/357c41cc-d271-4e20-9b6d-f29852fbea0c" alt="Logo">
        <h2 style="margin:0; letter-spacing: 1px;">U.S Navy Marine Stopuhr</h2>
    </div>

    <div class="time" id="display">00:00.00</div>

    <div class="input-group">
        <input type="text" id="personName" placeholder="Name der Person..." />
        <button onclick="startStop()" id="startBtn" style="border-color: #00b4ff;">Start</button>
        <button onclick="reset()" style="border-color: #ffb400;">Reset</button>
    </div>

    <div class="section-title">Normale Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>U.S Navy Predator</h4>
            <button class="btn-save" onclick="saveTime('Predator')">Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Dinghy</h4>
            <button class="btn-save" onclick="saveTime('Dinghy')">Speichern</button>
        </div>
    </div>

    <div class="section-title">Geschütz Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>Kurtz 31 Patrol Boat</h4>
            <button class="btn-save" onclick="saveTime('PatrolBoat')">Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Weaponized Dinghy</h4>
            <button class="btn-save" onclick="saveTime('WeaponizedDinghy')">Speichern</button>
        </div>
    </div>

    <div class="search-results">
        <h3 style="margin-top:0;">Person suchen</h3>
        <div class="input-group" style="justify-content: flex-start;">
            <input type="text" id="searchName" placeholder="Name eingeben...">
            <button onclick="searchPerson()">Daten laden</button>
        </div>
        <div id="resultTable"></div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyB7AmLb6NwR8sKyDXtIhmghGszpX_VsICY",
  authDomain: "cc-shop-36c3b.firebaseapp.com",
  databaseURL: "https://cc-shop-36c3b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cc-shop-36c3b",
  storageBucket: "cc-shop-36c3b.firebasestorage.app",
  messagingSenderId: "376170741825",
  appId: "1:376170741825:web:bc6102e277da5ad7cbc6c0"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- STOPPUHR LOGIK ---
let startTime = 0, elapsed = 0, interval = null, running = false;

function formatTime(ms) {
    let m = Math.floor(ms / 60000);
    let s = Math.floor((ms % 60000) / 1000);
    let c = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
}

function update() {
    elapsed = Date.now() - startTime;
    document.getElementById("display").textContent = formatTime(elapsed);
}

function startStop() {
    if (!running) {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        document.getElementById("startBtn").textContent = "Stop";
        document.getElementById("startBtn").style.background = "rgba(255, 0, 0, 0.2)";
    } else {
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "Start";
        document.getElementById("startBtn").style.background = "rgba(20, 40, 80, 0.7)";
    }
}

function reset() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    document.getElementById("display").textContent = "00:00.00";
    document.getElementById("startBtn").textContent = "Start";
    document.getElementById("startBtn").style.background = "rgba(20, 40, 80, 0.7)";
}

// --- SPEICHER LOGIK (Pfad: Navy-boote/users/...) ---
function saveTime(boatType) {
    const name = document.getElementById("personName").value.trim();
    if (!name) return alert("Bitte geben Sie einen Namen ein!");
    if (elapsed === 0) return alert("Keine Zeit gemessen!");

    const timeStr = formatTime(elapsed);
    // Speicherpfad aktualisiert auf Navy-boote/users/
    const userRef = database.ref('Navy-boote/users/' + name.toLowerCase() + '/boats/' + boatType);

    userRef.once('value').then((snapshot) => {
        let times = snapshot.val() || [];
        if (!Array.isArray(times)) times = [];
        
        times.push(timeStr);
        if (times.length > 3) times.shift(); // Nur die letzten 3 behalten

        userRef.set(times).then(() => {
            alert(`Erfolg: ${timeStr} für ${name} (${boatType}) gespeichert.`);
        });
    });
}

// --- SUCH LOGIK ---
function searchPerson() {
    const name = document.getElementById("searchName").value.trim().toLowerCase();
    if (!name) return;

    database.ref('Navy-boote/users/' + name).once('value').then((snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById("resultTable");
        
        if (!data || !data.boats) {
            container.innerHTML = "<p style='color:#ff9c9c;'>Keine Einträge für diesen Namen gefunden.</p>";
            return;
        }

        let html = `<table>
            <thead>
                <tr>
                    <th>Bootstyp</th>
                    <th>Zeit 1</th>
                    <th>Zeit 2</th>
                    <th>Zeit 3</th>
                </tr>
            </thead>
            <tbody>`;
        
        const boatMapping = {
            "Predator": "U.S Navy Predator",
            "Dinghy": "Dinghy",
            "PatrolBoat": "Kurtz 31 Patrol Boat",
            "WeaponizedDinghy": "Weaponized Dinghy"
        };

        Object.keys(boatMapping).forEach(type => {
            const t = data.boats[type] || ["--", "--", "--"];
            html += `<tr>
                <td><strong>${boatMapping[type]}</strong></td>
                <td>${t[0] || "--"}</td>
                <td>${t[1] || "--"}</td>
                <td>${t[2] || "--"}</td>
            </tr>`;
        });

        html += "</tbody></table>";
        container.innerHTML = html;
    });
}
</script>
</body>
</html>
