<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #0fa8d2; /* Das Blau, das du siehst */
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Wir nutzen Koordinaten, die sicher im sichtbaren Bereich liegen
        var map = L.map('map').setView([0, 0], 2);

        // Diese Quelle (gta-5-map.com oder ähnliche) ist oft stabiler
        // Wir fügen einen 'Cross-Origin' Parameter hinzu
        L.tileLayer('https://map-tiles.gta-5-map.com/atlas/{z}/{x}/{y}.png', {
            attribution: '&copy; GTA-5-Map',
            noWrap: true,
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        // Ein großer roter Punkt in der Mitte, damit du siehst, ob die Logik läuft
        L.circle([0, 0], {radius: 500000, color: 'red'}).addTo(map)
            .bindPopup("Wenn du das siehst, geht das Skript, aber die Bilder laden nicht.");
    </script>
</body>
</html>
