<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>U.S Navy Marine Stopuhr & System</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e6f0ff;
            background: #050a19;
            overflow-y: auto;
            padding: 20px;
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') no-repeat center center/cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 10, 25, 0.85);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            backdrop-filter: blur(15px);
            background: rgba(10, 20, 40, 0.6);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid rgba(120,160,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .time {
            font-size: 72px;
            letter-spacing: 4px;
            margin: 20px 0;
            color: #cfe3ff;
            text-shadow: 0 0 15px rgba(80,140,255,0.4);
            font-family: monospace;
        }

        .section-title {
            color: #9cc7ff;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 25px;
            border-bottom: 1px solid rgba(156, 199, 255, 0.3);
            padding-bottom: 5px;
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #30475e;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }

        .save-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .boat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .boat-card h4 { margin: 0 0 10px 0; font-size: 14px; color: #fff; }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(120,160,255,0.25);
            cursor: pointer;
            color: #e6f0ff;
            background: rgba(20, 40, 80, 0.6);
            transition: all 0.2s;
        }

        button:hover { background: rgba(40, 80, 160, 0.8); }
        .btn-save { width: 100%; font-size: 12px; margin-top: 5px; background: rgba(0, 100, 0, 0.3); }

        .search-results {
            margin-top: 30px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <img src="https://cdn.corleonecity.de/api/raw/357c41cc-d271-4e20-9b6d-f29852fbea0c" width="60" alt="Logo">
    <h2>U.S Navy Marine Management</h2>

    <div class="time" id="display">00:00.00</div>

    <div class="input-group">
        <input type="text" id="personName" placeholder="Name der Person..." />
        <button onclick="startStop()" id="startBtn">Start</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div class="section-title">Normaler Text: Normale Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>U.S Navy Predator</h4>
            <button class="btn-save" onclick="saveTime('Predator')">Zeit Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Dinghy</h4>
            <button class="btn-save" onclick="saveTime('Dinghy')">Zeit Speichern</button>
        </div>
    </div>

    <div class="section-title">Normaler Text: Geschütz Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>Kurtz 31 Patrol Boat</h4>
            <button class="btn-save" onclick="saveTime('PatrolBoat')">Zeit Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Weaponized Dinghy</h4>
            <button class="btn-save" onclick="saveTime('WeaponizedDinghy')">Zeit Speichern</button>
        </div>
    </div>

    <hr style="margin-top:40px; opacity: 0.1;">

    <div class="search-results">
        <h3>Daten abrufen</h3>
        <div class="input-group">
            <input type="text" id="searchName" placeholder="Name suchen...">
            <button onclick="searchPerson()">Suchen</button>
        </div>
        <div id="resultTable"></div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyB7AmLb6NwR8sKyDXtIhmghGszpX_VsICY",
  authDomain: "cc-shop-36c3b.firebaseapp.com",
  databaseURL: "https://cc-shop-36c3b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cc-shop-36c3b",
  storageBucket: "cc-shop-36c3b.firebasestorage.app",
  messagingSenderId: "376170741825",
  appId: "1:376170741825:web:bc6102e277da5ad7cbc6c0"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- STOPPUHR LOGIK ---
let startTime = 0, elapsed = 0, interval = null, running = false;

function formatTime(ms) {
    let m = Math.floor(ms / 60000);
    let s = Math.floor((ms % 60000) / 1000);
    let c = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
}

function update() {
    elapsed = Date.now() - startTime;
    document.getElementById("display").textContent = formatTime(elapsed);
}

function startStop() {
    if (!running) {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        document.getElementById("startBtn").textContent = "Stop";
    } else {
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "Start";
    }
}

function reset() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    document.getElementById("display").textContent = "00:00.00";
    document.getElementById("startBtn").textContent = "Start";
}

// --- SPEICHER LOGIK ---
function saveTime(boatType) {
    const name = document.getElementById("personName").value.trim();
    if (!name) return alert("Bitte zuerst einen Namen eingeben!");
    if (elapsed === 0) return alert("Zeit ist 0. Starte die Uhr!");

    const timeStr = formatTime(elapsed);
    const userRef = database.ref('users/' + name.toLowerCase() + '/boats/' + boatType);

    userRef.once('value').then((snapshot) => {
        let times = snapshot.val() || [];
        if (!Array.isArray(times)) times = [];
        
        // Füge Zeit hinzu (maximal 3 Zeiten)
        times.push(timeStr);
        if (times.length > 3) times.shift(); // Älteste löschen wenn mehr als 3

        userRef.set(times).then(() => {
            alert(`Zeit für ${name} (${boatType}) gespeichert: ${timeStr}`);
        });
    });
}

// --- SUCH LOGIK ---
function searchPerson() {
    const name = document.getElementById("searchName").value.trim().toLowerCase();
    if (!name) return;

    database.ref('users/' + name).once('value').then((snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById("resultTable");
        
        if (!data) {
            container.innerHTML = "<p>Keine Daten für diesen Namen gefunden.</p>";
            return;
        }

        let html = `<table>
            <tr><th>Bootstyp</th><th>Zeit 1</th><th>Zeit 2</th><th>Zeit 3</th></tr>`;
        
        const types = ["Predator", "Dinghy", "PatrolBoat", "WeaponizedDinghy"];
        types.forEach(type => {
            const t = data.boats[type] || ["-", "-", "-"];
            html += `<tr>
                <td><b>${type}</b></td>
                <td>${t[0] || "-"}</td>
                <td>${t[1] || "-"}</td>
                <td>${t[2] || "-"}</td>
            </tr>`;
        });

        html += "</table>";
        container.innerHTML = html;
    });
}
</script>
</body>
</html>
