<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>GTA V Map (Custom Engine)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: #222;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<header>GTA V Map Viewer (Custom)</header>
<canvas id="mapCanvas"></canvas>

<script>
const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY;

const mapImage = new Image();
mapImage.src = "https://i.imgur.com/7Jb6KQm.jpg";

mapImage.onload = () => draw();

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const width = mapImage.width * scale;
  const height = mapImage.height * scale;

  ctx.drawImage(mapImage, offsetX, offsetY, width, height);
}

// Zoom mit Mausrad
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();

  const zoom = e.deltaY < 0 ? 1.1 : 0.9;
  scale *= zoom;

  draw();
});

// Drag starten
canvas.addEventListener("mousedown", (e) => {
  isDragging = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
});

// Drag bewegen
canvas.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;

  draw();
});

// Drag stoppen
canvas.addEventListener("mouseup", () => isDragging = false);
canvas.addEventListener("mouseleave", () => isDragging = false);

// Klick Koordinaten
canvas.addEventListener("click", (e) => {
  const x = (e.clientX - offsetX) / scale;
  const y = (e.clientY - offsetY) / scale;

  alert(`Koordinaten: ${Math.floor(x)}, ${Math.floor(y)}`);
});

// Resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
});
</script>

</body>
</html>
