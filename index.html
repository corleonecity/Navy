<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #0fa8d2; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2,
            center: [0, 0],
            zoom: -1
        });

        L.tileLayer('https://s.rsg.sc/sc/images/games/GTAV/map/atlas/{z}/{x}/{y}.jpg', {
            attribution: '&copy; Rockstar Games',
            noWrap: true
        }).addTo(map);

        const marker = L.marker([0, 0]).addTo(map);
        marker.bindPopup("<b>Zentrum</b><br>Los Santos Map.");
    </script>
</body>
</html>
