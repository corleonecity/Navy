<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>GTA V Map (Custom Engine)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: #222;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<header>GTA V Map Viewer (Custom)</header>
<canvas id="mapCanvas"></canvas>

<script>
const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY;

const mapImage = new Image();
// WICHTIG: Ersetze diese URL mit einer funktionierenden GTA V Map
// Beispiel funktionierende Quelle:
mapImage.src = "https://www.gtavision.com/images/content/gtav/maps/grand-theft-auto-v_karte-landkarte_hq.jpg";
</script>

</body>
</html>
