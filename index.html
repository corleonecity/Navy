<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>U.S Navy Marine Stopuhr</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #e6f0ff;
        overflow: hidden;
    }

    .background {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') no-repeat center center/cover;
        z-index: -2;
    }

    .overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(5, 10, 25, 0.75);
        z-index: -1;
    }

    .top-left {
        position: absolute;
        top: 18px;
        left: 22px;
        font-size: 16px;
        letter-spacing: 2px;
        color: #9cc7ff;
        opacity: 0.9;
    }

    .logo {
        position: absolute;
        top: 12px;
        right: 20px;
        width: 70px;
        height: 70px;
        object-fit: contain;
        filter: drop-shadow(0 0 8px rgba(80,140,255,0.6));
    }

    .container {
        text-align: center;
        backdrop-filter: blur(10px);
        background: rgba(10, 20, 40, 0.35);
        padding: 40px 60px;
        border-radius: 18px;
        border: 1px solid rgba(120,160,255,0.2);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .time {
        font-size: 92px;
        letter-spacing: 4px;
        margin-bottom: 25px;
        color: #cfe3ff;
        text-shadow: 0 0 15px rgba(80,140,255,0.4);
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 12px;
    }

    button {
        padding: 12px 26px;
        border-radius: 10px;
        border: 1px solid rgba(120,160,255,0.25);
        font-size: 15px;
        cursor: pointer;
        color: #e6f0ff;
        background: rgba(20, 40, 80, 0.6);
        backdrop-filter: blur(6px);
        transition: all 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        background: rgba(40, 80, 160, 0.6);
        box-shadow: 0 6px 20px rgba(0,80,255,0.25);
    }

    .start {
        border-color: rgba(0,180,255,0.4);
    }

    .reset {
        border-color: rgba(255,180,0,0.4);
    }
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="top-left">U.S Navy Marine Stopuhr</div>

<!-- LOGO -->
<img class="logo" src="https://cdn.corleonecity.de/api/raw/357c41cc-d271-4e20-9b6d-f29852fbea0c" alt="U.S Navy Logo">

<div class="container">
    <div class="time" id="display">00:00.00</div>

    <div class="buttons">
        <button class="reset" onclick="reset()">Reset</button>
        <button class="start" onclick="startStop()" id="startBtn">Start</button>
    </div>
</div>

<script>
let startTime = 0;
let elapsed = 0;
let interval = null;
let running = false;

function formatTime(ms) {
    let minutes = Math.floor(ms / 60000);
    let seconds = Math.floor((ms % 60000) / 1000);
    let centiseconds = Math.floor((ms % 1000) / 10);

    return (
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + "." +
        String(centiseconds).padStart(2, '0')
    );
}

function update() {
    let now = Date.now();
    elapsed = now - startTime;
    document.getElementById("display").textContent = formatTime(elapsed);
}

function startStop() {
    if (!running) {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        document.getElementById("startBtn").textContent = "Stop";
    } else {
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "Start";
    }
}

function reset() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    document.getElementById("display").textContent = "00:00.00";
    document.getElementById("startBtn").textContent = "Start";
}
</script>

</body>
</html>
