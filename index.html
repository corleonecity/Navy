<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stopuhr</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Courier New', monospace;
    }

    .container {
        text-align: center;
        color: orange;
    }

    .time {
        font-size: 80px;
        letter-spacing: 5px;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        font-size: 16px;
        cursor: pointer;
    }

    .start {
        background: #3cb371;
        color: white;
    }

    .reset {
        background: #b8860b;
        color: white;
    }
</style>
</head>
<body>

<div class="container">
    <div class="time" id="display">00:00.00</div>
    <button class="reset" onclick="reset()">Reset</button>
    <button class="start" onclick="startStop()" id="startBtn">Start</button>
</div>

<script>
let startTime = 0;
let elapsed = 0;
let interval = null;
let running = false;

function formatTime(ms) {
    let minutes = Math.floor(ms / 60000);
    let seconds = Math.floor((ms % 60000) / 1000);
    let centiseconds = Math.floor((ms % 1000) / 10);

    return (
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + "." +
        String(centiseconds).padStart(2, '0')
    );
}

function update() {
    let now = Date.now();
    elapsed = now - startTime;
    document.getElementById("display").textContent = formatTime(elapsed);
}

function startStop() {
    if (!running) {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        document.getElementById("startBtn").textContent = "Stop";
    } else {
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "Start";
    }
}

function reset() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    document.getElementById("display").textContent = "00:00.00";
    document.getElementById("startBtn").textContent = "Start";
}
</script>

</body>
</html>
