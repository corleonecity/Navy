<!DOCTYPE html>
<html>
<head>
    <title>GTA V Full Map (Blaine County)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #00121d; }
        #map { height: 100vh; width: 100%; }
        .label-style { color: white; font-weight: bold; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialisierung der Karte
    // Wir nutzen L.CRS.Simple, weil GTA Koordinaten flach sind
    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 1,
        maxZoom: 5
    }).setView([-50, 50], 2);

    // Diese URL nutzt die Tiles aus dem bekannten n0p-Repository auf GitHub
    // Sie deckt die gesamte Karte (inkl. Blaine County) ab.
    var gtaMap = L.tileLayer('https://files.v-multiplayer.com/map/atlas/{z}/{x}/{y}.png', {
        noWrap: true,
        continuousWorld: false,
        attribution: 'GTA V Map - Blaine County & Los Santos'
    }).addTo(map);

    // Markante Punkte in Blaine County (Beispiele)
    var locations = [
        {name: "Mount Chiliad", coords: [-15, 45]},
        {name: "Sandy Shores Airfield", coords: [-35, 55]},
        {name: "Paleto Bay", coords: [-5, 30]},
        {name: "Alamo Sea", coords: [-28, 48]}
    ];

    locations.forEach(function(loc) {
        L.marker(loc.coords).addTo(map)
            .bindPopup(loc.name);
    });

</script>
</body>
</html>
