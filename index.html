// ==================== HILFSFUNKTIONEN ====================
function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

function formatNumber(n) {
    if (n === null || n === undefined || isNaN(n)) return '0';
    return Number(n).toLocaleString('de-DE');
}

function formatMoneyInput(input) {
    let val = input.value.replace(/\./g, '').replace(/,/g, '.');
    if (val === '' || isNaN(val)) { input.dataset.raw = '0'; return; }
    input.dataset.raw = val;
    const num = parseFloat(val);
    input.value = formatNumber(num);
}

function getRawMoneyValue(input) {
    return parseFloat(input.dataset.raw || input.value.replace(/\./g, '').replace(/,/g, '.')) || 0;
}

function showToast(msg, color) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;bottom:15px;right:15px;background:${color};color:#000;padding:8px 18px;border-radius:20px;font-size:13px;z-index:9999;font-weight:bold;`;
    el.innerText = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 2500);
}

// ==================== SESSION MANAGEMENT ====================
function startSessionTimer() {
    if (sessionTimeout) clearTimeout(sessionTimeout);
    sessionTimeout = setTimeout(() => {
        showToast('⚠️ Sitzung abgelaufen! Bitte neu anmelden.', '#ffaa33');
        doLogout();
    }, SESSION_DURATION);
}

function resetSessionTimer() {
    if (sessionTimeout) {
        clearTimeout(sessionTimeout);
        startSessionTimer();
    }
}

// Event Listener für Benutzeraktivität
document.addEventListener('click', resetSessionTimer);
document.addEventListener('keypress', resetSessionTimer);
document.addEventListener('scroll', resetSessionTimer);

// ==================== AUTH ====================
async function ensureAdminExists() {
    const snap = await database.ref('Navy-boote/users_auth/colin').once('value');
    if (!snap.val()) {
        await database.ref('Navy-boote/users_auth/colin').set({ 
            password: '22122009', 
            isAdmin: true, 
            created: Date.now(),
            permissions: {
                stopwatch: true,
                confiscations: true,
                payout: true,
                families: true,
                admin: true
            }
        });
    }
}

function startUserDataListener(username) {
    // Entferne alten Listener
    if (userDataListener) {
        userDataListener.off();
    }
    
    // Echtzeit-Listener für Benutzerdaten
    userDataListener = database.ref('Navy-boote/users_auth/' + username);
    userDataListener.on('value', (snap) => {
        const userData = snap.val();
        
        // Wenn Account gelöscht wurde
        if (!userData) {
            showToast('⚠️ Dein Account wurde gelöscht!', '#ff4444');
            doLogout();
            return;
        }
        
        // Wenn Berechtigungen geändert wurden (und Benutzer kein Admin ist)
        if (!isAdmin && userData.permissions) {
            const newPermissions = userData.permissions;
            const permissionsChanged = 
                userPermissions.stopwatch !== (newPermissions.stopwatch !== false) ||
                userPermissions.confiscations !== (newPermissions.confiscations !== false) ||
                userPermissions.payout !== (newPermissions.payout !== false) ||
                userPermissions.families !== (newPermissions.families !== false);
            
            if (permissionsChanged) {
                // Aktualisiere Berechtigungen
                userPermissions = {
                    stopwatch: newPermissions.stopwatch !== false,
                    confiscations: newPermissions.confiscations !== false,
                    payout: newPermissions.payout !== false,
                    families: newPermissions.families !== false,
                    admin: false
                };
                
                // Aktualisiere Tabs sofort
                setupTabsBasedOnPermissions();
                
                // Prüfe ob aktueller Tab noch erlaubt ist
                const currentTab = document.querySelector('.tab-content.active');
                if (currentTab) {
                    const tabName = currentTab.id.replace('tab-', '');
                    if (tabName !== 'home' && tabName !== 'admin' && !userPermissions[tabName]) {
                        switchTab('home');
                    }
                }
                
                showToast('🔄 Berechtigungen aktualisiert!', '#64b4ff');
            }
        }
    });
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) { document.getElementById('loginError').style.display = 'block'; return; }
    const snap = await database.ref('Navy-boote/users_auth/' + username).once('value');
    const userData = snap.val();
    if (userData && userData.password === password) {
        currentUser = { username, isAdmin: userData.isAdmin === true };
        isAdmin = currentUser.isAdmin;
        
        if (isAdmin) {
            userPermissions = {
                stopwatch: true,
                confiscations: true,
                payout: true,
                families: true,
                admin: true
            };
        } else {
            userPermissions = {
                stopwatch: userData.permissions?.stopwatch !== false,
                confiscations: userData.permissions?.confiscations !== false,
                payout: userData.permissions?.payout !== false,
                families: userData.permissions?.families !== false,
                admin: false
            };
        }
        
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.add('show');
        document.getElementById('currentUserDisplay').textContent = '👤 ' + username;
        const badge = document.getElementById('userBadge');
        if (isAdmin) { badge.textContent = '🔑 Admin'; badge.classList.add('admin'); }
        else { badge.textContent = '👤 User'; badge.classList.remove('admin'); }
        document.getElementById('loginError').style.display = 'none';
        
        // Starte Echtzeit-Listener für Benutzerdaten
        startUserDataListener(username);
        
        // Starte Session-Timer
        startSessionTimer();
        
        setupTabsBasedOnPermissions();
        if (isAdmin) setupAdminTab();
        
        // Wechsle zum ersten verfügbaren Tab
        const availableTabs = getAvailableTabs();
        const firstTab = availableTabs.length > 0 ? availableTabs[0] : 'home';
        switchTab(firstTab);
    } else { document.getElementById('loginError').style.display = 'block'; }
}

function doLogout() {
    // Clear session timer
    if (sessionTimeout) {
        clearTimeout(sessionTimeout);
        sessionTimeout = null;
    }
    
    // Remove user data listener
    if (userDataListener) {
        userDataListener.off();
        userDataListener = null;
    }
    
    currentUser = null; 
    isAdmin = false;
    userPermissions = {
        stopwatch: true,
        confiscations: true,
        payout: true,
        families: true,
        admin: false
    };
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.remove('show');
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    removeAdminTab();
    document.getElementById('tabNav').innerHTML = '';
}

function getAvailableTabs() {
    const tabs = [];
    if (userPermissions.stopwatch) tabs.push('stopwatch');
    if (userPermissions.confiscations) tabs.push('confiscations');
    if (userPermissions.payout) tabs.push('payout');
    if (userPermissions.families) tabs.push('families');
    if (isAdmin || userPermissions.admin) tabs.push('admin');
    return tabs;
}

function setupTabsBasedOnPermissions() {
    const tabNav = document.getElementById('tabNav');
    tabNav.innerHTML = '';
    
    const homeBtn = document.createElement('button');
    homeBtn.className = 'tab-btn active';
    homeBtn.textContent = '🏠 Hauptseite';
    homeBtn.onclick = () => switchTab('home');
    tabNav.appendChild(homeBtn);
    
    const availableTabs = getAvailableTabs();
    const tabConfig = {
        'stopwatch': { icon: '⏱️', label: 'Stoppuhr' },
        'confiscations': { icon: '📋', label: 'Beschlagnahmungen' },
        'payout': { icon: '💰', label: 'Auszahlung' },
        'families': { icon: '👨‍👩‍👧‍👦', label: 'Familien' },
        'admin': { icon: '🔑', label: 'Admin', isAdmin: true }
    };
    
    availableTabs.forEach(tabName => {
        if (tabName === 'admin' && !isAdmin) return;
        const config = tabConfig[tabName];
        if (!config) return;
        
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        if (config.isAdmin) btn.className += ' admin-tab';
        btn.textContent = `${config.icon} ${config.label}`;
        btn.onclick = () => switchTab(tabName);
        tabNav.appendChild(btn);
    });
}

    removeAdminTab();

        const div = document.createElement('div');

        div.innerHTML = `
            <h3 style="color:#ff5555;margin-bottom:16px;">🔑 Admin</h3>
            
            <div class="admin-section">
                <h4>👥 Benutzerverwaltung</h4>
                <div class="input-group" style="justify-content:flex-start;margin-bottom:12px;">
                    <input type="text" id="newUsername" placeholder="Benutzername" style="width:180px;">
                    <input type="password" id="newPassword" placeholder="Passwort" style="width:180px;">
                    <button onclick="createUser()" style="background:#2e7d32;">➕ Erstellen</button>
                </div>
                <div id="userList"></div>
            </div>
            
            <div class="admin-section">
                <h4>🔐 Berechtigungen</h4>
                <p style="color:#8ab4e0;font-size:12px;margin-bottom:12px;">Wähle einen Benutzer aus, um seine Berechtigungen zu bearbeiten:</p>
                <div class="input-group" style="justify-content:flex-start;margin-bottom:12px;">
                    <select id="permissionUserSelect" onchange="loadUserPermissions()" style="width:250px;">
                        <option value="">-- Benutzer wählen --</option>
                    </select>
                </div>
                <div id="permissionsEditor" style="display:none;">
                    <div class="permissions-grid">
                        <div class="permission-item">
                            <input type="checkbox" id="permStopwatch" onchange="savePermission('stopwatch', this.checked)">
                            <label for="permStopwatch">⏱️ Stoppuhr</label>
                        </div>
                        <div class="permission-item">
                            <input type="checkbox" id="permConfiscations" onchange="savePermission('confiscations', this.checked)">
                            <label for="permConfiscations">📋 Beschlagnahmungen</label>
                        </div>
                        <div class="permission-item">
                            <input type="checkbox" id="permPayout" onchange="savePermission('payout', this.checked)">
                            <label for="permPayout">💰 Auszahlung</label>
                        </div>
                        <div class="permission-item">
                            <input type="checkbox" id="permFamilies" onchange="savePermission('families', this.checked)">
                            <label for="permFamilies">👨‍👩‍👧‍👦 Familien</label>
                        </div>
                    </div>

                </div>

            <div class="admin-section">
                <h4>🗑️ Gefahrenzone</h4>
                <div class="input-group" style="justify-content:flex-start;">

function removeAdminTab() {
    const adminTab = document.getElementById('tab-admin');
    if (adminTab) adminTab.remove();
}

async function populatePermissionUserSelect() {
    const select = document.getElementById('permissionUserSelect');
    if (!select) return;
    
    const snap = await database.ref('Navy-boote/users_auth').once('value');
    const users = snap.val();
    
    select.innerHTML = '<option value="">-- Benutzer wählen --</option>';
    if (users) {
        Object.entries(users).forEach(([name, data]) => {
            if (!data.isAdmin) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name.charAt(0).toUpperCase() + name.slice(1);
                select.appendChild(option);
            }
        });
    }
    
    if (select.options.length === 1) {
        select.innerHTML = '<option value="">-- Keine Benutzer verfügbar --</option>';
    }
}

async function loadUserPermissions() {
    const username = document.getElementById('permissionUserSelect').value;
    const editor = document.getElementById('permissionsEditor');
    
    if (!username) {
        editor.style.display = 'none';
        currentPermissionUser = null;
        return;
    }
    
    currentPermissionUser = username;
    
    const snap = await database.ref('Navy-boote/users_auth/' + username + '/permissions').once('value');
    const permissions = snap.val() || {};
    
    document.getElementById('permStopwatch').checked = permissions.stopwatch !== false;
    document.getElementById('permConfiscations').checked = permissions.confiscations !== false;
    document.getElementById('permPayout').checked = permissions.payout !== false;
    document.getElementById('permFamilies').checked = permissions.families !== false;
    
    editor.style.display = 'block';
}

async function savePermission(permission, value) {
    if (!currentPermissionUser) return;
    
    const updates = {};
    updates['Navy-boote/users_auth/' + currentPermissionUser + '/permissions/' + permission] = value;
    
    try {
        await database.ref().update(updates);
        
        const statusEl = document.getElementById('permissionSaveStatus');
        statusEl.style.display = 'block';
        statusEl.textContent = '✅ Berechtigungen gespeichert!';
        setTimeout(() => { statusEl.style.display = 'none'; }, 2000);
        
        // Aktualisiere die Benutzerliste in der Tabelle
        await loadUserList();
    } catch (error) {
        console.error('Fehler beim Speichern:', error);
        showToast('❌ Fehler beim Speichern!', '#ff4444');
    }
}

async function createUser() {
    const u = document.getElementById('newUsername').value.trim().toLowerCase();
    const p = document.getElementById('newPassword').value.trim();
    if (!u || !p) return alert('Bitte Benutzername und Passwort eingeben!');
    if (u === 'colin') return alert('Dieser Benutzername ist reserviert!');
    
    const defaultPermissions = {
        stopwatch: true,
        confiscations: true,
        payout: true,
        families: true
    };
    
    try {
        await database.ref('Navy-boote/users_auth/' + u).set({ 
            password: p, 
            isAdmin: false, 
            created: Date.now(),
            permissions: defaultPermissions
        });
        
        showToast('✅ Benutzer erstellt!', '#2ecc40');
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        loadUserList();
        populatePermissionUserSelect();
    } catch (error) {
        console.error('Fehler:', error);
        showToast('❌ Fehler beim Erstellen!', '#ff4444');
    }
}

async function loadUserList() {
    const snap = await database.ref('Navy-boote/users_auth').once('value');
    const users = snap.val();
    const d = document.getElementById('userList');
    
    if (!d) return;
    
    if (!users) { 
        d.innerHTML = '<p style="color:#aaa;">Keine Benutzer vorhanden.</p>'; 
        return; 
    }
    
    let tableHTML = '<table class="user-table"><thead><tr><th>Name</th><th>Rolle</th><th>Berechtigungen</th><th>Erstellt</th><th>Aktion</th></tr></thead><tbody>';
    
    for (const [username, userData] of Object.entries(users)) {
        const perms = userData.permissions || {};
        const activePerms = [];
        
        if (perms.stopwatch === true || perms.stopwatch === undefined) {
            activePerms.push('⏱️ Stoppuhr');
        }
        if (perms.confiscations === true || perms.confiscations === undefined) {
            activePerms.push('📋 Beschlagn.');
        }
        if (perms.payout === true || perms.payout === undefined) {
            activePerms.push('💰 Auszahlung');
        }
        if (perms.families === true || perms.families === undefined) {
            activePerms.push('👨‍👩‍👧‍👦 Familien');
        }
        if (userData.isAdmin) {
            activePerms.push('🔑 Admin');
        }
        
        const permissionsDisplay = activePerms.length > 0 ? 
            activePerms.map(p => `<div style="margin:2px 0;">${p}</div>`).join('') : 
            '<span style="color:#ff5555;">Keine</span>';
        
        tableHTML += `
            <tr>
                <td><strong>${esc(username)}</strong></td>
                <td>${userData.isAdmin ? 
                    '<span style="color:#ff5555;font-weight:bold;">Admin</span>' : 
                    '<span style="color:#64b4ff;">User</span>'}</td>
                <td style="font-size:12px;">${permissionsDisplay}</td>
                <td>${userData.created ? new Date(userData.created).toLocaleDateString('de-DE') : '-'}</td>
                <td>${username !== 'colin' ? 
                    `<button class="btn-small btn-danger" onclick="deleteUser('${username}')">🗑️</button>` : 
                    '🔒'}</td>
            </tr>`;
    }
    
    tableHTML += '</tbody></table>';
    d.innerHTML = tableHTML;
}

async function deleteUser(u) { 
    if (!confirm('Benutzer "' + u + '" wirklich löschen? Der Benutzer wird sofort abgemeldet!')) return; 
    await database.ref('Navy-boote/users_auth/' + u).remove(); 
    showToast('Benutzer gelöscht und abgemeldet.', '#ff4444'); 
    loadUserList(); 
    populatePermissionUserSelect();
    
    const editor = document.getElementById('permissionsEditor');
    if (editor) editor.style.display = 'none';
    currentPermissionUser = null;
}

async function adminDeletePerson() {
    const n = document.getElementById('adminDeletePerson').value.trim(); 
    if (!n) return alert('Name eingeben!');
    if (!confirm('⚠️ Alle Daten von "' + n + '" unwiderruflich löschen?')) return;
    await database.ref('Navy-boote/users/' + n.toLowerCase()).remove(); 
    showToast('Person gelöscht.', '#ff4444');
    document.getElementById('adminDeletePerson').value = ''; 
    loadAllUsersSorted(); 
    autoLoadPerson();
}

function switchTab(name) {
    if (name === 'admin' && !isAdmin) {
        showToast('Keine Berechtigung!', '#ff4444');
        return;
    }
    
    if (name !== 'home' && name !== 'admin' && !userPermissions[name]) {
        showToast('Keine Berechtigung für diesen Bereich!', '#ff4444');
        return;
    }
    
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    const allBtns = document.querySelectorAll('.tab-btn');
    const availableTabs = ['home', ...getAvailableTabs()];
    const tabIndex = availableTabs.indexOf(name);
    if (tabIndex >= 0 && allBtns[tabIndex]) allBtns[tabIndex].classList.add('active');
    
    const tabEl = document.getElementById('tab-' + name);
    if (tabEl) tabEl.classList.add('active');
    
    if (name === 'home') loadHomepageStats();
    else if (name === 'stopwatch') loadAllUsersSorted();
    else if (name === 'confiscations') loadConfiscations();
    else if (name === 'payout') { goToCurrentWeek(); loadPayoutData(); }
    else if (name === 'families') loadFamilies();
    else if (name === 'admin') {
        if (!document.getElementById('tab-admin')) {
            setupAdminTab();
        }
        loadUserList();
        populatePermissionUserSelect();
    }
}

function loadHomepageStats() {
    database.ref('Navy-boote/users').once('value', s => { document.getElementById('statPersons').textContent = s.val() ? Object.keys(s.val()).length : 0; });
    database.ref('Navy-boote/families').once('value', s => { document.getElementById('statFamilies').textContent = s.val() ? Object.keys(s.val()).length : 0; });
    database.ref('Navy-boote/confiscations').once('value', s => {
        const d = s.val(); let c = 0, tg = 0, tb = 0;
        if (d) { Object.keys(d).forEach(k => { c++; tg += parseFloat(d[k].greenMoney || 0); tb += parseFloat(d[k].blackMoney || 0); }); }
        document.getElementById('statConfiscations').textContent = c;
        document.getElementById('statTotalGreen').textContent = formatNumber(tg) + ' €';
        document.getElementById('statTotalBlack').textContent = formatNumber(tb) + ' €';
    });
}

// ==================== STOPPUHR ====================
let startTime = 0, elapsed = 0, interval = null, running = false;
function formatTime(ms) { let m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), c = Math.floor((ms % 1000) / 10); return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + String(c).padStart(2, '0'); }
function updateDisplay() { elapsed = Date.now() - startTime; document.getElementById('display').textContent = formatTime(elapsed); }
function startStop() {
    if (!running) { startTime = Date.now() - elapsed; interval = setInterval(updateDisplay, 10); running = true; document.getElementById('startBtn').textContent = '⏸ Stop'; document.getElementById('startBtn').style.background = '#aa3300'; }
    else { clearInterval(interval); running = false; document.getElementById('startBtn').textContent = '▶ Start'; document.getElementById('startBtn').style.background = '#0055aa'; }
}
function resetTimer() { clearInterval(interval); running = false; elapsed = 0; startTime = 0; document.getElementById('display').textContent = '00:00.00'; document.getElementById('startBtn').textContent = '▶ Start'; document.getElementById('startBtn').style.background = '#0055aa'; }
async function saveTimeWithDesc(boatKey, taId) {
    const name = document.getElementById('personName').value.trim(); if (!name) return alert('Name eingeben!');
    const currentElapsed = running ? (Date.now() - startTime) : elapsed;
    if (currentElapsed === 0) return alert('Keine Zeit gestoppt!');
    const timeStr = formatTime(currentElapsed);
    const desc = document.getElementById(taId).value.trim();
    const ref = database.ref('Navy-boote/users/' + name.toLowerCase() + '/boats/' + boatKey);
    const snap = await ref.once('value'); let arr = snap.val(); if (!arr || !Array.isArray(arr)) arr = [];
    arr.push({ time: timeStr, desc: desc || 'Keine Beschreibung', timestamp: Date.now() }); await ref.set(arr);
    await database.ref('Navy-boote/users/' + name.toLowerCase() + '/lastUpdated').set(Date.now());
    document.getElementById(taId).value = ''; document.getElementById('searchName').value = name; autoLoadPerson(); alert('✅ ' + timeStr + ' gespeichert!');
}
window.deleteSingleEntry = async function(nl, bi, ts) { if (!isAdmin) return alert('Nur Admin!'); if (!confirm('Löschen?')) return; const ref = database.ref('Navy-boote/users/' + nl + '/boats/' + bi); const snap = await ref.once('value'); let arr = snap.val(); if (arr && Array.isArray(arr)) { await ref.set(arr.filter(e => e.timestamp !== ts)); await database.ref('Navy-boote/users/' + nl + '/lastUpdated').set(Date.now()); autoLoadPerson(); loadAllUsersSorted(); } };
let currentListener = null;
function autoLoadPerson() { const raw = document.getElementById('searchName').value.trim(); if (!raw) { document.getElementById('resultTable').innerHTML = '<p>✏️ Namen eingeben...</p>'; if (currentListener) currentListener.off(); return; } listenToPersonData(raw.toLowerCase()); }
function listenToPersonData(nl) {
    if (currentListener) currentListener.off(); currentListener = database.ref('Navy-boote/users/' + nl);
    currentListener.on('value', snap => {
        const data = snap.val(); const c = document.getElementById('resultTable'); const dn = nl.charAt(0).toUpperCase() + nl.slice(1);
        if (!data || !data.boats) { c.innerHTML = '<div style="padding:15px;">⚓ ' + dn + ' hat noch keine Zeiten.</div>'; return; }
        const bl = { "Predator": "⚡ Predator", "Dinghy": "🛶 Dinghy", "PatrolBoat": "🚢 Kurtz 31", "WeaponizedDinghy": "💥 Weaponized" };
        let h = '<div class="table-wrapper"><h4>👤 ' + dn + '</h4><table><thead><tr><th>Boot</th><th>Zeit</th><th>Beschreibung</th>' + (isAdmin ? '<th>Aktion</th>' : '') + '</tr></thead><tbody>';
        for (const [bi, bn] of Object.entries(bl)) {

            } else h += '<tr><td>' + bn + '</td><td colspan="' + (isAdmin ? 3 : 2) + '">— keine —</td>' + (isAdmin ? '<td></td>' : '') + '</tr>';
        }
        h += '</tbody></table></div>'; c.innerHTML = h;
    });
}

let currentPayoutWeek = '';
function getMonday(date) { const d = new Date(date); const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1); d.setDate(diff); d.setHours(0, 0, 0, 0); return d; }
function getSunday(monday) { const d = new Date(monday); d.setDate(d.getDate() + 6); d.setHours(23, 59, 59, 999); return d; }
function getWeekKey(monday) { const y = monday.getFullYear(); const m = String(monday.getMonth() + 1).padStart(2, '0'); const d = String(monday.getDate()).padStart(2, '0'); return y + '-' + m + '-' + d; }
function getWeekString(monday) { const sun = getSunday(monday); const mo = monday.getDate() + '.' + (monday.getMonth() + 1); const so = sun.getDate() + '.' + (sun.getMonth() + 1) + '.' + sun.getFullYear(); return mo + ' - ' + so; }
function goToCurrentWeek() { const monday = getMonday(new Date()); currentPayoutWeek = getWeekKey(monday); document.getElementById('payoutWeekInput').value = currentPayoutWeek; }
function previousWeek() { const d = new Date(currentPayoutWeek + 'T00:00:00'); d.setDate(d.getDate() - 7); currentPayoutWeek = getWeekKey(d); document.getElementById('payoutWeekInput').value = currentPayoutWeek; loadPayoutData(); }
function nextWeek() { const d = new Date(currentPayoutWeek + 'T00:00:00'); d.setDate(d.getDate() + 7); currentPayoutWeek = getWeekKey(d); document.getElementById('payoutWeekInput').value = currentPayoutWeek; loadPayoutData(); }

async function loadPayoutData() {
    const weekInput = document.getElementById('payoutWeekInput').value;
    if (!weekInput) return;
    currentPayoutWeek = weekInput;
    const monday = new Date(weekInput + 'T00:00:00');
    const sunday = getSunday(monday);
    const weekKey = getWeekKey(monday);
    document.getElementById('payoutInfo').textContent = '📅 Woche: ' + getWeekString(monday) + ' | Mo ' + weekKey + ' bis So ' + getWeekKey(sunday);

    const usersAuthSnap = await database.ref('Navy-boote/users_auth').once('value');
    const usersAuth = usersAuthSnap.val() || {};
    const authorizedUsers = Object.keys(usersAuth);

    const usersSnap = await database.ref('Navy-boote/users').once('value');
    const allUsers = usersSnap.val() || {};

    const payoutSnap = await database.ref('Navy-boote/payouts/' + weekKey).once('value');
    const payoutData = payoutSnap.val() || {};

    const tbody = document.getElementById('payoutTableBody');
    let totalKontrollen = 0, totalSumme = 0, totalAusgezahlt = 0, totalOffen = 0;

    if (authorizedUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Keine autorisierten Benutzer.</td></tr>';
    } else {
        tbody.innerHTML = '';
        
        for (const name of authorizedUsers) {
            let weekCheckCount = 0;
            const userData = allUsers[name];
            
            if (userData && userData.boats) {
                for (const boatKey in userData.boats) {
                    const boatEntries = userData.boats[boatKey];
                    if (Array.isArray(boatEntries)) {
                        boatEntries.forEach(entry => {
                            if (entry.timestamp) {
                                const entryDate = new Date(entry.timestamp);
                                if (entryDate >= monday && entryDate <= sunday) {
                                    weekCheckCount++;
                                }
                            }
                        });
                    }
                }
            }
            
            const saved = payoutData[name] || { count: null, paid: false };
            const displayCount = saved.count !== null ? saved.count : weekCheckCount;
            const summe = displayCount * PRICE_PER_CHECK;
            
            totalKontrollen += displayCount;
            totalSumme += summe;
            
            if (saved.paid) {
                totalAusgezahlt += summe;
            } else {
                totalOffen += summe;
            }
            
            const displayName = name.charAt(0).toUpperCase() + name.slice(1);
            const isUserAdmin = usersAuth[name] && usersAuth[name].isAdmin;
            const paidStatus = saved.paid ? 
                '<span class="payout-status paid">✅ Ausgezahlt</span>' : 
                '<span class="payout-status unpaid">⏳ Offen</span>';
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${esc(displayName)}</strong> ${isUserAdmin ? '<span style="color:#ff5555;font-size:10px;">Admin</span>' : ''}</td>
                    <td>${isAdmin ? 
                        `<input type="number" class="count-input" value="${displayCount}" min="0" onchange="updatePayoutCount('${esc(name)}', this.value)">` : 
                        `<strong>${displayCount}</strong>`}</td>
                    <td>${formatNumber(PRICE_PER_CHECK)} $</td>
                    <td class="amount-cell">${formatNumber(summe)} $</td>
                    <td style="display:flex;align-items:center;gap:4px;">
                        ${isAdmin ? `<input type="checkbox" class="payout-checkbox" ${saved.paid ? 'checked' : ''} onchange="togglePayoutPaid('${esc(name)}', this.checked)" style="margin:0;">` : ''}
                        ${paidStatus}
                    </td>
                </tr>`;
        }
    }

    document.getElementById('totalKontrollen').textContent = formatNumber(totalKontrollen);
    document.getElementById('totalSumme').textContent = formatNumber(totalSumme) + ' $';
    document.getElementById('totalAusgezahlt').textContent = formatNumber(totalAusgezahlt) + ' $';
    document.getElementById('totalOffen').textContent = formatNumber(totalOffen) + ' $';

    await database.ref('Navy-boote/payouts/' + weekKey + '/_weekInfo').update({
        monday: weekKey, 
        sunday: getWeekKey(sunday), 
        weekString: getWeekString(monday),
        totalKontrollen, 
        totalSumme, 
        totalAusgezahlt, 
        totalOffen, 
        lastUpdated: Date.now()
    });
    
    for (const name of authorizedUsers) {
        if (!payoutData[name] || payoutData[name].count === null) {
            let weekCheckCount = 0;
            const userData = allUsers[name];
            if (userData && userData.boats) {
                for (const boatKey in userData.boats) {
                    const boatEntries = userData.boats[boatKey];
                    if (Array.isArray(boatEntries)) {
                        boatEntries.forEach(entry => {
                            if (entry.timestamp) {
                                const entryDate = new Date(entry.timestamp);
                                if (entryDate >= monday && entryDate <= sunday) {
                                    weekCheckCount++;
                                }
                            }
                        });
                    }
                }
            }
            await database.ref('Navy-boote/payouts/' + weekKey + '/' + name).update({ 
                count: weekCheckCount,
                autoCalculated: true 
            });
        }
    }
}

async function updatePayoutCount(name, newCount) { 
    if (!isAdmin) return; 
    const count = parseInt(newCount) || 0; 
    const weekKey = currentPayoutWeek; 
    await database.ref('Navy-boote/payouts/' + weekKey + '/' + name).update({ 
        count,
        autoCalculated: false,
        manuallySet: true,
        manuallySetBy: currentUser.username,
        manuallySetAt: Date.now()
    }); 
    loadPayoutData(); 
}

async function togglePayoutPaid(name, isPaid) { 
    if (!isAdmin) return; 
    const weekKey = currentPayoutWeek; 
    const updateData = { paid: isPaid }; 
    if (isPaid) {
        updateData.paidAt = Date.now();
        updateData.paidBy = currentUser.username;
    } else {
        updateData.paidAt = null;
        updateData.paidBy = null;
    }
    await database.ref('Navy-boote/payouts/' + weekKey + '/' + name).update(updateData); 
    loadPayoutData(); 
}
