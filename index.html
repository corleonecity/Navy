<!DOCTYPE html>
<html>
<head>
    <title>GTA V Map Script</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; background: #0fa8d2; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // GTA V nutzt ein anderes Koordinatensystem als die Erde.
        // Wir erstellen eine flache Projektion (L.CRS.Simple).
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2
        });

        // Annahme: Deine Map-Tiles liegen in einem Ordner /tiles/
        // URL-Schema: tiles/{z}/{x}/{y}.png
        L.tileLayer('https://s.rsg.sc/sc/images/games/gtav/map/atlas/{z}/{x}/{y}.jpg', {
            attribution: 'Map data &copy; Rockstar Games'
        }).addTo(map);

        // Beispiel-Funktion: In-Game Koordinaten zu Map-Pixeln konvertieren
        function gtaToPixels(x, y) {
            // Grobe Umrechnung der GTA Map-Einheiten
            return [y / 10, x / 10]; 
        }

        // Marker setzen (Beispiel: Michael's Haus)
        var michaelsHaus = L.marker([-30, 10]).addTo(map)
            .bindPopup('Michaels Haus');

        map.setView([0, 0], -2);
    </script>
</body>
</html>
