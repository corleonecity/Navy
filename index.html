<!DOCTYPE html>
<html>
<head>
    <title>GTA V Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0077be; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Karte initialisieren
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 2
        });

        // WICHTIG: Der Name hier muss EXAKT mit deiner Datei übereinstimmen
        var imageUrl = 'map.jpg'; 
        
        // Wir definieren ein quadratisches Feld für das Bild
        var imageBounds = [[0, 0], [1000, 1000]];

        // Bild laden
        L.imageOverlay(imageUrl, imageBounds).addTo(map);

        // Kamera auf das Bild ausrichten
        map.fitBounds(imageBounds);

        // Hilfs-Marker
        L.marker([850, 150]).addTo(map).bindPopup("Norden (Blaine County)");
        L.marker([150, 450]).addTo(map).bindPopup("Süden (Los Santos)");
    </script>
</body>
</html>
