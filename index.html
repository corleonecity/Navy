<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>U.S Navy Marine Stopuhr</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e6f0ff;
            background: #050a19;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://cdn.corleonecity.de/api/raw/4c9a9333-d321-4faa-ac7e-4f210465d911') no-repeat center center/cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 850px;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(4px);
            background: rgba(5, 10, 20, 0.6);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid rgba(120,160,255,0.3);
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            scrollbar-width: thin;
            scrollbar-color: #30475e transparent;
        }

        /* Container-Scrollbar anpassen für Webkit (Chrome/Edge/Safari) */
        .container::-webkit-scrollbar { width: 8px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background-color: #30475e; border-radius: 10px; }

        .time {
            font-size: 70px;
            letter-spacing: 4px;
            margin: 10px 0;
            color: #cfe3ff;
            text-shadow: 0 0 15px rgba(80,140,255,0.8);
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .header-section {
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title {
            color: #9cc7ff;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 25px;
            margin-bottom: 15px;
            border-left: 4px solid #9cc7ff;
            padding-left: 10px;
            text-align: left;
        }

        .input-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(156, 199, 255, 0.4);
            background: rgba(0,0,0,0.6);
            color: white;
            outline: none;
            width: 250px;
            font-size: 14px;
        }

        .save-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .boat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .boat-card h4 { margin: 0; font-size: 14px; color: #fff; }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(120,160,255,0.3);
            cursor: pointer;
            color: #e6f0ff;
            background: rgba(20, 40, 80, 0.7);
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover { 
            background: rgba(40, 80, 160, 0.9);
            transform: translateY(-1px);
        }

        .btn-save { background: rgba(0, 150, 255, 0.2); font-size: 11px; }
        .btn-save:hover { background: rgba(0, 150, 255, 0.5); }

        /* HIER IST DIE ÄNDERUNG FÜR DIE NAMENS-LISTE */
        .name-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(156, 199, 255, 0.1);
            max-height: 120px; /* Maximale Höhe der Box (ca. 3-4 Reihen) */
            overflow-y: auto;  /* Macht die Box scrollbar, wenn es zu viele Namen gibt */
            align-content: flex-start;
            scrollbar-width: thin;
            scrollbar-color: #508cff rgba(0,0,0,0.2);
        }

        /* Eigener Scrollbar für die Namens-Liste (Webkit) */
        .name-list::-webkit-scrollbar { width: 6px; }
        .name-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 6px; }
        .name-list::-webkit-scrollbar-thumb { background-color: #508cff; border-radius: 6px; }

        .name-tag {
            background: rgba(156, 199, 255, 0.15);
            border: 1px solid rgba(156, 199, 255, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            height: fit-content;
        }

        .name-tag:hover {
            background: rgba(156, 199, 255, 0.4);
        }

        .search-results {
            margin-top: 25px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(156, 199, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        th {
            background: rgba(156, 199, 255, 0.15);
            color: #9cc7ff;
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }

        .logo { width: 60px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <div class="header-section">
        <img class="logo" src="https://cdn.corleonecity.de/api/raw/357c41cc-d271-4e20-9b6d-f29852fbea0c" alt="Logo">
        <h2 style="margin:0; letter-spacing: 1px;">U.S Navy Marine Stopuhr</h2>
    </div>

    <div class="time" id="display">00:00.00</div>

    <div class="input-group">
        <input type="text" id="personName" placeholder="Name der Person (zum Speichern)..." />
        <button onclick="startStop()" id="startBtn" style="border-color: #00b4ff;">Start</button>
        <button onclick="reset()" style="border-color: #ffb400;">Reset</button>
    </div>

    <div class="section-title">Normale Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>U.S Navy Predator</h4>
            <button class="btn-save" onclick="saveTime('Predator')">Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Dinghy</h4>
            <button class="btn-save" onclick="saveTime('Dinghy')">Speichern</button>
        </div>
    </div>

    <div class="section-title">Geschütz Boote</div>
    <div class="save-grid">
        <div class="boat-card">
            <h4>Kurtz 31 Patrol Boat</h4>
            <button class="btn-save" onclick="saveTime('PatrolBoat')">Speichern</button>
        </div>
        <div class="boat-card">
            <h4>Weaponized Dinghy</h4>
            <button class="btn-save" onclick="saveTime('WeaponizedDinghy')">Speichern</button>
        </div>
    </div>

    <div class="section-title">Alle Registrierten Personen</div>
    <!-- Diese Box ist jetzt scrollbar durch max-height und overflow-y im CSS -->
    <div id="allNamesList" class="name-list">
        <span style="color:#aaa; font-size: 13px;">Lade Personen...</span>
    </div>

    <div class="search-results">
        <h3 style="margin:0 0 15px 0;">Live-Ansicht (Daten)</h3>
        <div class="input-group" style="justify-content: flex-start; margin-top:0;">
            <input type="text" id="searchName" placeholder="Name tippen oder oben anklicken..." oninput="listenToPerson()">
        </div>
        <div id="resultTable">
            <p style="color:#aaa; font-size: 13px; margin: 0;">Wähle eine Person aus der Liste oder tippe einen Namen ein, um die Zeiten zu sehen.</p>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyB7AmLb6NwR8sKyDXtIhmghGszpX_VsICY",
  authDomain: "cc-shop-36c3b.firebaseapp.com",
  databaseURL: "https://cc-shop-36c3b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cc-shop-36c3b",
  storageBucket: "cc-shop-36c3b.firebasestorage.app",
  messagingSenderId: "376170741825",
  appId: "1:376170741825:web:bc6102e277da5ad7cbc6c0"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- STOPPUHR LOGIK ---
let startTime = 0, elapsed = 0, interval = null, running = false;

function formatTime(ms) {
    let m = Math.floor(ms / 60000);
    let s = Math.floor((ms % 60000) / 1000);
    let c = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(c).padStart(2,'0')}`;
}

function update() {
    elapsed = Date.now() - startTime;
    document.getElementById("display").textContent = formatTime(elapsed);
}

function startStop() {
    if (!running) {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        document.getElementById("startBtn").textContent = "Stop";
        document.getElementById("startBtn").style.background = "rgba(255, 0, 0, 0.4)";
    } else {
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "Start";
        document.getElementById("startBtn").style.background = "rgba(20, 40, 80, 0.7)";
    }
}

function reset() {
    clearInterval(interval);
    running = false;
    elapsed = 0;
    document.getElementById("display").textContent = "00:00.00";
    document.getElementById("startBtn").textContent = "Start";
    document.getElementById("startBtn").style.background = "rgba(20, 40, 80, 0.7)";
}

// --- SPEICHER LOGIK ---
function saveTime(boatType) {
    const nameInput = document.getElementById("personName");
    const name = nameInput.value.trim();
    
    if (!name) return alert("Bitte geben Sie oben einen Namen ein, um zu speichern!");
    if (elapsed === 0) return alert("Keine Zeit gemessen!");

    const timeStr = formatTime(elapsed);
    const userRef = database.ref('Navy-boote/users/' + name.toLowerCase() + '/boats/' + boatType);

    userRef.once('value').then((snapshot) => {
        let times = snapshot.val() || [];
        if (!Array.isArray(times)) times = [];
        
        times.push(timeStr);
        if (times.length > 3) times.shift(); // Nur die letzten 3 behalten

        userRef.set(times).then(() => {
            document.getElementById("searchName").value = name;
            listenToPerson(name);
        });
    });
}

// --- LIVE LISTE ALLER NAMEN ---
database.ref('Navy-boote/users').on('value', (snapshot) => {
    const users = snapshot.val();
    const listDiv = document.getElementById('allNamesList');
    listDiv.innerHTML = '';
    
    if (users) {
        Object.keys(users).forEach(nameKey => {
            const displayName = nameKey.charAt(0).toUpperCase() + nameKey.slice(1);
            
            const btn = document.createElement('div');
            btn.className = 'name-tag';
            btn.textContent = displayName;
            btn.onclick = () => {
                document.getElementById('personName').value = displayName;
                document.getElementById('searchName').value = displayName;
                listenToPerson(nameKey);
            };
            listDiv.appendChild(btn);
        });
    } else {
        listDiv.innerHTML = '<span style="color:#aaa; font-size:13px;">Noch keine Personen gespeichert.</span>';
    }
});

// --- LIVE ANSICHT (ECHTZEIT TABELLE) ---
let currentListenerRef = null;

function listenToPerson(forcedName) {
    let name = forcedName || document.getElementById("searchName").value.trim().toLowerCase();
    const container = document.getElementById("resultTable");

    if (!name) {
        container.innerHTML = '<p style="color:#aaa; font-size: 13px; margin: 0;">Wähle eine Person aus der Liste oder tippe einen Namen ein, um die Zeiten zu sehen.</p>';
        if (currentListenerRef) currentListenerRef.off();
        return;
    }

    if (currentListenerRef) currentListenerRef.off();

    currentListenerRef = database.ref('Navy-boote/users/' + name.toLowerCase());
    currentListenerRef.on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (!data || !data.boats) {
            container.innerHTML = `
                <p style='color:#ff9c9c; margin:0;'>
                    Keine Einträge für <b>${name.charAt(0).toUpperCase() + name.slice(1)}</b> gefunden.
                </p>`;
            return;
        }

        let html = `<table>
            <thead>
                <tr>
                    <th>Bootstyp</th>
                    <th>Zeit 1</th>
                    <th>Zeit 2</th>
                    <th>Neueste (Zeit 3)</th>
                </tr>
            </thead>
            <tbody>`;
        
        const boatMapping = {
            "Predator": "U.S Navy Predator",
            "Dinghy": "Dinghy",
            "PatrolBoat": "Kurtz 31 Patrol Boat",
            "WeaponizedDinghy": "Weaponized Dinghy"
        };

        Object.keys(boatMapping).forEach(type => {
            const t = data.boats[type] || ["--", "--", "--"];
            html += `<tr>
                <td><strong>${boatMapping[type]}</strong></td>
                <td>${t[0] || "--"}</td>
                <td>${t[1] || "--"}</td>
                <td style="color: #9cc7ff; font-weight: bold;">${t[2] || "--"}</td>
            </tr>`;
        });

        html += "</tbody></table>";
        container.innerHTML = html;
    });
}
</script>
</body>
</html>
