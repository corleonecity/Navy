<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background-color: #0fa8d2; /* Wasser-Blau */
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Wir nutzen hier ein Standard-System, damit die Karte sofort sichtbar ist
        const map = L.map('map').setView([0, 0], 3);

        // Diese URL nutzt ein Tileset, das oft für GTA-Projekte verwendet wird
        // Falls die Karte weiß/schwarz bleibt, blockiert dein Browser den Abruf der Bilder (CORS)
        L.tileLayer('https://files.gtanet.com/atlas/{z}/{x}/{y}.png', {
            attribution: '&copy; Rockstar Games / GTANet',
            minZoom: 1,
            maxZoom: 5,
            noWrap: true
        }).addTo(map);

        // Ein Marker zur Orientierung
        L.marker([0, 0]).addTo(map).bindPopup("Karten-Mitte").openPopup();
    </script>
</body>
</html>
