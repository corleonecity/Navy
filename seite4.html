<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Karte - 8K Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #0a0a0a;
            cursor: grab;
        }

        #map:active {
            cursor: grabbing;
        }

        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: white;
            min-width: 200px;
        }

        .map-controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
            text-align: center;
            color: #ffd700;
        }

        .zoom-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zoom-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-align: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .coordinates {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
        }

        .instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 12px;
            max-width: 250px;
        }

        .instructions p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key-icon {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .map-controls, .instructions {
                display: none;
            }
            
            .coordinates {
                bottom: 10px;
                left: 10px;
                font-size: 11px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="loading" class="loading">
        <h2>🗺️ Lade GTA V Karte...</h2>
        <p>8K Auflösung wird geladen</p>
    </div>

    <div class="map-controls">
        <h3>🎮 Kartensteuerung</h3>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomTo(3)">🌍 Gesamtansicht</button>
            <button class="zoom-btn" onclick="zoomTo(5)">🏙️ Stadtansicht</button>
            <button class="zoom-btn" onclick="zoomTo(7)">🏘️ Nahaufnahme</button>
            <button class="zoom-btn" onclick="zoomTo(8)">🔍 Maximale Details</button>
        </div>
    </div>

    <div class="instructions">
        <p><span class="key-icon">🖱️</span> Mausrad zum Zoomen</p>
        <p><span class="key-icon">🖱️</span> Klicken & Ziehen</p>
        <p><span class="key-icon">+/-</span> Tasten zum Zoomen</p>
        <p><span class="key-icon">⇧</span> Pfeiltasten bewegen</p>
    </div>

    <div class="coordinates" id="coordinates">
        📍 Koordinaten: Bewege die Maus über die Karte
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialisiere die Karte
        const map = L.map('map', {
            center: [0, 0],
            zoom: 3,
            minZoom: 2,
            maxZoom: 8,
            zoomControl: false,
            attributionControl: false
        });

        // Füge Zoom-Control hinzu (oben links)
        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // GTA V Karte - Du musst deine eigene 8K Karte hier einfügen
        // Ersetze 'YOUR_MAP_IMAGE_URL' mit dem tatsächlichen Pfad zu deiner Karte
        
        // Option 1: Lokale Datei (wenn im Repository)
        // const mapImageUrl = 'gta5-map-8k.jpg';
        
        // Option 2: Externe URL
        const mapImageUrl = 'https://i.imgur.com/0FhXbUG.jpeg'; // Beispiel URL - ERSETZEN!
        
        // Dimensionen der GTA V Karte (angepasst für 8K)
        const mapWidth = 8192;  // 8K Breite
        const mapHeight = 8192; // 8K Höhe

        // Erstelle die Kartenebene mit der GTA V Karte
        const imageBounds = [[-mapHeight/2, -mapWidth/2], [mapHeight/2, mapWidth/2]];
        
        L.imageOverlay(mapImageUrl, imageBounds, {
            opacity: 1.0,
            errorOverlayUrl: 'https://via.placeholder.com/8192x8192/333/ffd700?text=GTA+V+Map+8K',
            alt: 'GTA V Map 8K',
            className: 'gta-map',
            crossOrigin: true
        }).addTo(map);

        // Event Handler für das Laden der Karte
        map.on('load', function() {
            document.getElementById('loading').style.display = 'none';
        });

        // Verstecke Loading nach kurzer Zeit (Fallback)
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);

        // Zoom-Funktionen
        function zoomTo(level) {
            map.setZoom(level);
        }

        // Koordinaten-Anzeige
        map.on('mousemove', function(e) {
            const lat = e.latlng.lat.toFixed(2);
            const lng = e.latlng.lng.toFixed(2);
            document.getElementById('coordinates').innerHTML = 
                `📍 X: ${lng} | Y: ${lat} | Zoom: ${map.getZoom()}`;
        });

        // Tastatur-Steuerung
        document.addEventListener('keydown', function(e) {
            const currentCenter = map.getCenter();
            const zoom = map.getZoom();
            const moveStep = 100 / zoom; // Je näher, desto kleiner die Schritte

            switch(e.key) {
                case '+':
                case '=':
                    map.zoomIn();
                    break;
                case '-':
                    map.zoomOut();
                    break;
                case 'ArrowUp':
                    map.panBy([0, -moveStep]);
                    break;
                case 'ArrowDown':
                    map.panBy([0, moveStep]);
                    break;
                case 'ArrowLeft':
                    map.panBy([-moveStep, 0]);
                    break;
                case 'ArrowRight':
                    map.panBy([moveStep, 0]);
                    break;
            }
        });

        // Touch-Unterstützung für mobile Geräte
        let touchStartTime;
        map.on('touchstart', function() {
            touchStartTime = Date.now();
        });

        map.on('touchend', function() {
            const touchDuration = Date.now() - touchStartTime;
            // Verhindere versehentliches Zoomen bei kurzen Taps
            if (touchDuration < 200) {
                // Kurzer Tap, kein Zoom
            }
        });

        // Responsive Anpassungen
        function adjustMap() {
            map.invalidateSize();
        }

        window.addEventListener('resize', adjustMap);

        // Initial Map Fit
        setTimeout(() => {
            map.fitBounds(imageBounds);
            document.getElementById('loading').style.display = 'none';
        }, 1000);

        console.log('🗺️ GTA V 8K Map geladen!');
        console.log('📐 Kartendimensionen:', mapWidth + 'x' + mapHeight);
        console.log('🔍 Zoom-Level:', map.getMinZoom() + ' bis ' + map.getMaxZoom());
    </script>
</body>
</html>
